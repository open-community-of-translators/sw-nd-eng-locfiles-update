l_english:

#### Anomaly Categories ####
 swnd_smuggler_camp_anomaly: "Smuggler Camp"
 swnd_smuggler_camp_anomaly_desc: "Our sensors have picked up a signal coming from the surface of [planet name]. The signal is intended for a secure channel and [Root.Leader.GetName] suggests that a team goes down to investigate."
 swnd_abandoned_cis_ship_anomaly: "Drifting Clankers"
 swnd_abandoned_cis_ship_anomaly_desc: "Our sensors have picked up a derelict Separatist ship drifting in orbit above §Y[Root.planet.GetName]§!. While its mostly intact, we do not pick up on any life signs or energy readings from ship itself. It might be worth investigating to see what we can find on board."
 swnd_abandoned_cis_factory_anomaly: "Abandoned Foundry"
 swnd_abandoned_cis_factory_anomaly_desc: "Our sensors have discovered an abandoned Separatist factory on [insert planet name here]. There could be something worth investigating here."
 swnd_abandoned_republic_ship_anomaly: "Lone Signal"
 swnd_abandoned_republic_ship_anomaly_desc: "Our sensors have picked up a derelict Republic vessel drifting in orbit above §Y[Root.planet.GetName]§!. While its mostly intact, we do not pick up on any life signs or energy readings from ship itself. It might be worth investigating to see what we can find on board."
 swnd_abandoned_republic_base_anomaly: "Frontline Signal"
 swnd_abandoned_republic_base_anomaly_desc: "Our sensors have discovered an abandoned Republic base on [insert planet name here]. There could be something worth investigating here."
 swnd_abandoned_republic_medical_base_anomaly: "Abandoned Republic Medical Facility"
 swnd_abandoned_republic_medical_base_anomaly_desc: "Our sensors have detected an abandoned Republic medical station in orbit around §Y[Root.planet.GetName]§!. Battle scars mark its hull, and faint energy readings suggest some systems remain operational. There are no signs of life, but valuable supplies or classified data may still be inside. We should send a team to investigate."
 swnd_crashed_imp_gozanti_anomaly: "Imperial Wreckage"
 swnd_crashed_imp_gozanti_anomaly_desc: "Our sensors have detected the wreckage of an Imperial Gozanti-class cruiser on the surface of §Y[Root.planet.GetName]§!. The cause of its crash is unclear, but the ship appears largely intact. We should send a team to investigate - there may be valuable salvage or classified Imperial data still onboard."
 swnd_clone_wars_debris_anomaly: "Debris Field"
 swnd_clone_wars_debris_anomaly_desc: "We've arrived in orbit of §Y[Root.planet.GetName]§! and detected a vast debris field, likely remnants of a battle from the Clone Wars. Wreckage from starships drifts aimlessly, some pieces still showing faint energy readings. We should send a team to investigate - there may be salvageable technology or lost records hidden among the ruins."
 swnd_crashed_rebel_ship_anomaly: "Rebel Wreckage"
 swnd_crashed_rebel_ship_anomaly_desc: "Upon arriving in orbit of §Y[Root.planet.GetName]§!, our sensors picked up an active power signature on the surface. It appears to be a ship generator, still running despite no signs of its vessel. We should send a team to investigate - there may be something valuable or unexpected down there."
 swnd_hutt_slaver_camp_anomaly: "Hutt Slaver Camp"
 swnd_hutt_slaver_camp_anomaly_desc: "Upon reaching orbit of §Y[Root.planet.GetName]§!, our sensors detect the remains of an old encampment on the surface. The site appears weathered and long abandoned, yet traces of structures and equipment remain. We should send a team to investigate - there may be something of value or a story left untold."
 #swnd_hammerhead_cruiser_anomaly: "REPLACE_ME"
 #swnd_hammerhead_cruiser_anomaly_desc: "As we arrive in orbit of §Y[Root.planet.GetName]§!, our sensors detect a faint but consistent energy signature coming from the surface. The source is unclear - possibly old technology, a buried power core, or something else entirely. We should send a team to investigate and determine its origin."
 swnd_ruined_settlement_anomaly: "Ruined Settlement"
 swnd_ruined_settlement_anomaly_desc: "Upon arriving in orbit of §Y[Root.planet.GetName]§!, we detect the ruins of what appears to be an abandoned settlement. Structures lie in decay, with no signs of recent activity. Whatever happened here, the inhabitants are long gone. We should send a team to investigate and uncover what remains."
 swnd_unknown_cave_signature_anomaly: "Cave Blips"
 swnd_unknown_cave_signature_anomaly_desc: "As our scan of §Y[Root.planet.GetName]§! concludes, we detect an unusual energy signature emanating from a cave deep within the surface. Its origin is unclear - natural phenomena, or something else entirely. We should send a team to investigate and uncover the source."
 swnd_banking_clan_outpost_anomaly: "Banking Clan Outpost"
 swnd_banking_clan_outpost_anomaly_desc: "Upon arriving in orbit of §Y[Root.planet.GetName]§!, we detect the remains of an old Banking Clan outpost. The station appears derelict, its structure partially collapsed, but some systems may still be operational. We should send a team to investigate - there may be credits, data, or technology left behind."
 swnd_crashed_republic_cruiser_anomaly: "Shattered"
 swnd_crashed_republic_cruiser_anomaly_desc: "Upon arriving in orbit of §Y[Root.planet.GetName]§!, our sensors detect the unmistakable signature of a Venator-class Star Destroyer lying wrecked on the surface. The ship appears to have crashed during the final days of the Clone Wars, its massive frame partially buried in the terrain. We should send a team to investigate - there may still be something of value within its remains."
 swnd_vagaari_wreckage_anomaly: "Vagaari Scrap"
 swnd_vagaari_wreckage_anomaly_desc: "Our sensors have picked up a ship signature in orbit around §Y[Root.planet.GetName]§!. It appears to be of Vagaari design and looks to be drifting listlessly."
 swnd_iokath_tecnolith_anomaly: "Bizarre Structures"
 swnd_iokath_technolith_anomaly_desc: "[Root.Leader.GetName]'s team has found a strange structure partially buried on §Y[Root.planet.GetName]§!. Its purpose is unknown."
 swnd_abandoned_digsite_anomaly: "Abandoned Digsite"
 swnd_abandoned_digsite_anomaly_desc: "Our team has found an abandoned archaeological digsite on §Y[Root.planet.GetName]§!that could use some attention. Chances are there is something left behind."
 swnd_eternal_fleet_wreckage_anomaly: "Eternal Wreckage"
 swnd_eternal_fleet_wreckage_anomaly_desc: "Our sensors have picked up a large debris field near §Y[Root.planet.GetName]§!. A few ships of unrecognizeable design and remains of a large station stand out among all the scrap. "
 swnd_abandoned_chiss_station_anomaly: "A Lone Station"
 swnd_abandoned_chiss_station_anomaly_desc: "We've discovered an abandoned Chiss outpost in orbit near §Y[Root.planet.GetName]§!. It shows signs of battle. "
 swnd_mysterious_orb_anomaly: "A Mysterious Orb"
 swnd_mysterious_orb_anomaly_desc: "While conducting a survey of §Y[Root.planet.GetName]§!, we've discovered an abandoned fortress sitting alone in the wilderness. "
 swnd_vong_bug_anomaly: "Mysterious Bugs"
 swnd_vong_bug_anomaly_desc: "Our scientists have discovered a strange group of beetle-like insects scuttling around a derelict starship. Their appearance is far from anything we've seen before."
 swnd_vong_grutchin_anomaly: "Mysterious Swarms"
 swnd_vong_grutchin_anomaly_desc: "While surveying §Y[Root.planet.GetName]§!, our probes have spotted a swarm of inesects moving across a large wreckage site. The last glimpse of the insects by our probe was moments before it was consumed and the feed was lost."
 swnd_vong_cognition_hood_anomaly: "Coral Formation"
 swnd_vong_cognition_hood_desc: "In a peculiar turn of events, we've discovered what appears tso be an isolated coral formation on the surface of an asteroid above §Y[Root.planet.GetName]§!. Our scientists are requesting an investigation to understand how coral ended up here."
 swnd_vong_fighting_claw_anomaly: "Strange Remains"
 swnd_vong_fighting_claw_desc: "While surveying §Y[Root.planet.GetName]§!, our scientists discovered a burial site with some skeletal remains that don't match any known species we've encountered thus far."
 swnd_vong_surge_coral_anomaly: "Horrifying Growths"
 swnd_vong_surge_coral_desc: "Our probes have found the remains of a small settlement on an asteroid near the orbit of §Y[Root.planet.GetName]§!."
 swnd_vong_crab_armor_anomaly: "Spiked Edges"
 swnd_vong_crab_armor_desc: "We've discovered a bizarre coral mound on §Y[Root.planet.GetName]§! that doesn't seem quite right. Our scientists are interested in an expedition to the surface to get a better look at this structure."
 swnd_vong_amphistaff_anomaly: "Coiled Menace"
 swnd_vong_amphistaff_desc: "While doing a routine survey, we discovered a strange, serpentine creature."
 swnd_vong_plaeryin_bol_anomaly: "Decoy"
 swnd_vong_plaeryin_bol_desc: "We've found an abandoned ship above §Y[Root.planet.GetName]§!. It appears to have suffered major damage and was left adrift."
 swnd_vong_magma_pebble_anomaly: "Hot Rocks"
 swnd_vong_magma_pebble_desc: "Our scientists have discovered a cluster of strange rocks while surveying §Y[Root.planet.GetName]§!." #rewrite later
 swnd_kalani_signal_anomaly: "Unusual Beacon"
 swnd_kalani_signal_anomaly_desc: "§Y[Root.planet.GetName]§! has a strange signal eminating from the surface. It appears to be an old Separatist signal."
 swnd_dellso_signal_anomaly: "Smoke Plumes"
 swnd_dellso_signal_anomaly_desc: "Our survey of §Y[Root.planet.GetName]§! shows a mountain range emitting an abnormally large amount of smoke. While scans of the planet show limited volcanic activity, another pass shows a strange facility built into the side of the mountain."
 swnd_spar_signal_anomaly: "Dar Cabur"
 swnd_spar_signal_anomaly_desc: "We've heard rumors about possible sightings of a person of interest - a Mandalorian of importance to the Protectors. During our survey of §Y[Root.planet.GetName]§!, [Root.Leader.GetName] and their team picked up on a small Mandalorian encampment. Whether or not its abandoned is unknown."

#### Anomalies ####
 swnd_anomaly.10.name: "No One Home"
 swnd_anomaly.10.desc: "Upon arriving at the signal source, [Root.Leader.GetName]'s team finds a campsite in disarray and a partially destroyed freighter. There are no bodies but definite signs of a struggle.\n\n[Root.Leader.GetName] discovers a stash of supplies amid all the debris from the freighter and a few crates of cargo. As the team moves the boxes out of the way, a tracking fob is knocked loose from one of them."
 swnd_anomaly.10.a: "Take some salvage and head out."
 swnd_anomaly.10.b: "Take their cargo instead."
 swnd_anomaly.20.name: "Drifting Clankers"
 swnd_anomaly.20.desc: "Our boarding party has returned from the drifting ship. Their reports show that the ship is not in any serviceable state and won't be without heavy investments. However, it appears as if the crew on board was eliminated years ago without any sign of trying to reach an escape pod. Fading scorch marks are scattered throughout the interior of the ship and parts of battle droids line the halls.\n\n[insert scientist name]'s team does come bearing gifts though. A bit of salvage from the ship's cargo hold."
 swnd_anomaly.20.a: "Salvage critical components."
 swnd_anomaly.20.b: "Take the droid blasters."
 swnd_anomaly.20.c: "Siphon their fuel reserves."
 swnd_anomaly.30.name: "Derelict Republic Ship"
 swnd_anomaly.30.desc: "Our boarding party has returned from the drifting ship. Their reports show that the ship is not in any serviceable state and won't be without heavy investments. However, it appears as if the crew on board was eliminated years ago without any sign of trying to reach an escape pod. Fading scorch marks are scattered throughout the interior of the ship and parts of battle droids line the halls.\n\n[insert scientist name]'s team does come bearing gifts though. A bit of salvage from the ship's cargo hold."
 swnd_anomaly.30.a: "Scavenge critical components."
 swnd_anomaly.30.b: "Clear out the armory."
 swnd_anomaly.30.c: "Siphon their fuel reserves."
 swnd_anomaly.40.name: "Abandoned Foundry"
 swnd_anomaly.40.desc: "[Root.Leader.GetName]'s team has returned from their survey of the factory. The facility is in a severe state of disrepair and is missing several critical components required for production. However, there are still some useful things to salvage from here."
 swnd_anomaly.40.a: "Take whatever is left from the production line."
 swnd_anomaly.40.b: "Salvage the droid blasters."
 swnd_anomaly.40.c: "Take their schematics."
 swnd_anomaly.50.name: "Frontline Signal"
 swnd_anomaly.50.desc: "[Root.Leader.GetName]'s team has returned from their survey of the base. Although most systems are undamaged, the base is not in safe condition to be repurposed by us. [Root.Leader.GetName] proposes that we take what we can from the base and let nature claim it."
 swnd_anomaly.50.a: "Scavenge critical components."
 swnd_anomaly.50.b: "Loot the armory."
 swnd_anomaly.50.c: "Take their datapads."
 swnd_anomaly.60.name: "$swnd_abandoned_republic_medical_base_anomaly$"
 swnd_anomaly.60.desc: "[Root.Leader.GetName]'s team has returned from their survey. The station was breached during the Clone Wars, likely by Separatists. With no atmosphere, bodies drift silently through the wreckage, frozen in time. Most supplies are long gone, but the main medical bay still holds salvageable equipment - unused by the battle droids that took the station."
 swnd_anomaly.60.a: "Take what we can from the medbay."
 swnd_anomaly.60.b: "Restock our rations."
 swnd_anomaly.60.c: "Take their datapads."
 swnd_anomaly.70.name: "$swnd_crashed_imp_gozanti_anomaly$"
 swnd_anomaly.70.desc: "[Root.Leader.GetName]'s team has returned from the crash site. Evidence suggests the ship was sabotaged and violently pulled from hyperspace before crashing. Among the wreckage, our team recovered valuable Imperial codes. The rest is a matter of priority - we must decide what to salvage before the Empire arrives."
 swnd_anomaly.70.a: "Scavenge ship components."
 swnd_anomaly.70.b: "Loot the armory."
 swnd_anomaly.70.c: "Access their terminals."
 swnd_anomaly.80.name: "$swnd_clone_wars_debris_anomaly$"
 swnd_anomaly.80.desc: "[Root.Leader.GetName]'s team has completed their survey. Most of the wreckage was useless scrap, but a Separatist cruiser remained intact enough for closer inspection. Our team managed to recover valuable salvage from its remains before moving on."
 swnd_anomaly.80.a: "Take the scrap and leave."
 swnd_anomaly.80.b: "Take surplus plasma cells."
 swnd_anomaly.80.c: "Loot their datapads."
 swnd_anomaly.90.name: "$swnd_crashed_rebel_ship_anomaly$"
 swnd_anomaly.90.desc: "[Root.Leader.GetName]'s team has completed their survey. The logs reveal this Mon Calamari vessel fled a Star Destroyer, making a desperate emergency jump that led to its demise. The ship is beyond saving, its crew long perished. There's little of value left - just scrap for the taking."
 swnd_anomaly.90.a: "Take what we can from the wreckage."
 swnd_anomaly.90.b: "No reason to linger here."
 swnd_anomaly.90.c: "Download any relevant intelligence."
 swnd_anomaly.100.name: "$swnd_hutt_slaver_camp_anomaly$"
 swnd_anomaly.100.desc: "[Root.Leader.GetName]'s team has completed their survey. The site was once a Hutt slaver camp, likely abandoned due to poor business or rival interference. Whatever happened, the slavers are long gone. There's little left, but we managed to recover some salvageable materials."
 swnd_anomaly.100.a: "Lets not waste this spice."
 swnd_anomaly.100.b: "Loot the rations."
 swnd_anomaly.100.c: "Take their intel."
 swnd_anomaly.120.name: "$swnd_ruined_settlement_anomaly$"
 swnd_anomaly.120.desc: "[Root.Leader.GetName]'s team has completed their survey. The cause of the settlement's abandonment remains unclear - perhaps a pirate raid or something worse. Whatever happened, there's little left behind, and only a few scraps were worth recovering."
 swnd_anomaly.120.a: "Scavenge their fuel reserves."
 swnd_anomaly.120.b: "Gather any edible food."
 swnd_anomaly.120.c: "Document the site."
 swnd_anomaly.130.name: "The Lost King of Duros"
 swnd_anomaly.130.desc: "[Root.Leader.GetName]'s team has completed their survey. Inside the cave, they discovered old scientific equipment and the remains of a humanoid of unknown origin, lying beside the carcasses of two slashrats. Whatever happened here, it's a mystery worth studying. We should recover the findings and analyze them further."
 swnd_anomaly.130.a: "A fascinating discovery!"
 swnd_anomaly.130.b: "Maybe its edible?"
 swnd_anomaly.130.c: "Take the equipment."
 swnd_anomaly.140.name: "$swnd_banking_clan_outpost_anomaly$"
 swnd_anomaly.140.desc: "[Root.Leader.GetName]'s team has completed their survey. The outpost was devastated by orbital bombardment during the final days of the Clone Wars, leaving little intact. Most valuables were lost, but our team managed to recover a few useful items from the wreckage."
 swnd_anomaly.140.a: "Take the energy cells."
 swnd_anomaly.140.b: "Take some small amenities."
 swnd_anomaly.140.c: "Empty the small vault"
 swnd_anomaly.150.name: "Victory and Death"
 swnd_anomaly.150.desc: "[Root.Leader.GetName]'s team has completed their survey. The Venator lies in ruin, its hull scorched and torn apart. But the most haunting discovery is the graveyard beside it: rows of makeshift graves, each marked by a clone helmet impaled on a stake. The helmets bear the colors of the 501st, yet painted orange - an unknown variant with no record in our databases. No signs remain of who buried them or why, only silence."
 swnd_anomaly.150.a: "Let them rest, they've earned it."
 swnd_anomaly.160.name: "Vagaari Wreckage"
 swnd_anomaly.160.desc: "[Root.Leader.GetName]'s team has completed their survey of the ship and thankfully found no lifesigns. Following a boarding operation and deeper investigation into the ship, it appears as if the crew faced a mutiny from their own slaves.\n\nAny escape pods are missing and all the vital systems are damaged beyond use. The only salvageable piece of material is a lone datapad."
 swnd_anomaly.160.a: "Very well."
 swnd_anomaly.170.name: "Technolith"
 swnd_anomaly.170.desc: "[Root.Leader.GetName]'s team has returned from their excavation with a mysterious metal monolith in tow. The structure, while created thousands of years ago, still hums with a bit of life. Further examination shows that its a piece of lost technology from the fable Iokath dysonsphere.\n\nUnfortunately, what ever insights it could have provided us are inacessible."
 swnd_anomaly.170.a: "A very curious find."
 swnd_anomaly.180.name: "Abandoned Digsite"
 swnd_anomaly.180.desc: "Surprisingly, the digsite was not completely empty. While the original team long since moved on to other ventures, they left behind a rather curious structure.\n\nAfter further examination by the team, [Root.Leader.GetName] concludes that this belonged to the long extinct §YXaxax§! species. They were highly advanced with technology that could potentially have rivaled the §YRakatans§!; however, all that is left of them is scattered bits of their technology througout the Unknown Regions."
 swnd_anomaly.180.a: "It might be for the best.."
 swnd_anomaly.190.name: "Eternal Wreckage"
 swnd_anomaly.190.desc: "[Root.Leader.GetName] and their team have concluded the survey of the wreckage. The team's survey shows that the wreckage came from the long-since vanquished §YEternal Empire§! during their bid for galactic dominance. The fragmentary peices of the station are also their design as well, a Star Fortress-class battlestation.\n\nTo everyone's surprise, most of the wreckage is salvageable and in very good condition despite its age. This makes for an unparalleled opportunity to acquire some materials."
 swnd_anomaly.190.a: "Salvage crucial components."
 swnd_anomaly.190.b: "Restock on ammunition."
 swnd_anomaly.190.c: "Download ship manifest data."
 swnd_anomaly.200.name: "A Lone Station"
 swnd_anomaly.200.desc: "[Root.Leader.GetName] returns from the station with the team. Even though it showed signs of battle, most of the functions aboard the station still worked to some varying degree, even the refreshers. While nothing was of too much importance, there was some valuable information to take from their computers: communications between House members, crew profiles, and station diagnostics.\n\nThe question is how much of this information is legitimate and how much of it is disinformation."
 swnd_anomaly.200.a: "The diplomatic information might be of some use."
 swnd_anomaly.200.b: "The diagnostics could be helpful."
 swnd_anomaly.210.name: "Isolated"
 swnd_anomaly.210.desc: "WIP - Team explores ancient ruins, discovers strange orb with unusual inscriptions. Not from any known culture."
 swnd_anomaly.210.a: "Fascinating."
 swnd_anomaly.220.name: "Separatist Signal"
 swnd_anomaly.220.desc: "Our follow up survey on §Y[Root.planet.GetName]§! has figured out the source of the signal. There is a wrecked DH-Omni Support Vessel on the planet's surface with Separatist livery. Most of the droids are still in working condition despite the shutdown order at the end of the Clone Wars. Along with the standard OOM command B1s, the droids are commanded by a tactical droid.\n\n[Root.Leader.GetName] and their team are captured by a group of B1s and are escorted to the bridge of the wrecked ship."
 swnd_anomaly.220.a: "Curious."
 swnd_anomaly.230.name: "Billowing Smoke"
 swnd_anomaly.230.desc: "Our survey of §Y[Root.planet.GetName]§! leads us to the source of the signal. There are no signs of any activity on the outside of the facility.\n\n[Root.Leader.GetName] and their team land nearby and enter the large complex. As they make their way through the halls, they feel as if they're being watched. Then they see into the main production plant. Before them are dozens of droids being assembled. They continue to trace the exact signal source to a room overlooking the production line."
 swnd_anomaly.230.a: "Curious."
 swnd_anomaly.240.name: "Dar Cabur"
 swnd_anomaly.240.desc: "The Mandalorian encampment on §Y[Root.planet.GetName]§! seems relatively quiet. A Pursuer-class patrol ship sits near by with the ramp down. [Root.Leader.GetName] approaches cautiously but stops as soon as he hears the cocking of a blaster pistol behind him and the feel of the barrel against his head. The unseen assailant, no doubt the Mandalorian that owns this ship guides him toward the ramp, following close behind.\n\nOnce on board, the ramp lifts up and closes behind him."
 swnd_anomaly.240.a: "..."
 ### Vong Anomalies
 swnd_anomaly_vong.10.name: "Strange Bugs"
 swnd_anomaly_vong.10.desc: "Once docked at the ship, [Root.Leader.GetName] and their team are immediately attacked by the bizarre insects. The skittering creatures take flight, throwing themselves at the crew and trying to latch on to them with their mandibles or impale them with their carapaces.\n\n[Root.Leader.GetName] manages to disperse the insects just long enough to get the science team back to the ship. In their escape, two beetles escape into the vacuum of space, dying instantly.\n\nIf there was ever a chance to retrieve one for study, now would be it."
 swnd_anomaly_vong.10.a: "Grab the brown one."
 swnd_anomaly_vong.10.b: "Grab the spiked one."
 swnd_anomaly_vong.20.name: "Relentless Hunger"
 swnd_anomaly_vong.20.desc: "Despite the their better judgement, [Root.Leader.GetName] joins a team to the surface. They arrive at the last known location of the probe and witness the mass of buzzing insects.\n\nDisturbed by the new arrivals, the swarm turns their focus to the scientists and attempt to warm the shuttle. Within seconds, the shuttle is brought down as the overwhelming mass of insects forces it to the surface. The scientists make their escape and call for extraction as a small escort provides cover for the shuttle out.\n\nAlthough their run in with the bugs could have ended in disaster, a few specimens of these insects are captured and brought back aboard the ship in the most secure containment possible."
 swnd_anomaly_vong.20.a: "What a fascinating insect!"
 big_grutchin_tooltip: "Just imagine the damage an even larger one could cause."
 swnd_anomaly_vong.20.b: "I wonder what they taste like.."
 swnd_anomaly_vong.30.name: "Out Of Place"
 swnd_anomaly_vong.30.desc: "[Root.Leader.GetName] and their team land on the asteroid and examine the structure. Compared to asteroid, the coral mass is far, far younger. Alarmingly, its from the last two hundred years or so. Even more surprising is that the coral is completely different from the types of coral known to biologists and almost seems like the coral itself is wreckage.\n\nGoing deeper into the asteroid, [Root.Leader.GetName] finds something rather alarming. The coral is indeed wreckage of some sort of bio-ship and the cockpit is split apart when colliding with the asteroid. Fragments of the pilot are found throughout the interior with the pilot's head still intact and encased in something that looks like a flight helmet connected to part of the coral outcrop by tendrils.\n\n[Root.Leader.GetName] succesfully removes the hood from its wearer and notices the strange tendrils go limp. With the hood in hand, [Root.Leader.GetName] returns to the ship, ready to examine it further and ponder the origins of the strange wreckage."
 swnd_anomaly_vong.30.a: "Keep the hood intact."
 swnd_anomaly_vong.30.b: "Examine its design."
 swnd_anomaly_vong.31.name: "All In One Piece"
 swnd_anomaly_vong.31.desc: "The hood is far different from anything we've ever encountered. While parts of it seem like they were manufactured, other parts of it seem completely organic, as if it were crafted out of the same material as the wreckage. The now limp tendrils would have been attached to something else, perhaps a life support system or maybe even some sort of control system. [Root.Leader.GetName] tries to put on the hood but it doesn't fit their head at all.\n\nOur current hypothesis is that whoever or whatever designed the craft found embedded in the asteroid also had a hand in creating this ship component."
 swnd_anomaly_vong.31.a: "Fascinating!"
 swnd_anomaly_vong.32.name: "Reverse Bio-Engineering"
 swnd_anomaly_vong.32.desc: "[Root.Leader.GetName] carefully breaks down the hood, examining its various components. Everything from the tendrils to the actual hood itself are comprised of formerly organic material. Its nearly identical to same sort of coral material we first discovered. While it looks like a flight helmet, this hood may very likely had been a part of a bio-engineered apparatus for pilots.\n\nOur current hypothesis is that whoever or whatever designed the craft found embedded in the asteroid also had a hand in creating this ship component."
 swnd_anomaly_vong.32.a: "Fascinating!"
 swnd_anomaly_vong.40.name: "Odd Appendage"
 swnd_anomaly_vong.40.desc: "The burial site on §Y[Root.planet.GetName]§! proves to be a fascinating one. Several artifacts of a long-forgotten civilization are cataloged, but our scientists discovered a peculiar piece of artwork. It shows what appears to be several of the native species surrounding a strange humanoid of some kind with its arm raised defensively. The humanoid is not a known species to us. Its more gaunt than a Givin and appears to be covered in spikes. Next to it lays a bisected serpent of some kind.\n\n[Root.Leader.GetName] chalks it up to a retelling of a legend but below the relief is a partially mummified forelimb. It looks no different than a human or any other near-human species known in the main galaxy except the hand. A large, claw-like apparatus is found arond the knuckle. A scientist tries to extract a small portion of it off but nothing of ours can cut it. [Root.Leader.GetName] takes the arm aboard the ship. If we can't take a sample of it, might as well take the whole thing."
 swnd_anomaly_vong.40.a: "Grave robbing at its finest."
 swnd_anomaly_vong.50.name: "Horrific Find"
 swnd_anomaly_vong.50.desc: "The team lands on the asteroid and begins to examine the area surrounding the strange settlement. Strange coral-like structures appear to be grafted on the rocks and make up majority of the inner workings. There is a sense of unease when walking through the settlement as it becomes clear that there are several warren-like structures and large areas of jagged coral structures. Its clear that whoever grafted this strange coral to the asteroid had long term goals in mind. One of the scientists hacks off a sample of the coral for further examination.\n\nAfter exploring a few structures, [Root.Leader.GetName] comes across a room filled with strange coral pods. The coral is long dead and crumbling and the pods are vaguely shaped like coffins. Inside are the mummified husks of several species with one thing in common with all of them - strange spiked portrusions jutting out of their bodies. It is clear that this is no mere settlement and if anything, all the species here came against their will.\n\n[Root.Leader.GetName] take some of the mummies back to the ship for further study."
 swnd_anomaly_vong.50.a: "Begin the autopsy."
 swnd_anomaly_vong.51.name: "Implants"
 swnd_anomaly_vong.51.desc: "Our autopsy of the corpse revealed a very disturbing find about the origins of the spikes. It seems as if the spikes are the result of coral-like implants embedded in the bodies of the captives, not unlike the inhibitor chips found in clone troopers. Furthermore, the mummies also show sign that the captives were far thinner than they should have been. Whether or not it was a result of the coral implants is not certain.\n\nRegardless, the lives of the captives must have been miserable as the coral spread its way throughout their skeletal structure. A quick death would have been better than suffering."
 swnd_anomaly_vong.51.a: "At least the coral is dead."
 swnd_anomaly_vong.60.name: "Exotic Armor"
 swnd_anomaly_vong.60.desc: "The shuttle makes its descent to the surface but accidentally collides with the coral spire. Almost instantly it collapses without leaving a scratch on the ship itself.\n\n[Root.Leader.GetName] and their team begin to clear the rubble and find several bodies underneath the debris. The bodies have been here for a while, leaving nothing left but bone and what little clothing they had on. As they clear out more of the structure, they find a strange spikey, crab-like shell embedded in the rubble.\n\nAfter clearing out the dead coral, they find partial remains of a humanoid alien inside the spiked shell. In fact, there are several of these shells attached to the fragments of the strange humanoid. After some careful extraction, [Root.Leader.GetName] manages to pull out the chestplate from the debris and remains."
 swnd_anomaly_vong.60.a: "An amazing discovery."
 swnd_anomaly_vong.70.name: "Serpentine"
 swnd_anomaly_vong.70.desc: "After landing and tracking down the creature, [Root.Leader.GetName]'s team managed to subdue the strange serpent-like animal but not without incident.\n\nOne scientist was blinded by its venom and died moments later. With it being nearly indestructable, [Root.Leader.GetName] decided to hastily capture the creature in a sturdy containment device. As it thrashes about and lunges at the sides of its containment, it becomes clear that this is not just an exotic serpent." #Redo this loc later
 swnd_anomaly_vong.70.a: "Curious."
 swnd_anomaly_vong.80.name: "False Eye"
 swnd_anomaly_vong.80.desc: "The shuttle makes a steady approach to the ship. The damage is far worse than one would have thought initially. While showing signs from battle, it also looks like it collided with a massive asteroid got embedded inside of it. Despite this, it looks like most, if not all the escape pods were jettisoned.\n\nAfter disembarking from the shuttle, [Root.Leader.GetName] finds the desiccated remains of an alien in one of the corridors, holding on to the remains of a large serpent. The alien's head was nothing but a husk save for a single eye that had miraculously retained its moisture. A couple scientists join [Root.Leader.GetName] in attempting to extract the anomalous organ but instead accidentally trigger it to shoot poison out. A few more attempts at prying at the eye finally dislodge it. It convulses some more acting as if it s struggling to survive after being separated from the corpse.\n\nIt is placed in a secure containment and brought aboard the ship for analysis." #redo loc later
 swnd_anomaly_vong.80.a: "How odd."
 swnd_anomaly_vong.90.name: "Hot Stones"
 swnd_anomaly_vong.90.desc: "Despite their innoculous nature, these are no mere stones. While gathering some to bring back to the ship for analysis, [Root.Leader.GetName] tossed one against a rocky outcrop. The stone hit the rocks and exploded violently. With that in mind, [Root.Leader.GetName] writes a note on the case holding the rocks."
 swnd_anomaly_vong.90.a: "Handle with care."