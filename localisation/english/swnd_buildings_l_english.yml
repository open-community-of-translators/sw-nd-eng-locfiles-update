 building_df9: "DF9 Cannon Defenses"
 building_df9_desc: "A planetary stronghold, fortified with heavy anti-infantry equipment.\n\n§YCreates two DF9 Defense Cannons§!"
 building_turbolaser: "Turbolaser Defenses"
 building_turbolaser_desc: "A planetary stronghold, housing heavy weaponry capable of dealing heavy blows to armored units.\n\n§YCreates three Turbolaser Defenses§!"
 building_defense_cannon: "Orbital Defense Cannons"
 building_defense_cannon_desc: "Multiple arrays of ground based weapons, capable of targeting ships located in orbit."
 building_defense_tower: "Orbital Defense Towers"
 building_defense_tower_desc: "Network of heavy turbolaser turrets, ready to unleash coordinated blasts on any threatening ship in orbit."
 building_hypervelocity: "Hypervelocity Gun"
 building_hypervelocity_desc: "The hypervelocity gun fires bursts of super-accelerated solid slugs. These batter down a ship's shielding, armor and finally rupture its hull."
 building_galactic_financial_complex: "Galactic Financial Complex"
 building_galactic_financial_complex_desc: "Huge complex bringing together accountants and sales people to manage a galactic financial empire."
 building_banking_guild_hq: "Banking Guild Headquarters"
 building_banking_guild_hq_desc: "The headquarters of the banking guild, managing the flow of financial capital across the galaxy."
 building_mining_guild_hq: "Mining Guild Headquarters"
 building_mining_guild_hq_desc: "The headquarters of the mining guild, coordinating the production, transportation, and sale of mineral products throughout the galaxy."
 building_conclave_faith: "Conclave of Faith"
 building_conclave_faith_desc: "The planetary conclave meets regularly here, listening to the faithful and tending to the spiritual needs of their followers."
 building_castle_complex: "Castle Complex"
 building_castle_complex_desc: "For servants to respect their masters, they must be able to witness the power they serve."
 building_shrine: "Shrine"
 building_shrine_desc: "A blessed place for the faithful to meditate."
 building_bureau_galactic_intelligence: "Bureau of Galactic Intelligence"
 building_bureau_galactic_intelligence_desc: "To prevent our enemies' next attack, we must gather and centralize all information our agents collect throughout the galaxy."
 building_jedi_temple: "Jedi Temple"
 building_jedi_temple_desc: "The Jedi Temple is a central place of the Jedi Order, usually home to its major training, administrative and dormitory facilities."
 building_sith_temple: "Sith Temple"
 building_sith_temple_desc: "A Sith Temple is usually a pyramidal structure containing training and meditating chambers, and many mysteries of the Force."
 building_fort_inquisitorius: "Fortress Inquisitorius"
 building_fort_inquisitorius_desc: "Fortress Inquisitorius is a heavily armed stronghold, serving as a headquarters for the Imperial Inquisitor Program, dedicated to the Jedi Purge."
 building_bounty_hunter_guild: "Bounty Hunter Guild"
 building_bounty_hunter_guild_desc: "Institution regulating the bounty-hunting trade."
 building_smugglers_base: "Smuggler's Base"
 building_smugglers_base_desc: "Landing pads, storage and brains of scoundrels and smugglers."
 building_council_chamber: "Council Chamber"
 building_council_chamber_desc: "Built atop the planet's holiest site, the Chamber serves as the seat of religious authority, where matters both spiritual and temporal are decided."
 building_detention_wing: "Imperial Detention Wing"
 building_detention_wing_desc: "The efficiency of Imperial carceral policy requires additional space for criminals to serve out their sentences."
 building_nature_preserve: "Nature Preserve"
 building_nature_preserve_desc: "A Nature Preserve is a protected area of importance for flora, fauna, geological or other special interest to provide opportunities for research."
 building_plasma_factory_1: "Ion Weapons Production Line"
 building_plasma_factory_1_desc: "Ion weapons production line, ranging from individual weapons to capital ship batteries."
 building_plasma_factory_2: "Ion Weapons Factory"
 building_plasma_factory_2_desc: "Organized production lines, pooling their stocks and skills to improve the production of ion weapons of all sizes."
 building_plasma_factory_3: "Ion Weapons Factory Complex"
 building_plasma_factory_3_desc: "Complex of ion weapons assembly plants, spread over a large industrial area."
 building_fighter_factory_1: "Starfighter Assembly Line"
 building_fighter_factory_1_desc: "A small facility where starfighters are laboriously assembled by crafters."
 building_fighter_factory_2: "Starfighter Factory"
 building_fighter_factory_2_desc: "A bustling factory where starfighters and bombers are assembled by hundreds of workers along assembly lines a kilometer in length."
 building_fighter_factory_3: "Starfighter Factory Complex"
 building_fighter_factory_3_desc: "A vast, sprawling complex where tens of thousands of specialists labor day and night to assemble a wide array of starfighters, bombers, and gunships."

