 councilor_bounty_hunter_guild: "Guildmaster"
 councilor_bounty_hunter_guild_female: "$councilor_bounty_hunter_guild$"
 councilor_bounty_hunter_guild_desc: "Also known as the guild boss, the guildmaster is responsible for several duties. They regulate the professional bounty hunting trade throughout the galaxy, ensure the legality of the hunts, and hold members accountable to the Bounty Hunter's Creed."
