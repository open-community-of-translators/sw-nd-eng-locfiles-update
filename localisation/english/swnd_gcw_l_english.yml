l_english:
 
 #GCW Leadup
 swnd_galactic_cw_leadup.1.name: "Calls for Reparations"
 swnd_galactic_cw_leadup.1.desc: "As the guns of Clone Wars' last battlefields fall silent, a new clamor swells from the halls of the Imperial Senate. Pointing to the devastation wrought by the former-Confederacy's legions and armadas, many representatives from core loyalist worlds are demanding compensation. Ideally, this compensation would come from those worlds that supported the defeated Separatist movement, although the [root.Capital.GetName] [Root.GetAdjective] Treasury could, in theory, also bear the expense. \n\nHowever, several former-separatist leaders argue that their worlds have suffered far more gravely at the hands of the Republic and the Empire, and that the core loyalist worlds should instead aid in the reconstruction of the former Separatist systems. Needless to say, this proposal was not well received on [root.Capital.GetName]"
 swnd_galactic_cw_leadup.1.a: "The Confederacy must never rise again."
 swnd_galactic_cw_leadup.1.a.tooltip: "Every separatist family will pay their share."
 swnd_galactic_cw_leadup.1.b: "The Confederacy broke the galaxy."
 swnd_galactic_cw_leadup.1.b.tooltip: "Now they will have to pay for it."
 swnd_galactic_cw_leadup.1.c: "We will pay our own way."
 swnd_galactic_cw_leadup.1.c.tooltip: "Extracting payment from ruined Separatist systems is like squeezing blood from a stone."
 swnd_galactic_cw_leadup.1.d: "Separatist worlds have suffered enough."
 swnd_galactic_cw_leadup.1.d.tooltip: "They should be welcomed back into the galactic community"
 swnd_galactic_cw_leadup.1.e: "We're unable to pay."
 swnd_galactic_cw_leadup.2.name: "Confederate Prisoners"
 swnd_galactic_cw_leadup.2.desc: "Not all on [root.Capital.GetName] celebrated the destruction of the Confederacy's leadership on the molten world of Mustafar and the end of the Clone Wars. At a secure prisoner of war facility near [root.Capital.GetName]'s equator, hundreds of thousands of Confederate officers have languished for years in overcrowded holding cells. While representatives of the Imperial Palace operating under the warrants of Grand Moff Tarkin and Director Krennic have remanded several prisoners with connections to Confederate weapons programs to their personal custody, the fates of the vast majority of the prisoners, a motley collection of Humans, Neimodians, Skakoans and Munns, rests with [Root.GetRulerTitle] [Root.GetRulerName].\n\nWhile we could simply release the officers and allow them to return home, some of our leaders have argued the prisoners should be ransomed, or put to work as punishment for their treason. A smaller group of advisors, but ones with direct links to the Emperor's inner circle, have suggested that the officers are simply too radicalized and too dangerous to be kept alive, and that the Imperial Palace would be understanding of any major 'accidents' at the prison facility."
 swnd_galactic_cw_leadup.2.a: "Execute them."
 swnd_galactic_cw_leadup.2.a.tooltip: "It was a mistake to keep the traitors alive."
 swnd_galactic_cw_leadup.2.b: "Force them to work."
 swnd_galactic_cw_leadup.2.b.tooltip: "Let them rebuild what they have destroyed."
 swnd_galactic_cw_leadup.2.c: "Ransom them."
 swnd_galactic_cw_leadup.2.c.tooltip: "Let those who have the means to leave go."
 swnd_galactic_cw_leadup.2.d: "Release them."
 swnd_galactic_cw_leadup.2.d.tooltip: "They served honorably and we will treat them in kind."
 swnd_galactic_cw_leadup.2.e: "This is not our concern."
 #swnd_galactic_cw_leadup.2.e.tooltip: ""
 swnd_galactic_cw_leadup.3.name: "Seizure of Jedi Assets"
 swnd_galactic_cw_leadup.3.desc: "An ambitious aide to [Root.GetRulerTitle] [Root.GetRulerName] has presented a potentially profitable proposal to fill our coffers and further erase the stain of the Jedi Order's treason from our worlds by appropriating the banned organziation's properties and accounts. According to the preliminary findings of a team of [Root.GetAdjective] auditors, the Jedi Orders operations in our territory were surprisingly extensive, and we could earn a tidy sum from auctioning off the supposedly-austere cult's libraries, lands, financial assets, and vehicles. Some [Root.GetAdjective] citizens, however, still look back upon the Jedi with fondness, and might resent the seizure."
 swnd_galactic_cw_leadup.3.a: "Burn them."
 swnd_galactic_cw_leadup.3.a.tooltip: "The only thing their relics are fit for is the pyre."
 swnd_galactic_cw_leadup.3.b: "Seize the assets."
 swnd_galactic_cw_leadup.3.b.tooltip: "What use would the Jedi have of credits anyways?"
 swnd_galactic_cw_leadup.3.c: "Seize the assets and turn them over to the proper authorities."
 swnd_galactic_cw_leadup.3.c.tooltip: "Duty first." 
 swnd_galactic_cw_leadup.3.d: "Graverobbing is beneath us."
 swnd_galactic_cw_leadup.3.d.tooltip: "The Jedi are beaten."
 swnd_galactic_cw_leadup.4.name: "COMPNOR Commences Operations"
 swnd_galactic_cw_leadup.4.desc: "The long-contested omnibus legislation establishing the Commision for the Preservation of the New Order (COMPNOR) has finally been passed into law following Emperor Palpantine's use of his Executive Authority powers. Advocates argue that the program is necessary to maintain order, enforce Imperial ideology, and 'educate' citizens, thereby preventing the discord and factionalism that poisoned the Old Republic. Critics, however, claim that COMPNOR is nothing more than a thinly veiled tool of Imperial propaganda and oppression, and stress that forced conformity can only breed conflict in such a diverse galaxy.\n\nWhile the law enjoys the obvious personal backing of Emperor Palpatine, some of our politicos have pointed out that its exact implementation is open to interpretation, and that we could scale back some of COMPNOR's more controversial statutes without technically violating the Emperor's mandate."
 swnd_galactic_cw_leadup.4.a: "Enhance its authorities."
 swnd_galactic_cw_leadup.4.a.tooltip: "Scale back? It doesn't go far enough."
 swnd_galactic_cw_leadup.4.b: "We will enforce the law in letter and spirit."
 swnd_galactic_cw_leadup.4.c: "We will enforce the most basic tenants."
 swnd_galactic_cw_leadup.4.d: "Imperial law is a farce. Weaken the most egregious parts."
 swnd_galactic_cw_leadup.4.e: "Hah! As if Imperial law will ever be enforced on [root.Capital.GetName]!"
 swnd_galactic_cw_leadup.5.name: "The Coalition For Progress"
 swnd_galactic_cw_leadup.5.desc: "As many predicted, COMPNOR continues to grow in power and size, cannibalizing former Old Republic organizations such as the storied ministries of Arts and Education, as well as creating new organizations in its own image. Of COMPNOR's bureaucratic progeny, few have grown as rapidly as the Coalition for Progress, which has claimed ownership over a diverse portfolio ranging from oversight of youth groups to the regulation of HoloNet content.\n\nThe Coalition for Progress's regional office on [root.Capital.GetName] has already ignited a political firestorm within [Root.GetAdjective] political circles after it publicly accused the teenage heir to one of our most important factions of inappropriate fraternization with a minor alien celebrity. While such a liaison is not strictly illegal, the Coalition has warned us that they will raise the issue directly with COMPNOR unless the teenager's family agrees to disinherit the child." #replaced ynchorri with alien
 swnd_galactic_cw_leadup.5.a: "Punish the heir and seize the family's assets."
 swnd_galactic_cw_leadup.5.a.tooltip: "Pure degeneracy."
 swnd_galactic_cw_leadup.5.b: "The heir erred. Make an example of them."
 swnd_galactic_cw_leadup.5.c: "Their opinion is noted. And nothing more."
 swnd_galactic_cw_leadup.5.d: "Assure the heir's family of your personal support."
 swnd_galactic_cw_leadup.6.name: "Currency Standardization"
 swnd_galactic_cw_leadup.6.desc: "Despite persisting for several years after its progenitor's legal collapse, the Republic Credit is nearing its end. In an effort to centralize control over the galaxy's monetary system, lower barriers to intergalactic trade, and stamp out the all-too-common practice of individual systems minting their own currencies, the Imperial Galactic Bank has issued preliminary guidance outlining the forthcoming transition to the Imperial Credit.\n\nUnder the new rules, central banks throughout the galaxy would be required to accept the new Imperial Credit as legal tender, and to peg their own currencies against it at rates determined by the Imperial Galactic Bank. Our economists at the Financial Reserve of [root.Capital.GetName] expect the currency transition to provide a short-term benefit to those systems that remained loyal to the Republic during the Clone Wars, but to undermine the economic competitiveness of many non-human and former-Separatist systems."
 swnd_galactic_cw_leadup.6.a: "Fully implement the provisions and raise tariffs."
 swnd_galactic_cw_leadup.6.b: "Loyalty has its benefits. Fully implement the provisions."
 swnd_galactic_cw_leadup.6.c: "Meet the new credit, same as the old credit."
 swnd_galactic_cw_leadup.6.d: "Work to preserve your monetary independence."
 swnd_galactic_cw_leadup.7.name: "Nationalization Wave"
 swnd_galactic_cw_leadup.7.desc: "As the anniversary of the First Battle of Geonosis draws near, the political debate on Coruscant and other former-Republic strongholds turns like clockwork to the predictable squabbles over the Clone War's causes, and questions of responsibility and accountability. Seeing the opportunity,  many Imperial Loyalists on [root.Capital.GetName] are urging [Root.GetRulerTitle] [Root.GetRulerName] to nationalize the remaining arms manufacturers and shipyards that backed the Confederate cause. While the largest corporations such as the Trade Federation and InterGalactic Banking Clan are too important to intergalactic commerce to risk disrupting, proponents argue that more peripheral entities such as the Techno Union, Hyper-Communications Cartel, and Corporate Alliance are ripe targets for expropriation.\n\nWhile nationalization would undoubtedly produce an immediate financial windfall by allowing us to auction off any seized assets, critics have argued that an expropriation of such dubious legality would undermine the very laws that allow £trade_value£ trade to flow and would anger the companies' shareholders, many of whom reside in former-Separatist systems."
 swnd_galactic_cw_leadup.7.a: "Why rule out the corporations?"
 swnd_galactic_cw_leadup.7.b: "Such are the wages of treason. Nationalize them."
 swnd_galactic_cw_leadup.7.c: "The Clone Wars are over. Do nothing."
 swnd_galactic_cw_leadup.8.name: "History by the Victors"
 swnd_galactic_cw_leadup.8.desc: "We have received an early preview of the first COMPNOR-approved history textbook for Imperial children in secondary school. It draws heavily from New Order works and authors popular in the Imperial court, such as the §dHistory of the Rise and Ascent of the Galactic Empire§! by Mika Stockpaul, §dAn Imperial History of the United Empire by Hau Zahn§!, and Wottlet Scarsir's §dHistorica Galactica§!. While critics claim that the textbook propagates a false narrative of galactic history, one shaped by mostly authoritarian, usually male, and almost always human leaders, proponents argue that creating an inspiring and unifying history of the galaxy is necessary to instill patriotic ideals and move past the galaxy's long history of politically-messy interspecies grudges.\n\nThe initial orders for the textbook will make it the most widely disseminated HoloBook in at least a generation, but we have some control over how many of our school systems receive the book. Additionally, while COMPNOR insists that the book be at least present in our schools, they said nothing about what other readings the textbook might be paired with."
 swnd_galactic_cw_leadup.8.a: "COMPNOR's book fails to recognize [Root.GetAdjective] power."
 swnd_galactic_cw_leadup.8.b: "Order close adherence to the COMPNOR curriculum."
 swnd_galactic_cw_leadup.8.c: "Leave the decision to the schools."
 swnd_galactic_cw_leadup.8.d:  "Limit the curriculum."
 swnd_galactic_cw_leadup.8.d.tooltip: "We will not regurgitate this drivel."
 swnd_galactic_cw_leadup.9.name: "ISB Expansion"
 swnd_galactic_cw_leadup.9.desc: "[Root.GetRulerTitle] [Root.GetRulerName]'s annual retreat to their summer [root.Capital.GetName] estate was cut unexpectedly short after an internal Imperial Palace memorandum outlining the long rumored expansion of the Imperial Security Bureau (ISB) was leaked onto the HoloNet. Although initially little more than a handful of agents assigned to liaise between municipal police forces and Imperial Intelligence, the ISB has emerged as one of the primary beneficiaries of Emperor Palpatine's New Order and its fixation on internal security.\n\nAccording to the draft document, the ISB is expected to significantly expand its intelligence collection platforms, chain code monitoring systems, and covert action capabilities over the next several years, funded by a near tripling of its formal budget over the next few years and new authorizations granting it access to Imperial Intelligence's classified Black Budget. Although the Imperial Palace claims that the ISB's new capabilities are necessary to keep pace with emerging threats to internal security, privacy advocates are condemning the plan as an unjustified expansion of a publicly unaccountable organization, and allege that any new surveillance capabilities granted to the ISB will be inevitably used to pry into the private lives of law abiding citizens.\n\nAlthough the Imperial Palace has signaled its intention to proceed with the plan regardless of opposition, we could limit our cooperation with the ISB by delaying their requests and minimizing any joint efforts, or we could join the rising chorus of opposition in the Senate."
 swnd_galactic_cw_leadup.9.a: "Support significant ISB expansion."
 swnd_galactic_cw_leadup.9.a.tooltip: "A New Order of security awaits."
 swnd_galactic_cw_leadup.9.b: "Support ISB expansion."
 swnd_galactic_cw_leadup.9.b.tooltip: "Those with nothing to hide have nothing to fear." 
 swnd_galactic_cw_leadup.9.c: "Stay quiet."
 swnd_galactic_cw_leadup.9.c.tooltip: "The nail that sticks out gets hammered."
 swnd_galactic_cw_leadup.9.d: "Oppose the proposal."
 swnd_galactic_cw_leadup.9.d.tooltip: "We reject the false choice between freedom and security."
 swnd_galactic_cw_leadup.10.name: "Fleeting Disparities"
 swnd_galactic_cw_leadup.10.desc: "Recently published naval enrollment and staffing statistics show that rising anti-alien sentiment is beginning to impact the promotion and retention of non-human flag officers within the Imperial Navy and its subordinate fleets. According to the statistics, the share of non-human flag officers within the Imperial Navy has fallen dramatically from it's Clone Wars peak, and a human Commodore today is nearly twenty times as likely to attain their Rear Admiralship as an equally qualified non-human peer.\n\nPundits from across [root.Capital.GetName]'s political spectrum are already weighing in on the statistical release. New Order advocates argue that non-human officers are simply less likely to obtain the security clearances necessary for senior positions, which they claim stems from natural concerns that non-humans are more likely to owe their true allegiance to their homeworlds and species than the Empire. Critics argue that the same logic could be applied to human loyalties, and that humanity has no inherently greater claim to patriotism than any other species in the Empire. Furthermore, these critics have argued that discrimination, real or imagined, is undermining military readiness  by artificially limiting the supply of qualified officers.\n\nRegardless of our personal views on the subject, the Imperial Navy is an entrenched organization that is resistant to outside interference. Nonetheless, we could exert our influence to ensure a fairer playing field for [Root.GetAdjective] candidates, although publicly backing the Navy's promotion practices would probably put us in their good graces and access to their [root.Capital.GetName] supply depot."
 swnd_galactic_cw_leadup.10.a: "Demote them and seize their personal assets"
 swnd_galactic_cw_leadup.10.a.tooltip: "Aliens in the [Root.GetAdjective] Fleet?"
 swnd_galactic_cw_leadup.10.b: "Humans are simply better suited for command."
 swnd_galactic_cw_leadup.10.b.tooltip: "Back the Imperial Navy."
 swnd_galactic_cw_leadup.10.c: "Say nothing."
 swnd_galactic_cw_leadup.10.c.tooltip: "Criticism doesn't build fleets."
 swnd_galactic_cw_leadup.10.d: "Advocate for non-human officers."
 swnd_galactic_cw_leadup.10.d.tooltip: "This is both a moral and practical matter."
 swnd_galactic_cw_leadup.10.e: "What the Empire does is not our concern."
 swnd_galactic_cw_leadup.10.e.tooltip: "Pointless squabbling."
 swnd_galactic_cw_leadup.11.name: "War Mantle"
 swnd_galactic_cw_leadup.11.desc: "The production of clone troopers was vital during the Clone Wars. Their numbers filled the ranks of the Grand Army of the Republic and their service was seen across the galaxy. Now that the war is over and a wave of Imperialization is sweeping across the Empire's many institutions, a new question rises: does the Empire need clone troopers anymore?\n\nTo that end, some people within the Imperial military as well as senators from former Separatist worlds have proposed the Imperial Defense Recruitment Bill - legislation that will see the clones gradually decommissioned and replaced with non-clone recruits and conscripts. Advanced aging, their loyalty being completely reliant on inhibitor chips, and the albeit low but very real risk of clone madness lend themselves as reasons why the dependence on Kamino needs to be lessened.\n\nThe new conscripted soldiers will serve as the foundation as the Stormtrooper Corps. "
 swnd_galactic_cw_leadup.11.a: "Its time to revamp the army."
 swnd_galactic_cw_leadup.11.a.tooltip: "A new era, heralded by the Imperial Stormtrooper!"
 swnd_galactic_cw_leadup.11.b: "Its time to revamp the army."
 swnd_galactic_cw_leadup.11.b.tooltip: "Contact your local recruiting station now!"
 swnd_galactic_cw_leadup.11.c: "The clones need protections!"
 swnd_galactic_cw_leadup.11.c.tooltip: "They need our support."
 swnd_galactic_cw_leadup.11.d: "This matter does not concern us."
 swnd_galactic_cw_leadup.11.d.tooltip: "Clone troopers, stormtroopers, same difference."
 swnd_galactic_cw_leadup.12.name: "The Clone Problem"
 swnd_galactic_cw_leadup.12.desc: "Of all the institutions, the military faces one of the largest challenges when it comes to the wave of Imperialization. While the Imperial Navy faces a relatively painless transition with only some criticism from legacy families and upstart senators, the Imperial Army has question of what to do with the vast number of clone troopers leftover from the Clone Wars.\n\nSome within the Imperial military view the clones as just mere assets, no different than the nearly endless swarms of battle droids pumped out by the droid foundries. To them, they are just war materiel that can be discarded without thought. Others both inside and outside the military say otherwise. Some military officials view them as still being vital assets, perfect for filling out the ranks of the newly established Stormtrooper Corps until recruitment quotas are met while other still believe they should be retained to train the first wave of non-clone recruits.\n\nThose opposed to military expansion point toward the fact that the clones need financial or social support after the war, with many clones themselves unprepared for life outside of the military - the sole purpose for their existence. Pundits from across [root.Capital.GetName]'s political spectrum weigh in on this hotly debated issue."
 swnd_galactic_cw_leadup.12.a: "We're done with them."
 swnd_galactic_cw_leadup.12.a.tooltip: "Decommission the clones, let come what may."
 swnd_galactic_cw_leadup.12.b: "Integrate them into the Stormtrooper Corps."
 swnd_galactic_cw_leadup.12.b.tooltip: "Ensure Vader keeps command of his own."
 swnd_galactic_cw_leadup.12.c: "They still have much to give."
 swnd_galactic_cw_leadup.12.c.tooltip: "Let them train the next generation of soldiers."
 swnd_galactic_cw_leadup.12.d: "Expendible like droids, decommission them."
 swnd_galactic_cw_leadup.12.d.tooltip: "Clones are too risky anyway."
 swnd_galactic_cw_leadup.12.e: "They still have much to give."
 swnd_galactic_cw_leadup.12.e.tooltip: "They can still protect us all."
 swnd_galactic_cw_leadup.12.f: "We can't let them slip through the cracks."
 swnd_galactic_cw_leadup.12.f.tooltip: "We must provide them aid."
 swnd_galactic_cw_leadup.12.g: "There are more pressing issues."

 swnd_galactic_cw_leadup.13.name: "Generationals"
 swnd_galactic_cw_leadup.13.desc: "Military service is a long standing tradition among many families within the Core Worlds. Names such as Tagge, Ozzel, and Dodonna stand out as families that have long served the Galactic Republic since the Ruusan Reformation. With the declaration of the New Order, the Republic military has transformed.\n\nTo older officers, the ideals of Palpatine's Empire bring exactly what he promised - safety, security, justice, and peace. In many ways, its strengthining the ideals of the Republic. In contrast, newer officers view the Republic as a failed system and only through a show of might and rule of fear can order be maintained. These conflicting attitudes lead to infighting among the 'Generationals' and zealous adherents to the harshest part of Imperial doctrine, further manifesting themselves in more politically-connected junior officers being put into higher positions of authority as opposed to veteran officers who served during the Clone Wars.\n\nWhile this is mostly an internal issue for the Imperial military, outsiders see it as nothing more than theatrics. In many cases, its framed as nothing more than a shake up of nepotism in the military."
 swnd_galactic_cw_leadup.13.a: "Support the old guard."
 swnd_galactic_cw_leadup.13.a.tooltip: "Their expertise is vital for the Empire."
 swnd_galactic_cw_leadup.13.b: "Support new leadership"
 swnd_galactic_cw_leadup.13.b.tooltip: "The old guard will fall into place eventually."
 swnd_galactic_cw_leadup.13.c: "Nothing but pure nepotism on display."
 swnd_galactic_cw_leadup.13.c.tooltip: "How pathetic."
 swnd_galactic_cw_leadup.13.d: "Lets monitor this closely."
 swnd_galactic_cw_leadup.13.d.tooltip: "I wonder how many will defect."

 swnd_galactic_cw_leadup.100.name: "A Changing Galaxy"
 swnd_galactic_cw_leadup.100.desc: "The galaxy is changing beyond our borders. While things are going about normally on [Root.GetAdjective], the Galactic Empire is expanding its rule. Reparations are paid and punishments are issued against worlds that chose to stand alongside the former Confederacy of Independent Systems. From what we can gather from our informants, there is some growing discontent with these proposals.\n\nAnother point of contention comes from the fate of prisoners captured by the Grand Army of the Republic. Debates of mercy versus retribution echo throughout the Imperial Senate as representatives from across the galaxy weigh their options."
 swnd_galactic_cw_leadup.100.a: "Maybe its good we're not involved.."
 swnd_galactic_cw_leadup.101.name: "The Fallen Order"
 swnd_galactic_cw_leadup.101.desc: "Through various government bodies, the Empire is rewriting galactic history to suit its needs. One of the many things being revised is the role of the Jedi Order.\n\nOur informants tell us the official narrative is the Jedi tried to overthrow the Supreme Chancellor in a move that left him disfigured. The reality must be vastly different as our limited interactions with the Jedi in the past show a level of devotion to the Republic. To further complicate things, it appears within moments of the declaration of the Empire, the order was given to hunt down and eliminate, or at the very least capture any known Jedi that were not killed at the Jedi Temple.\n\nIt would not be surprising at all if the reality was far from different.."
 swnd_galactic_cw_leadup.101.a: "Maybe its good we're not involved.."
 swnd_galactic_cw_leadup.102.name: "Indoctrination"
 swnd_galactic_cw_leadup.102.desc: "More news reaches us from the wider galaxy. The Galactic Empire's grip tigthens across various domestic areas. An organization known as the Commission for the Preservation of the New Order is leading the charge in promoting unwavering patriotism and absolute loyalty to the Empire. For its most ardent supporters, the decay and corruption of the Repubic, the treason of the Jedi Order, and the superiority of humans in the galaxy are key tenants of the New Order.\n\nThese changes are alarming and draw a lot of concern throughout the galaxy. There's concerns about possible repealing of anti-slavery laws and even barring near-humans from military service. However, there is a growing opposition to these reforms. Only time will tell what may come of it."
 swnd_galactic_cw_leadup.102.a: "Unfortunate."
 swnd_galactic_cw_leadup.103.name: "Veterans"
 swnd_galactic_cw_leadup.103.desc: "The Imperial military is making drastic changes to its composition and leadership. Our sources tell us that a bill is introduced to the Imperial Senate that will begin the process of phasing out its legions of clone troopers in exchange for human recruits. The reasons given range from their rapid aging to the risk of clone madness and disloyality. The bill is facing harsh opposition though and questions about what to do with the remaining clones. For some, its a matter of what to do with military surplus and for others its an issue of taking care of those who's sole existence is to fight.\n\nWithin the Imperial military though, there are rumors of an ongoing fight between senior officers with long standing histories of military service and younger, politically connected extremists. This generational conflict, while not readily visible to the public, will no doubt have a lasting effect on effectiveness of the Imperial military moving forward."
 swnd_galactic_cw_leadup.103.a: "Keep us posted."
 swnd_galactic_cw_leadup.104.name: "Growing Power"
 swnd_galactic_cw_leadup.104.desc: "More news comes to us from the wider galaxy. The Empire is pursing a policy of nationalization that seeks to further their control of various industries held by former Separatist powers. By seizing arms manufacturers, shipyards, and foundries, not only can they cripple a potential threat, but also repurpose them for the growing Empire.\n\nFurthermore, their current monetary system is upended as Republic credits have no value anymore. Citizens now need to register chain codes in order to obtain newer Imperial credits. While the exchange rate is nearly the same, changing how credits are handled further solidifies the power of the Empire."
 swnd_galactic_cw_leadup.104.a: "Worrisome."
 swnd_galactic_cw_leadup.105.name: "Imperial Might"
 swnd_galactic_cw_leadup.105.desc: "The might of the Imperial military cannot be understated. Contrary to what many would hope, the Empire did not demilitarize after the Clone Wars. Recruitment numbers are swelling and the shipyards at Kuat and Fondor are continuously pumping out newer ships as older designs are phased out service.\n\nWe've also noticed an increased amount of Imperial probes exploring the fringes of our borders. While there is no immediate concern, the Empire's interest in our area of space is concerning."
 swnd_galactic_cw_leadup.105.a: "We will monitor their actions closely."
 
 # Galactic Civil War
 swnd_gcw_war.100.name: "Called to War"
 swnd_gcw_war.100.desc: "The Rebel Alliance has risen up against the Empire, casting the galaxy back into war. This is the default text and you should be getting a custom desc!"
 swnd_gcw_war.100.descAlliance: "War! There can no longer be any hesitation, our friends in the §YAlliance§! are already striking Imperial targets across the galaxy. The §REmpire§! has found the retribution it has for so long sought. The §YRebellion§! has extended a formal request for us to join them - will we rise with them?"
 swnd_gcw_war.100.descImperial: "War! The malcontent rabble of the galaxy have swarmed to attack the §YGalactic Empire§!, threatening to resurrect the corruption of the §RRepublic§!. Our §HEmperor§! has promised to put down this foolish rebellion and punish every world that fights with them. We've been asked to supply our forces for the effort."
 swnd_gcw_war.100.descBoth: "War! The §YOld Republic§! loyalists have banded together with upstart rebels and declared against the §YEmpire§!! Both powers are pressuring us to give support. If we declare for either, we will be traitor to the other, forced to fight former friends. Perhaps worse, if we declare for neither, we will be scorned by both.\n\nEven still, we are in a unique position. In the wake of either side's defeat, there will no doubt be a power vacuum. One that we should seek to fulfill."
 swnd_gcw_war.100.descNeither: "War! Across the galaxy, systems are rising up in rebellion against the §YGalactic Empire§!. The §YRebel Alliance§! is searching for allies to support their cause and the Empire is rallying forces as this civil war starts to unfold.\n\nDespite the circumstances, it may be better of us to not get involved. Neither side has our allegiance, and they may ignore us until long after this crisis passes. Hopefully."
 swnd_gcw_war.100.descHate: "The §RImperial§! tools are finally under attack by those bumbling fools that call themselves a §Rrebellion§!. Much to our fortune, may they both rot.\n\nAt least we will be around to pick up the pieces."
 swnd_gcw_war.100.descConfederate: "The §YRebel Alliance§! has risen up against the tyrant former-\"§RRepublic§!\", finally fighting for the truths we knew all along!"
 swnd_gcw_war.100.descMandoClans: "The §YRebel Alliance§! has reached their breaking point and finally have declared war against the §RGalactic Empire§!. Now is the time for §YMandalore§! to choose whether to stand with the rest of the galaxy or stand on the sidelines as galactic history is made." 
 swnd_gcw_war.100.descMandoSector: "The time has come. The §RRebel Alliance§! has declared war against the §YGalactic Empire§! and the §HEmperor§! is calling upon all of his allies to join in the fight.\n\nWe should take full advantage of the situation and join with the §YEmpire§! to preserve the New Order. Perhaps the §HEmperor§! will be kind to enough to let us keep what we take."
 swnd_gcw_war.100.descCartels: "The §YRebel Alliance§! has risen up against §YImperial§! forces, the Galactic Civil War has begun. Where there is struggle there is opportunity- opportunity for profit."
 swnd_gcw_war.100.descAloof: "War has come to the so-called §YEmpire§!. Great masses have risen up against their oppressor, intent on freedom or death. It is not our fight, but no-doubt galactic history is being freshly written with every passing day."
 swnd_gcw_war.100.opta: "For freedom! We will rise against §RImperial§! tyranny."
 swnd_gcw_war.100.optb: "For order! We will bring these misguided §Rrebels§! to heel."
 swnd_gcw_war.100.optc: "There is too much for us to lose, we will not fight in this war."
 swnd_gcw_war.100.optd: "§YMandalore§! will fight against the §REmpire§!!" #Mandalore Clan specific
 swnd_gcw_war.100.opte: "§YMandalore§! will fight for the §YEmpire§!!" #Mandalore Sector specific

 swnd_gcw_war.101.name: "A Pivotal Choice"
 swnd_gcw_war.101.descOLAlliance: "Dignitaries from the §Y[FROM.GetName]§! have informed us that the galaxy is rising up against the §REmpire§!, and that they intend to fight with the §YAlliance to Restore the Republic§!. Already the first skirmishes are taking place, and we've been firmly \"asked\" to commit our forces to the cause.\n\nWhatever our sentiment, we are presented with an opportunity that cannot be understated. We can join our allies and help topple the §REmpire§!, but we could also use this crisis to declare our independence, and hope that fighting with the Empire will be enough to cripple the [From.GetName]. Perhaps with our overlord weakened, we could defeat them in §Rthe war that would surely break out between us.§!"
 swnd_gcw_war.101.descOLImperial: "Dignitaries from the §Y[FROM.GetName]§! have informed us that the §YEmpire§! is under attack from §Rorganized rebel forces§!, and that they expect our aid against them. Already the first skirmishes are taking place and the fleets are deploying to known strongholds.\n\nWhatever our opinion of these \"freedom fighters\", we are presented with an opportunity that cannot be understated. We can join our allies and help crush the rebellion, or we could also use this crisis to declare our independence, and hope that fighting with the §RRebels§! will be enough to cripple the §Y[From.GetName]§!. Perhaps with our overlord weakened, we could defeat them in §Rthe war that would surely break out between us.§!"
 swnd_gcw_war.101.descOLNeutral: "After years of escalating tension, Galactic Civil War has broken out. Our overlords in the §Y[From.GetName]§! have decided neither side will get their direct support, and so they expect we will follow suit. Avoiding the fighting may leave our masters relatively stronger than other galactic states, but this moment asks soul-searching of us all.\n\nIf we do nothing, we will stay out of the conflict as well, but if we are called to fight, then we'll have no choice but to §Rdeclare war on our overlord as well.§!"
 swnd_gcw_war.101.opta: "We will stand with the Alliance, whatever the cost!"
 swnd_gcw_war.101.optb: "We will support our Empire, to the last breath!"
 swnd_gcw_war.101.optc: "In civil wars there are only losers. We will not fight for anyone else."
 
 swnd_gcw_war.102.name: "Going Our Own Way"
 swnd_gcw_war.102.descBrokenTies: "Galactic Civil War has consumed our old alliance, we find ourselves on opposed sides. It was almost quiet when our dignitaries delivered the news that we would not be fighting alongside our former friends. We will rise to meet this moment of chaos and violence, but we have chosen a path that we can never unwalk.\n\nWe will do what we must."
 swnd_gcw_war.102.descSubject: "There comes a time when a nation must band together and stand for justice at any cost. The Galactic Civil War has thrown the galaxy into chaos, putting neighbor against neighbor, ally against ally, subject against overlord. We will fight, throw off our shackles, and write our name on the face of history!"
 swnd_gcw_war.102.opta: "The die is cast."
 
 swnd_gcw_war.103.name: "Our Ties Forsaken"
 swnd_gcw_war.103.descOverlord: "The breakout of Galactic Civil War tests many bonds, one such being our agreement with [FROM.GetName], our foolish vassal who've now §Rdeclared war on us!§! We must crush their independence war and secure our influence before the situation spirals out of control."
 swnd_gcw_war.103.descLostTies: "The abrupt departure of [FROM.GetName] from our alliance is hard news, but this moment has been building for a long time. The Galaxy is plunged into war, and that means new friends, and new enemies. Should our former allies cross us we will do what we must."
 swnd_gcw_war.103.opta: "So be it."
 
 # Empire toppled
 swnd_gcw_war.200.title: "An Empire Toppled"
 swnd_gcw_war.200.descAlliance: "Our brave forces have done the impossible - the Imperial Capital has fallen and the [FromFrom.GetRulerTitle] is missing, presumed dead!\n\n[This.GetName], and by extension the whole of the Galactic Senate, is at our mercy, we need only to give our next orders."
 swnd_gcw_war.200.descImperial: "§RDisaster and tragedy!§! The Imperial Capital has fallen to traitor forces and the [FromFrom.GetRulerTitle] is missing, perhaps dead! Our governors are already scrambling to contain the damage, and several Moffs §Rare not reporting in!§!"
 swnd_gcw_war.200.descBystander: "Our brave forces have done the impossible - the Imperial Capital has fallen and the [FromFrom.GetRulerTitle] is missing, presumed dead!\n\n[This.GetName], and by extension the whole of the Galactic Senate, is at our mercy, we need only to give our next orders."
 swnd_gcw_war.200.optAlliance: "Transfer [This.GetName] to the Alliance, this victory is for them."
 swnd_gcw_war.200.ttAlliance: "The Alliance will decide what to do with the Senate."
 swnd_gcw_war.200.failLowRelations: "We will not hand the galactic government to a hostile power."
 swnd_gcw_war.200.failHighRelations: "We will not punish our allies."
 swnd_gcw_war.200.optRestoreAndRemove: "Throw every imperial out of office, restore the Republic."
 swnd_gcw_war.200.ttRestoreAndRemove: "The New Republic will rise like a phoenix."
 swnd_gcw_war.200.failTooWeak: "We don't have enough power to control the Senate, they won't listen to us until we are the strongest galactic contender."
 swnd_gcw_war.200.failTooWeakForNewEmpire: "There are many pretenders, but an Emperor must be §Rthe strongest of them all.§!"
 swnd_gcw_war.200.optRestore: "Just restore the Republic."
 swnd_gcw_war.200.ttRestore: "The New Republic will rise from the rubble of the Empire. The remaining imperial forces deserve a say in this future."
 swnd_gcw_war.200.optRemove: "Throw the imperials out and restore the Senate."
 swnd_gcw_war.200.ttRemove: "The Imperial government will be toppled, and the forces aligned against them allowed to return. No country will have legal power over any other."
 swnd_gcw_war.200.optDissolve: "Galactic tyranny is over. Dissolve the Senate."
 swnd_gcw_war.200.ttDissolve: "Empire, Republic, it's all the same. The Senate has long outlived its purpose. We will send §Yevery country§! away from [This.GetName] and return diplomacy to the nations of the galaxy directly."
 swnd_gcw_war.200.optCustodian: "This is OUR moment. We will §Ylead§! the galaxy!"
 swnd_gcw_war.200.ttCustodian: "The Empire was a mistake, but we can do better. We will throw out the Imperials and assume leadership as §YSupreme Chancellor.§!"
 swnd_gcw_war.200.optSecondEmpire: "This is OUR galaxy! We will rule §Rthe New Empire!§!"
 swnd_gcw_war.200.ttSecondEmpire: "The Old Republic was a farce, and the Old Empire worse. We will show the galaxy what §Rreal power is.§!"
 
 # Empire toppled by ally
 swnd_gcw_war.205.title: "An Empire Toppled"
 swnd_gcw_war.205.desc: "At long last, the alliance is triumphant! Our allies in the [From.GetName] have entered the last stronghold of the Empire on [event_target:planet_conquered_capital.GetName] and turned the planet over to us. It's time to write the next chapter in galactic history and put this darkness behind us."
 swnd_gcw_war.205.optNewRepublic: "Our New Republic!"
 swnd_gcw_war.205.ttNewRepublic: "It is time for a New Republic!"
 swnd_gcw_war.205.optSecondEmpire: "...What if it were our own §RGalactic Empire?§!"
 swnd_gcw_war.205.ttSecondEmpire: "So much has happened since we set out... what if WE were the §RNew Galactic Empire?§!"
 
 swnd_gcw_war.203.desc: "PLANET CONQUERED!\nThis = [This.GetName]\nFrom = [From.GetName]\nFromFrom = [FromFrom.GetName]"
 swnd_gcw_war.204.desc: "PLANET CONQUERED BY SOMEONE ELSE!\nThis = [This.GetName]\nFrom = [From.GetName]\nFromFrom = [FromFrom.GetName]\nFFF = [FromFromFrom.GetName]"
 
 # New galactic government announcement
 
 swnd_gcw_war.220.title: "A New Republic"
 swnd_gcw_war.220.desc: "The Empire has fallen! The §YNew Republic§! was proclaimed earlier today straight from the floor of the Galactic Senate. The Alliance to Restore the Republic has emerged triumphant in its struggle to liberate the galaxy and the Imperial loyalists have been cast out!  This is truly a historic day.\n\nAs Alliance forces drove out the last remnants from the planet, it became clear that this victory will not mean the end of the war. Imperial forces are still present throughout the wider galaxy, no longer dominant but no less zealous. Full victory will only come when the enemy has been wiped out!"
 swnd_gcw_war.220.opta: "A new era of freedom."
 swnd_gcw_war.221.title: "The Republic Restored"
 swnd_gcw_war.221.desc: "The Empire has ended! The §YNew Republic§! was proclaimed earlier today straight from the floor of the Galactic Senate. The Alliance to Restore the Republic has emerged triumphant in its struggle to liberate the galaxy. The new administration has graciously allowed its Imperial foes to remain, diminished, within the galactic community. This is truly a historic day for the galaxy.\n\nHowever historic, it's become clear that this victory will not mean the end of the war. Imperial forces remain steadfast, no longer dominant but no less zealous. Full victory will only come when the enemy has been wiped from the galaxy!"
 swnd_gcw_war.221.opta: "A new era of cooperation."
 swnd_gcw_war.222.title: "End of the Empire!"
 swnd_gcw_war.222.desc: "The Empire has fallen! Victorious forces on the surface of [From.GetName] have thrown out all Imperials from the senate and allowed members of the Alliance to return. No more will the galaxy be ruled by any one claimant, but once again by true consensus.\n\nHowever historic, it's become clear that this victory will not mean the end of war. Imperial forces remain steadfast, no longer dominant but no less zealous. Full victory will only come when the enemy has been wiped from the galaxy!"
 swnd_gcw_war.222.opta: "Thus always to tyrants."
 swnd_gcw_war.223.title: "Dissolution!"
 swnd_gcw_war.223.desc: "The Empire and Senate are no more! The conquering forces of the [FromFrom.GetName] have seized all of the former government's workings on [From.GetName] and promised to destroy them outright. Diplomacy has been returned to states working independently with other states, no longer encumbered with the consent of bureaucrats far away.\n\nThe wars will continue, and no doubt there will be future conflicts, but for now the nations of the galaxy are finally free to determine their own paths. Including restarting the senate - but that'd be silly, right?\nRight?"
 swnd_gcw_war.223.opta: "The end of an era."
 swnd_gcw_war.224.title: "A New Chancellorship"
 swnd_gcw_war.224.desc: "The Empire has fallen! Forces of the [FromFrom.GetName] have seized the capital and declared their leader the §YNew Supreme Chancellor of the Galaxy!§! This is truly a historic day.\n\nEnjoying a position of dominance over their rivals for leadership, it appears the new government will go into immediate effect."
 swnd_gcw_war.224.opta: "Is this legal?"
 swnd_gcw_war.225.title: "NEW, GALACTIC, EMPIRE!"
 swnd_gcw_war.225.desc: "The Old Empire has fallen! Hail the §RNew Empire§!! Upon seizing the capital, leaders of the [FromFrom.GetName] have declared that all galactic government functions will now answer to them, and that all will obey their will. As de-facto galactic hegemon, there are none who can object. Yet.\n\nUnderstandably, this has §Rgreatly offended§! everyone with an interest."
 swnd_gcw_war.225.opta: "So turns the Wheel."
 
 # Alliance picks (scope change)
 swnd_gcw_war.226.title: "A New Republic"
 swnd_gcw_war.226.desc: "The Empire has fallen! The §YNew Republic§! was proclaimed earlier today straight from the surface of [FromFrom.GetName]. The Alliance to Restore the Republic has emerged triumphant in its struggle to liberate the galaxy and the Imperial loyalists have been cast out!  This is truly a historic day for the galaxy.\n\nAs Alliance forces drove out the last remnants from the planet, it became clear that this victory will not mean the end of the war. The Imperial forces are still present, no longer dominant but no less zealous. Full victory will only come when the enemy has been wiped from the galaxy!"
 swnd_gcw_war.226.opta: "A new era."
 swnd_gcw_war.227.title: "NEW, GALACTIC, EMPIRE"
 swnd_gcw_war.227.desc: "The Old Empire has fallen! Hail the §RNew Empire§!! Forces of the [This.GetName] have declared that all government bodies will now answer to them and them alone. Undoubtedly a surprise to their former allies, but as galactic hegemon there are few who can object.\n\nUnderstandably, this has §Rgreatly offended§! everyone involved, and comes as a §Rstinging betrayal§! of their cause. The New Empire will still have to finish off the old to cement their rule, and keep it from challengers once they do."
 swnd_gcw_war.227.opta: "So turns the Wheel." 
 
