 # Successor splinters
 swnd_gcw_war.248.title: "Containing The Fallout"
 swnd_gcw_war.248.desc: "§RDisaster and tragedy!§! The Imperial Capital has fallen to traitor forces and we've lost contact with our Emperor! Our governors are already scrambling to contain the damage, and several Grand Moffs have gone silent to our messages! We've demanded §Rall Imperial forces, including vassals,§! rally to our banner. We're §Yintegrating their command structures§! under ours effective immediately.\n\nThe Empire will be eternal!"
 swnd_gcw_war.248.opta: "Desperate times call for desperate measures."
 swnd_gcw_war.251.title: "A Realm Shattered"
 swnd_gcw_war.251.descWarlords: "Dire news! The loss of our beloved and noble Emperor was not enough for fate, as now §Rthe Empire has splintered!§!\n\nThe Grand Moffs squabble between themselves like spoiled children! Already the pretenders are consolidating the Empire's forces under their own commands, and while we remain under outside threat! We must fend off our enemies and bring the traitor sectors back into the fold if we are to survive."
 swnd_gcw_war.251.descPalpsQQ: "\"News of my death has been grea- Hey wait, where are you going? Come back here!\nCOME BACK HERE!!\n\nAh, poodoo.\"\n\nThe Empire has splintered! We must fend off our enemies and bring the rogue sectors back into the fold if we are to survive."
 swnd_gcw_war.251.opta: "This is our darkest hour."
 swnd_gcw_war.251.tta: "These so-called "Imperial Warlords" are attacking each other, and the rebels, and us. It's chaos!"
 swnd_gcw_war.252.title: "Splinters"
 swnd_gcw_war.252.desc: "Following recent defeats, the Galactic Empire has §Rshattered!§!\n\nThe former admiralty and moffs of the Empire have set at each others' throats, and many have declared themselves the \"true and legitimate successor\" of the Emperor's realm. In addition to rebels, these splinter warlords are fighting against each other. Take care, as weakened as they are they are yet potent.\n\nSomewhere out there is also the Imperial Remnant under the Ruling Council - it is they who still hold the largest concentration of the old Emperor's forces.\n\nDEV NOTE: A LOT JUST CHANGED. THIS IS A GOOD MOMENT TO SAVE, RETURN TO MENU, AND RELOAD THE GAME."
 swnd_gcw_war.252.opta: "The Old Empire is undone!"
 swnd_gcw_war.255.title: "Under New Leadership"
 swnd_gcw_war.255.desc: "The loss of the capital and our beloved, noble Emperor has shaken us all, but our forces have yet rallied! Hail our new Emperor, [This.GetRulerName]! The ruling council provided its blessing earlier today. We enter a new era under [Root.leader.GetHerHis] leadership, and we will prevail!"
 swnd_gcw_war.255.opta: "Long live the Emperor!"
 # These attempts on my life have left me EXTRA scarred and deformed.
 swnd_gcw_war.260.title: "Bloodied, Unbeaten"
 swnd_gcw_war.260.desc: "The loss of [This.GetName] is a tragic setback, but we will right this wrong. Our people remain strong. Our forces remain strong. Our Emperor remains strong. §YOur Empire remains strong!§! Regroup, attack, and drive these traitors back from our homes!"
 swnd_gcw_war.260.opta: "Spare none."
 
 # THE WAR IS OVER
 swnd_gcw_war.500.title: "The War For The Galaxy Is Won"
 swnd_gcw_war.500.descAlliance: "The Galactic Civil War is over!\n\nA day many thought would never come has finally arrived, and at long last there is a victor. The Alliance to Restore the Republic has defeated the Galactic Empire and taken its place among the strongest nations of the galaxy. Their journey is not yet over, but the war to secure their rule finally, finally is."
 swnd_gcw_war.500.descEmpire: "The Galactic Civil War is over!\n\nA day many thought would never come has finally arrived, and at long last there is a victor. The Galactic Empire has defeated the Rebel Alliance and stamped out the most famous threat to its rule. Let this be a lesson to all traitors, your day will come!\n\nThe Empire will no doubt face more hardships, but today its grip around the galaxy tightens."
 swnd_gcw_war.500.opta: "Hail the victorious dead!"
 