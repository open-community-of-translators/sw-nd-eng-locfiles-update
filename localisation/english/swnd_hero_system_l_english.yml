 # 1 November 2025 #
 swnd_unique_character_event.10.name: "Principled Dissension"
 swnd_unique_character_event.10.desc: "The §HImperial Senate§! is a mere shadow of its former self.\n\nEvery session starts the same way with a seemingly mindless repetition of an oath to peace and bounty throughout the §REmpire§!. The oathkeeper's call and the senators' response. Every session ends with something being chipped away at from the foundation of the Republic. Increased military spending, the introduction of a new currency, the disregard for the rights and lives of non-Humans.\n\nTo this end, some senators join §YBail Organa of Alderaan§! and §YMon Mothma of Chandrila§! in a principled dissent of the new regime. Even §YBail's daughter Leia§! supports the efforts of her father and his associates. But even in his dissent, he fosters an Alderaanian resistance that works closely with Mothma's contacts."
 swnd_unique_character_event.10.a: "Curious."
 swnd_unique_character_event.11.name: "A New Senator"
 swnd_unique_character_event.11.desc: "News from the Holonet says that §YBail Organa§! is stepping aside, allowing his daughter to take over his senatorial duties as he refocuses his efforts on galactic aid and relief.\n\n§YLeia§!, mentored by both her father and §YMon Mothma§!, continues the work her father championed for during his tenure as senator of §YAlderaan§!. Much like Bail, she remains critical of the §REmpire's§! oppressive nature after seeing firsthand the crulelty of men such as §YTarkin§!."
 swnd_unique_character_event.11.a: "We'll watch her career with great interest."
 swnd_unique_character_event.12.name: "Seeds of a Rebellion"
 swnd_unique_character_event.12.desc: "Throughout the known galaxy, pockets of resistance to the §REmpire§! are springing up. From the §BCore§! to the §BOuter Rim§!, a mix of organized cells and established organizations are fighting Imperial oppression through whatever means they can.\n\nA cell in the Outer Rim is seeking support for a series of operations aimed at striking Imperial manufacturing efforts on their planet. They know through previous dealings with Bail that House Organa can provide the support they need."
 swnd_unique_character_event.12.a: "Provide financial support"
 swnd_unique_character_event.12.b: "Provide material support"
 swnd_unique_character_event.12.c: "Provide some other support" #wip
 swnd_unique_character_event.13.name: "Secret Mission"
 swnd_unique_character_event.13.desc: "The cell that §HHouse Organa§! funded is making successful strikes at the Imperial facilities on their planet and §YBail's§! money trail is well hidden. In response to the overwhelming successes of the cell, the planet's governor has locked down the system. As an extension of good will toward to the §REmpire§!, §YAlderaan§! is offering to support a relief mission to an occupied world, overseen by §YLeia§! personally.\n\nIn reality, the ships being sent will be \"stolen\" by members of the cell to bolster their own forces. §YLeia's§! willingness to go is only for plausible deniability."
 swnd_unique_character_event.13.a: "A rather risky plan, no?"
 swnd_unique_character_event.14.name: "A Hitch"
 swnd_unique_character_event.14.desc: "The ships arrive at the landing pad with no issues and §YLeia§! and her crew are greeted by some rebels disguised as stormtroopers and are informed that more of their members are near by to help. The plan starts off on the right foot but none of them were expecting the ships to be locked down, much less guarded by two AT-ATs. Confronted by this new predicament, §YLeia§! now has to figure out a way to ensure this cell gets their walkers.\n\nWhen asked why the ships were locked down, the garrison officer simply stated that Alderaanian ships have tendency to be stolen. Leia is now left to figure out the best way to ensure that the ships can be hijacked by the cell and keep the §HOrgana§! name clean from outwardly supporting some rebels.\n\nShe can easily let the §REmpire§! conduct their inspection and run the risk of weapons being found stashed away or she can let the rebel cell take charge from here. In any case, she's given permission to the rebels to incapacitate her to make their \"theft\" of the ship look real."
 swnd_unique_character_event.14.a: "Let the cell take charge."
 swnd_unique_character_event.14.a.tooltip: "They know best after all."
 swnd_unique_character_event.14.b: "Let the §REmpire§! conduct their inspection."
 swnd_unique_character_event.14.b.tooltip: "We've only got some things to hide."
 swnd_unique_character_event.15.name: "A Successful Raid"
 swnd_unique_character_event.15.desc: "Taking a chance with the cell, §YLeia§! offers herself as a distraction, telling one of the disguised rebels that on her order they should stun her as they make their escape.\n\n§YLeia§! confronts the garrison officer about the procedures for detaining the ships, demanding that they stop preventing their attempt at relief. As the two of them argue, the rebels make their move.\n\nOne team sends out an old astromech unit to help disengage the locking mechanism and quickly boards one of the ships and fires upon the Imperials before taking off. The second team quickly tries to disable the AT-ATs, firing a proton torpedo at it and shooting out its legs before commandeering the ship. The third team springs into action and tries to take off, only to find the lock is not fully disengaged. Through some quick thinking, they force it loose, damaging the ship a little but also taking out the second AT-AT in the process.\n\n§YLeia§! motions to the two disguised rebels taking cover at her side and they nod. With their blasters set to stun, two bolts hit §YLeia§! as they make their escape. The princess collapses and comes to shortly after and sees the aftermath of the raid. No casualties on either side and the rebels have their ships."
 swnd_unique_character_event.15.a: "Mission accomplished."
 swnd_unique_character_event.16.name: "In the Clear"
 swnd_unique_character_event.16.desc: "§YLeia§! looks at her stormtrooper escort and nods. She's confident that after a routine inspection that they will find nothing out of place. As the garrison commander joins the others inside the ship, she tells the disguised rebels to go ahead and set their blasters to stun just in case.\n\nA few minutes pass and the garrison commander gives an all-clear, motioning for §YLeia§! and the stormtroopers with her to resume their duties. Just as §YLeia§! turns to head toward the Lambda-class shuttle to return to §YAlderaan§!, she gives the signal and one of stormtrooper stuns her. A brief skirmish breaks out with the rebels able to escape with the ships and weapon cache."
 swnd_unique_character_event.16.a: "Bail will be pleased."
 swnd_unique_character_event.17.name: "Found Something"
 swnd_unique_character_event.17.desc: "The initial inspection clears the ships but the garrison commander insists on doing another pass. §YLeia§! watches from a distance with her disguised escorts. She tells the escorts to set their blasters to stun just in case. She'd rather not have to deal with anyone's blood on her hands today.\n\nThe inspection seems to take longer than expected. The garrison commander orders the two disguised rebels to bring Leia to the ship. Once inside, one of the stormtroopers brings out a crate with several blaster rifles and plasma cartridges inside. §YLeia§! feigns ignorance, claiming that because of recent pirate attacks, Alderaanian crew keep a stash of higher-end weapons on hand. The officer gives the order to arrest and the disguised rebels make their move, stunning §YLeia§! and the other Imperials. A skirmish breaks out as other rebels quickly swarm the landing area. The locks are undone and the AT-ATs are wrecked from one of the corvettes colliding into them.\n\n§YLeia§! comes to on a Lambda-class shuttle enroute to §YAlderaan§!. An attending protocol droid informs Leia that a group of rebels hijacked the ship and the garrison officer is gravely sorry for any accusations. She smirks to herself. \"Tell them that they owe the §HRoyal House of Alderaan§! a reimbursement of 2,242,500 credits.\"."
 swnd_unique_character_event.17.a: "Very well." #wip change
 swnd_unique_character_event.18.name: "Princess of Alderaan"
 swnd_unique_character_event.18.desc: "Treason! In a move that stuns the Imperial Senate, the Empire has branded Princess §YLeia Organa§! as a traitor and a member of the §HRebel Alliance§!. How this will affect galactic affairs is yet to be seen.\n\nTo some, §YLeia§! is seen as a beacon of hope in dark times. To others, she's a young upstart."
 swnd_unique_character_event.18.desc.imperial: "Treason! In a move that stuns the Imperial Senate, the Empire has branded Leia Organa as a traitor and a member of the §RRebel Alliance§!.\n\n§YLeia§!'s legacy, much like her father's, is tarnished. The Empire will keep a close eye on Alderaan and monitor how House Organa spends their money." # WIP
 swnd_unique_character_event.18.desc.alliance: "Treason! In a move that stuns the Imperial Senate, the Empire has branded §YLeia Organa§! as a traitor and a member of the §HRebel Alliance§!.\n\nJoining her father and Senator §YMon Mothma§!, she will help coordinate Alliance operations and join the fight against Imperial oppression." # WIP
 swnd_unique_character_event.18.a: "An interesting development"
 swnd_unique_character_event.18.b: "She will be brought to justice!"
 swnd_unique_character_event.18.c: "A new hope."