l_english:

 ##### Prescripted Leaders #####
 ### Imperial ###
 palpatine_backstory: "Starting as a mere senator from §YNaboo§! and rising to the rank of Supreme Chancellor, §Y[This.GetName]§! rules over the §YFirst Galactic Empire§!."
 palpatine_catchphrase: "I love democracy."
 vader_backstory: "§Y[This.GetName]§!, once known as the legendary Anakin Skywalker, is a Sith Lord feared across the galaxy. Serving as the §HEmperor's§! right hand, he hunts down any remaining Jedi and crushes pockets of rebellion across the galaxy."
 vader_catchphrase: "No. I am your father."
 tarkin_backstory: "With a career spanning from governor to officer in the Republic Navy, §Y[This.GetName]§! is known for his ruthlessness and cruelty."
 tarkin_catchphrase: "You may fire when ready."
 yularen_backstory: "§Y[This.GetName]§! is the very model of a modern Imperial admiral who gained much recognition for his service to the Republic Navy during the Clone Wars."
 yularen_catchphrase: "This is why we plan. This is why we work so hard when we're at peace. This is why we recruit so carefully and demand so much."
 pellaeon_backstory: "§Y[This.GetName]§! continues his naval service under the §YEmpire§!."
 pellaeon_catchphrase: "It isn't the killing, you know. It's the beauty of battles that I love - the choreography and the challenge of executing everything just right - and the challenge of matching your wits against a capable opponent."
 thrawn_backstory: "Mitth'raw'nuruodo, also known as §Y[This.GetName]§!, is a renowned and ruthless Chiss strategist. He served in the §YChiss Ascendancy§! before joining the §YEmpire§!."
 thrawn_catchphrase: "When you understand a species' art, you understand that species."
 miltin_takel_backstory: "Despite being one of the original twelve Grand Admirals and a man of upstanding military knowledge, §Y[This.GetName]§! is known for his addiction to spice and his affinity for non-human women."
 miltin_takel_catchphrase: "It's like being able to see out of a third eye, man. Real prime."
 PRESCRIPTED_leader_name_pestage: "Sate Pestage"
 pestage_backstory: "§Y[This.GetName]§! is an ambitious ruler serving at the §HEmperor's§! side."
 pestage_catchphrase: "Without power, one dies."
 pensar_luc_backstory: "§Y[This.GetName]§! is a Grand Moff appointed to rule over the §YCiutric Hegemony§!."
 pensar_luc_catchphrase: "..."
 PRESCRIPTED_leader_name_panaka: "Quarsh Panaka"
 panaka_backstory: "§Y[This.GetName]§! is a Grand Moff appointed to rule over the §YChommel sector§!. He once served as the head of security for the §YRoyal Houses of Naboo§! for the late §HPadme Amidala§!."
 panaka_catchphrase: "..."
 PRESCRIPTED_leader_name_gustavu: "Laird Gustavu"
 gustavu_backstory: "§Y[This.GetName]§! is a Grand Moff appointed to rule over the §YTapani sector§!."
 panaka_catchphrase: "..."
 PRESCRIPTED_leader_garoche_tarkin: "Garoche Tarkin"
 garoche_tarkin_backstory: "§Y[This.GetName]§! is a scion of the wealthy and influential Tarkin family."
 garoche_tarkin_catchphrase: "..."

 ### Rebel ###
 mon_mothma_backstory: "§Y[This.GetName]§! serves as §YChandrila's§! senator and is a vocal critic of the rapid militarization of the §HGalactic Empire§!."
 mon_mothma_catchphrase: "I show you the stone in my hand, you miss the knife at your throat."
 rebel_mon_mothma_backstory: "§Y[This.GetName]§! leads the fledgling §YRebel Alliance§! against the might of the §HGalactic Empire§!."
 raddus_backstory: "§Y[This.GetName]§! served as a mayor on his homeworld of §YDac§! and is an outspoken member of the §YRebel Alliance§! known for his blunt and practical approaches."
 raddus_catchphrase: "This is Admiral Raddus of the Rebel Alliance. All squadron leaders, report in."
 swnd_hero_name_breha: "Breha Organa"
 breha_backstory: "§Y[This.GetName]§! is the Queen of §YAlderaan§!. She rules with a kind and even hand, valuing diplomacy and fairness over conflict."
 breha_catchphrase: "Authority can be given, but leadership must be earned."
 cham_syndulla_backstory: "§Y[This.GetName]§!, also known as §HThe Hammer of Ryloth§!, is a renowned freedom fighter and revolutionary leader."
 borsk_feylya_backstory: "Skilled in manipulation and strategy, §Y[This.GetName]§! is known for being a master of political theater. His aggressive pursuit for power leaves many divided on his methods. Despite this, he continues to pursue a path that will benefit the needs of the many over the needs of the one."
 borsk_feylya_catchphrase: "All those who are not on my side are my enemies."
 swnd_hero_name_lee_char: "Lee-Char"
 lee_char_backstory: "Crowned as 83rd §HKing§! of §YMon Cala§!, §Y[This.GetName]§! rules over both the Mon Calamari and Quarren in the wake of a terrible civil war. With the §YRepublic§! transitioning into the §HGalactic Empire§!, he hopes to lead his people toward a future without the threat of Imperial rule."
 lee_char_catchphrase: "wip"
 PRESCRIPTED_leader_luke_skywalker: "Luke Skywalker"
 luke_skywalker_backstory: "§Y[This.GetName]§! was raised on Tatooine as a moisture farmer and is the son of legendary Jedi general Anakin Skywalker. His connection to the force grows with each passing day."
 luke_skywalker_catchphrase: "I won't fail you. I'm not afraid."
 PRESCRIPTED_leader_leia_organa: "Leia Organa"
 leia_organa_backstory: "§Y[This.GetName]§! is the adoptive daughter of Senator §YBail Organa§! and his wife Queen §YBreha Organa§! of Alderaan. She served briefly in the Imperial Senate fighting for reform and change, continuing her father's ongoing work. She is fiercely independent and devoted to Rebel Alliance."
 leia_organa_catchphrase: "I feel like because I can fight, I have to, for those who cannot."
 PRESCRIPTED_leader_han_solo: "Han Solo"
 han_solo_backstory: "§Y[This.GetName]§! is a Corellian smuggler and pilot of the ship that made the Kessel Run in less than twelve parsecs. Hot-headed and loyal to his friends, he fights for the Rebel Alliance."
 han_solo_catchphrase: "Never tell me the odds!"
 PRESCRIPTED_leader_chewbacca: "Chewbacca"
 chewbacca_backstory: "§Y[This.GetName]§! is the son of Chief §YAttichitcuk§!. A veteran of the Battle of Kashyyyk, §Y[This.GetName]§! was captured and sold into slavery. He was eventually rescued by Han Solo, with whom he has a life debt with."
 chewbacca_catchphrase: "<<Shryiiwook>>"
 PRESCRIPTED_leader_obi_wan_kenobi: "Obi-Wan Kenobi"
 obi_wan_backstory: "§Y[This.GetName]§! is a Jedi Master in hiding. He was in charge of the 212th Attack Battalion during the Clone Wars and was Anakin Skywalker's master. With the rise of the Empire, Kenobi hides out on the desert world of Tatooine, keeping a low profile but not above showing kindness to the locals."
 obi_wan_catchphrase: "Hello there!"
 PRESCRIPTED_leader_luthen_rael: "Luthen Rael"
 luthen_rael_backstory: "Operating as a spymaster and masquerading as an antiques salesman, §Y[This.GetName]§! is in contact with several Rebel cells to coordinate and execute multiple operations all aimed at crippling the §HGEmpire§!."
 luthen_rael_catchphrase: "Think like a leader."

 ## Separatist ##
 marath_vooro_backstory: "§Y[This.GetName]§! oversees the remaining Confederate holdouts following the death of the several Separatist leaders on §YMustafar§! at the hands of §HDarth Vader§!."
 marath_vooro_catchphrase: "..."
 PRESCRIPTED_leader_kalani: "Kalani"
 kalani_backstory: "§Y[This.GetName]§! is a ST-series tactical droid that was involved during the Battle of Onderon during the Clone Wars. Following the Separatist defeat, his forces were stationed on §YAgamar§! and did not follow the shutdown order given by §HDarth Sidious§!."
 kalani_catchphrase: "Leave no survivors."

 ### Mandalorian ###
 bo_katan_backstory: "Despite being a princess of House Kryze, §Y[This.GetName]§!'s past is filled with connections to §HDeath Watch§! and the §HShadow Collective§!."
 bo_katan_catchprhase: "The enemy of my enemy is my friend."
 boba_fett_backstory: "The unaltered clone of the legendary Jango Fett, §Y[This.GetName]§!'s name instills fear in his enemies."
 boba_fett_catchphrase: "I'm a simple man making his way through the galaxy. Like my father before me."
 fenn_rau_backstory: "§Y[This.GetName]§! once led Skull Squadron during the Clone Wars and now leads his group of §YMandalorian Protectors§! from §YConcord Dawn§!."
 fenn_rau_catchphrase: "You haven't forgotten our ways. That has earned my respect."
 fenn_shysa_backstory: "A man with a complicated past, §Y[This.GetName]§! and his band of §YProtectors§! once worked for the CIS during the Clone Wars until betrayed by the §HEmperor§!."
 fenn_shysa_catchphrase: "If you only look after your own hide, then you're not a man."
 ursa_wren_backstory: "§Y[This.GetName]§! is a former member of §HDeath Watch§! and serves as the Countess of §YClan Wren§!. She joined §YBo-Katan Kryze§! in her fight against the §HShadow Collective§! during the final days of the Clone Wars."
 ursa_wren_catchphrase: "Mandalore must rise by itself. We protect our own."
 sabine_wren_backstory: "§Y[This.GetName]§! is the young idealist daughter of Countess §YUrsa Wren§! and artist father §YAlrich Wren§!. A former Imperial cadet and bounty hunter, she helps fight for §YMandalore's§! continued freedom."
 sabine_wren_catchphrase: "Never get between a Mandalorian and a weapons package."
 gar_saxon_backstory: "§Y[This.GetName]§! once served in §YMaul's§! §HShadow Collective§! during the final days of the Clone Wars. He now seeks a closer alliance with the §YGalactic Empire§!."
 gar_saxon_catchphrase: "Victory or death!"
 tiber_saxon_backstory: "§Y[This.GetName]§! is §YGar Saxon's§! brother and is fiercely loyal to the Imperial cause. To him, unquestionable loyalty and service to the Empire will protect §YMandalore§!."
 tiber_saxon_catchphrase: "I am the Empire! Palpatine has shown me the way to true power."
 PRESCRIPTED_leader_name_armorer: "The Armorer"
 armorer_backstory: "A strict adherent to the Way of the Mandalore, the enigmatic §Y[This.GetName]§! wields great influence over the §YChildren of the Watch§!."
 armorer_catchphrase: "This is the way."
 PRESCRIPTED_leader_name_paz_vizsla: "Paz Vizsla"
 paz_vizsla_backstory: "§Y[This.GetName]§! is a member of §YClan Vizsla§! and strict adherent to the Way of the Mandalore."
 paz_vizsla_catchphrase: "This is the way."
 PRESCRIPTED_leader_name_spar: "Spar"
 spar_backstory: "§Y[This.GetName]§! is a clone of Jango Fett and was one of the original Alpha ARCs before the outbreak of the Clone Wars. His past is filled with regret and betrayal."
 spar_catchphrase: "Kote!"

 ## Chiss ##
 PRESCRIPTED_leader_name_admiralaralani: "Ar'alani"
 aralani_backstory: "§Y[This.GetName]§! served with §HSenior Captain Mitth'raw'nuruodo§! and a member of the Irizi family. Her military ability was showcased in her multiple encounters with the §HGrysk§!."
 aralani_catchphrase: "We're here to deliver a message. Let's deliver it."
 PRESCRIPTED_leader_name_eli_vanto: "Eli Vanto"
 # eli_vanto_backstory: "§Y[This.GetName]§! is §YMitth'raw'nuruodo§!'s attaché to the §YChiss Ascendancy§!. He brings with him not only knowledge from the Imperial Academy, but wisdom and guidance taught by §YThrawn§! himself."
 # eli_vanto_catchphrase: "wip"

 ## Hutt ##
 PRESCRIPTED_leader_name_jabba: "Jabba Desilijic Tiure"
 jabba_backstory: "There are few crimelords as powerful and influential as §HHis Excellency §Y[This.GetName]§! of §YNal Hutta§!§!. He controls multiple smuggling, slaving, and piracy actions across the §BOuter Rim§!."

 ## Black Sun #
 ziton_moj_backstory: "§Y[This.GetName]§! rules as a Vigo for §YBlack Sun§! as well as a collaborator with §YMaul's§! §HShadow Collective§!."
 PRESCRIPTED_leader_name_xizor: "Xizor"
 xizor_backstory: "§Y[This.GetName]§! is one of the few surviving members of House Sizhran of §YFalleen§! and has a long-standing fued and hatred of §YLord Vader§!. He now leads §YBlack Sun§!, hoping to leverage his criminal empire to strike at the Emperor and his cybernetic lapdog."
 xizor_catchphrase: "To contend with Xizor is to lose."

 ### Other - from formables or neutral ###
 PRESCRIPTED_leader_name_jocasta: "Jocasta Nu"
 jocasta_nu_backstory: "Madame §Y[This.GetName]§! once served as §HChief Librarian§! in the Jedi Archives."
 jocasta_nu_catchphrase: "Don't let our deaths have been in vain."
 lama_su_backstory: "Serving as the Prime Minister of Kamino, §Y[This.GetName]§! now leads his people in uncertain times."
 lama_su_catchphrase: "We must be cautious."
 PRESCRIPTED_leader_name_tyber_zann: "Tyber Zann"
 zann_catchphrase: "There are always worlds that are ripe for corruption."
 zann_backstory: "While languishing in prison, §Y[This.GetName]§! made plans to bring the §YZann Consortium§! to power once more. With his newfound freedom, he aims to bring those plans into reality."
 PRESCRIPTED_leader_name_jerid_sykes: "Jerid Sykes"
 sykes_catchphrase: "Need a really big gun?"
 sykes_backstory: "§Y[This.GetName]§! is a former Republic Navy officer and a veteran of the Clone Wars. With the rise of the §HEmpire§!, he now serves the §YZann Consortium§!."
 taa_chume_backstory: "Queen Mother §Y[This.GetName]§! rules over the §YHapes Consortium§! with an iron fist."
 taa_chume_catchphrase: "Hapes can only be as strong as those who lead her."

 #######################
 ##### Hero System #####
 #######################

 ### Rebel Alliance Humans
 swnd_hero_name_dodonna: "Jan Dodonna"
 dodonna_backstory: "§Y[This.GetName]§! is a veteran of the Republic Navy and a respected military commander."
 dodonna_catchphrase: "Blind obedience is not good service."
 swnd_hero_name_rex: "Rex"
 rex_backstory: "§Y[This.GetName]§!, also known as CT-7567, served in the legendary 501st Legion under §YAnakin Skywalker§! during the Clone Wars."
 rex_catchphrase: "I'm always first, kid."
 swnd_hero_name_madine: "Crix Madine"
 madine_backstory: "§Y[This.GetName]§! served the §YGalactic Empire§! until he successfully defected thanks to a Rebel operative freeing him from prison."
 madine_catchphrase: "I've come to the conclusion that those people who truly do great deeds don't feel the need to talk about them all the time."
 swnd_hero_name_kota: "Rahm Kota"
 kota_backstory: "A student of the venerable §YYoda§!, §Y[This.GetName]§! survived Order 66 by serving alongside his own trained milita instead of relying on clones."
 kota_catchphrase: "I will join this rebellion, too, if I'm welcome."
 swnd_hero_name_rieekan: "Carlist Rieekan"
 rieekan_backstory: "§Y[This.GetName]§! is a veteran of the Republic military service up to the declaration of §YPalpatine's§! New Order."
 rieekan_catchphrase: "My tolerance is fairly inelastic. Don't try to stretch it."
 swnd_hero_name_wedge: "Wedge Antilles"
 wedge_backstory: "Few pilots can be compared to the likes of §Y[This.GetName]§!. He is ethical and is guided by a strong moral code."
 wedge_catchphrase: "Commander, we heard you're looking for some good pilots."
 swnd_hero_name_gerrera: "Saw Gererra"
 gerrera_backstory: "Embittered from the death of his sister during the Clone Wars and driven into madness, §Y[This.GetName]§! is the notorious leader of the §HPartisan Cell§!."
 gerrera_catchphrase: "You can either adapt and survive, or die with the past."
 swnd_hero_name_lando: "Lando Calrissian"
 lando_backstory: "Many things can be said about §Y[This.GetName]§!. A ladies man, a cheat, but a bad sabacc player is not one of them."
 lando_catchphrase: "Bad luck? No such thing."
 swnd_hero_name_iblis: "Garm Bel-Iblis"
 iblis_backstory: "§Y[This.GetName]§! embodies the independent §YCorellian§! spirit and fierce patriotism for the §HGalactic Republic§!. His tenure as senator earned him a reputation for his charisma and pragmatism, something that few fighting the §YEmpire§! have."
 iblis_catchphrase: "..."
 swnd_hero_name_andor: "Cassian Andor"
 andor_backstory: "§Y[This.GetName]§! is a member of Alliance Intelligence. He is known to be by-the-book and has experience in a variety of operations."
 andor_catchphrase: "Rebellions are built on hope."
 swnd_hero_name_jyn: "Jyn Erso"
 jyn_backstory: "§Y[This.GetName]§! is the daughter of renouned scientist §YGalen Erso§!." #expand later
 jyn_catchphrase: "They have no idea we're coming."
 swnd_hero_name_sato: "Jun Sato"
 sato_backstory: "§Y[This.GetName]§! serves as a member of the Rebel Alliance and leader of the Phoenix Cell."
 sato_catchphrase: "Welcome to the Rebellion."

 ### Mon Calamari Heroes
 swnd_hero_name_ackbar: "Gial Ackbar"
 ackbar_backstory: "§Y[This.GetName]§! served as captain of the Mon Calamari Guard during the Clone Wars. He serves the §HRebellion§! as its foremost military commander."
 ackbar_catchphrase: "May the Force be with us."
 swnd_hero_name_quarrie: "Quarrie"
 quarrie_backstory: "§Y[This.GetName]§! is an accomplished engineer with a specialization in starfighter design. He is a vital part of the Project Shantipole initiative."
 quarrie_catchphrase: "Me? Oh I don't fly, too dangerous."
 swnd_hero_name_tills: "Meena Tills"
 tills_backstory: "§Y[This.GetName]§! was a member of the §HDelegation of 2000§! and was a part of Mon Cala's delegation to the §HGalactic Senate§!."
 tills_catchphrase: "My loyalty is to the Republic."
 swnd_hero_name_barodai: "Ardo Barodai"
 barodai_backstory: "§Y[This.GetName]§! is a skilled spymaster serving the Rebel Alliance."
 barodai_catchphrase: " If you seem harmless, people underestimate you."
 swnd_hero_name_tendaar: "Tendaar Bel"
 tendaar_backstory: "§Y[This.GetName]§! is a skilled technician that was freed from the Galactic Empire. His technical skills earned him a place among the ranks of Alliance Special Operations."
 tendaar_catchphrase: "Ready to serve!"

 ### Rebel Twilek Heroes
 swnd_hero_name_hera: "Hera Syndulla"
 hera_syndulla_backstory: "§Y[This.GetName]§! is the daughter of freedom fighters §YCham Syndulla§! and §YEleni Syndulla§! and leader of the §HPhoenix Cell§!. She is a skilled pilot and known for her compassionate nature."
 hera_syndulla_catchphrase: "We have hope. Hope that things will get better. And they will."
 swnd_hero_name_eleni: "Eleni Syndulla"
 eleni_syndulla_backstory: "§Y[This.GetName]§! is the wife of §YCham Syndulla§! and mother of §YHera Syndulla§!. She joined her husband in the fight for a free Ryloth during the Clone Wars and continues to fight alongside him against the Empire."
 eleni_syndulla_catchphrase: "If a war is coming, it will be their fight as much as ours."
 swnd_hero_name_gobi: "Gobi Glie"
 gobi_glie_backstory: "§Y[This.GetName]§! is a member of §YCham Syndulla§!'s §HFree Ryloth§! movement, serving as his most trusted lieutenant as well as his closest friend. He is a staunch proponent of an independent Ryloth, free from outside influences."
 gobi_glie_catchphrase: "Let's force-feed these Imperials some fire."
 swnd_hero_name_rianna: "Rianna Saren"
 rianna_saren_backstory: "§Y[This.GetName]§! is a former slave and criminal turned Rebel operative. She is a highly skilled saboteur and has made enemies within §HGBlack Sun§! and the §HEmpire§!."
 rianna_saren_catchphrase: "I'm not a slave anymore. Yours or anyone's."

 ### Bothan Heroes
 swnd_hero_name_sandov: "Utric Sandov"
 sandov_backstory: "§Y[This.GetName]§! is a member of the §HBothan Spynet§! operating out of an island on the agriworld of §YKrant§!."
 sandov_catchphrase: "Utric Sandov, reporting for duty!"
 swnd_hero_name_tereb: "Tereb Ab'Lon"
 tereb_backstory: "§Y[This.GetName]§! is an aspiring politician with sympathies for the rising rebel movements across the galaxy."
 tereb_catchphrase: "We will never bow to the Empire."
 swnd_hero_name_asyr: "Asyr Sei'lar"
 asyr_backstory: "§Y[This.GetName]§! is a graduate of the §YBothan Martial Academy§! and is known for being an outstanding pilot."
 asyr_catchphrase: "For Bothawui!"
 swnd_hero_name_koth: "Koth Melan"
 koth_backstory: "§Y[This.GetName]§! is the head of the §HBothan Spynet§!. Following the death of his father, §Y[This.GetName]§!, he now provides support for the growing §YRebel Alliance§!."
 koth_catchphrase: "War, like politics, sometimes makes for strange bedfellows."
 swnd_hero_name_jib: "Jib Kopatha"
 jib_backstory: "§Y[This.GetName]§! is an information broker. His loyalties are questionable and seems nothing more than self-serving."
 jib_catchphrase: "Is this a secure channel?"

 ### Galactic Empire Heroes
 swnd_hero_name_pryce: "Arihnda Pryce"
 pryce_backstory: "§Y[This.GetName]§! is a native of the §BOuter Rim§! world of §YLothal§!. She views herself as being above her rural roots and seeks to expand the Empire's industrial power."
 pryce_catchphrase: "I serve the Empire until the end."
 swnd_hero_name_veers: "Maximillian Veers"
 veers_backstory: "§Y[This.GetName]§! is a ruthless and aggressive general known for favoring heavily armored walkers."
 veers_catchphrase: "I am General Maximillian Veers. I will have results."
 swnd_hero_name_sienar: "Raith Sienar"
 sienar_backstory: "§Y[This.GetName]§! is a prominent engineer known for creating several highly advanced designs used by the Imperial military."
 sienar_catchphrase: "I have plans, extraordinary plans, which impress anyone with imagination."
 swnd_hero_name_krennic: "Orson Krennic"
 krennic_backstory: "§Y[This.GetName]§! is the §HDirector of Advanced Weapons Research§!. He is seen as unpredictable and and volatile."
 krennic_catchphrase: "We stand here amidst MY achievement! NOT yours!"
 swnd_hero_name_sturn: "Ozzik Sturn"
 sturn_backstory: "§Y[This.GetName]§! is a cruel and sadistic hunter who is not above wearing the remains of sentients on his uniform."
 sturn_catchphrase: "I'm tired of hunting these filthy Wookiees."
 swnd_hero_name_sloane: "Rae Sloane"
 sloane_backstory: "§Y[This.GetName]§! has the reputation for being a dilligent commander and loyal to the Imperial cause. "
 sloane_catchphrase: "I'm retaking control of this situation. You can come with me, or you can die a Hutt-slave."
 swnd_hero_name_piett: "Firmus Piett"
 piett_backstory: "§Y[This.GetName]§! is a skilled admiral of the Imperial Navy. Handpicked by §YDarth Vader§!, he is known for being of the highest integrity and sound tactical mind."
 piett_catchphrase: "Those Rebels won't escape us."
 swnd_hero_name_pryde: "Enric Pryde"
 pryde_backstory: "A fierce adherent to the New Order and fanatical loyalist to the §HEmperor§! himself, §Y[This.GetName]§! is a dedicated memeber of the Imperial military."
 pryde_catchphrase: "Long live the Empire."
 swnd_hero_name_mohc: "Rom Mohc"
 mohc_backstory: "Obsessed with cybernetics and droids, §Y[This.GetName]§! turned this fascination into the Dark Trooper Project."
 mohc_catchphrase: "It's been a long time since I've challenged a man to battle."
 swnd_hero_name_armand: "Armand Isard"
 armand_catchphrase: "The Isards make their own luck."
 armand_backstory: "§Y[This.GetName]§! is a staunch loyalist to the ideals of the Galactic Empire."
 swnd_hero_name_gallius: "Gallius Rax"
 gallius_catchphrase: "As I say: There is a purpose."
 gallius_backstory: "§Y[This.GetName]§! made a name for himself as a decorated member of the Imperial Navy and is close to the Emperor himself." 
 swnd_hero_name_isard: "Ysanne Isard"
 isard_backstory: "§Y[This.GetName]§! is the daughter of esteemed §HSecurity and Intelligence Council§! memmber §YArmand Isard§!. She is known to be ambitious, ruthless, and cruel."
 isard_catchphrase: "The Isard legacy is in very good hands."
 swnd_hero_name_daala: "Natasi Daala"
 daala_backstory: "A protegee of §YTarkin§! and a fierce loyalist to the Empire, §Y[This.GetName]§! is willing to go to great lengths to preserve the New Order."
 daala_catchphrase: "I cannot leave the Empire in the hands of fools like you."
 swnd_hero_name_partagaz: "Lio Partagaz"
 partagaz_backstory: "Major §Y[This.GetName]§! serves the §HImperial Security Bureau§! with the distinction of being level-headed and acting as mediator between intelligence officials."
 partagaz_catchphrase: "We are healthcare providers. We treat sickness."
 swnd_hero_name_declann: "Nial Declann"
 declann_backstory: "§Y[This.GetName]§! served during the §HClone Wars§! and as a TIE pilot before being promoted to the rank of Grand Admiral."
 declann_catchphrase: "It shall be done."
 swnd_hero_name_gideon: "Gideon"
 gideon_backstory: "Moff §Y[This.GetName]§! is a member of the §HImperial Security Bureau§! and has a reputation of being calcuating and ruthless."
 gideon_catchphrase: "Long Live the Empire."
 swnd_hero_name_grant: "Octavian Grant"
 grant_backstory: "Grand Admiral §Y[This.GetName]§! is a §YTapani§! lord of §HHouse Mecetti§!. His sense of superiority over not only aliens and droids but those not of noble birth makes him a rather unpopular member of the §HImperial Navy§!."
 grant_catchphrase: "..."
 swnd_hero_name_quest: "Sarcev Quest"
 quest_backstory: "§Y[This.GetName]§! serves as the Emperor's Hand - one of many of elite agents that answer to the §HEmperor§! directly."
 quest_catchphrase: "..."
 swnd_hero_name_maketh_tua: "Maketh Tua"
 tua_backstory: "§Y[This.GetName]§! is a graduate of the §HImperial Academy§! and serves the Empire as a planetary governor. Unlike her colleagues, she refrains from relying on barbaric and sadistic actions."
 tua_catchphrase: "I am honored by your attention."
 swnd_hero_name_hemlock: "Royce Hemlock"
 hemlock_backstory: "§Y[This.GetName]§! was a former member of the Republic science corps until he was expelled for his unorthodox experiments. Now he continues his work under the Empire."
 hemlock_catchphrase: "..."
 swnd_hero_name_karr: "Emerie Karr"
 karr_backstory: "§Y[This.GetName]§! is a skilled geneticist and scientist working close to §YRoyce Hemlock§!."
 karr_catchphrase: "Cooperate, and you might survive."
 swnd_hero_name_galen_erso: "Galen Erso"
 galen_erso_backstory: "§Y[This.GetName]§! is leading galactic authority on crystallography and energy enrichment. He is a highly decorated scientist and a crucial part of the §HTarkin Initiative§!."
 galen_erso_catchphrase: "We are on to something big.."
 swnd_hero_name_tigellinus: "Rufaan Tigellinus"
 tigellinus_backstory: "§Y[This.GetName]§! is a very well connected member of the Imperial Navy. He is known for his very Humanocentric beliefs and hatred of both non-humans and near-humans."
 tigellinus_catchphrase: "Aliens have no place in the Empire."
 swnd_hero_name_teshik: "Osvald Teshik"
 teshik_backstory: "§Y[This.GetName]§! is a highly capable member of the Imperial Navy. Unlike many of his contemporaries, he had a keen tactical mind and is considered compassionate by others."
 teshik_catchphrase: "Each of our wars is just one little piece of a greater war, one endless and incalculably larger."
 swnd_hero_zaarin: "Demetrius Zaarin"
 zaarin_backstory: "§Y[This.GetName]§! is an ambitious man with sights set on something more than just the title of Grand Admiral."
 zaarin_catchphrase: "Will you serve me?"
 swnd_hero_name_grunger: "Josef Grunger"
 grunger_backstory: "§Y[This.GetName]§! is a highly regarded strategist. Despite this, he is also known for being prideful and opportunistic."
 grunger_catchphrase: "Long live the Empire."
 swnd_hero_name_raz: "Ishin-Il-Raz"
 raz_backstory: "§Y[This.GetName]§! is one of the chief architects behind COMPNOR and fully committed to the ideals of the Empire. Much like some of his other hardline contemporaries, he is very humanocentric."
 raz_catchphrase: "To our Emperor, and to all Imperial citizens, we report for duty."
 swnd_hero_name_makati: "Afsheen Makati"
 makati_backstory: "§Y[This.GetName]§!'s military career is not overly outstanding. His abilities in battle are comparable to others in the admirality."
 makati_catchphrase: "..."
 swnd_hero_name_pitta: "Danetta Pitta"
 pitta_backstory: "§Y[This.GetName]§! is an ardent supporter of Human High Culture. Many find this odd given his own near-human background."
 pitta_catchphrase: "..."
 swnd_hero_name_syn: "Peccati Syn"
 syn_backstory: "§Y[This.GetName]§! values the importance of the Imperial Navy as a vital instutition for the Empire. A former member of the Sacred Way, he still retains a sense of morality and reverence for life despite the harshness and brutality of the §YEmpire§!."
 syn_catchphrase: "Violence only ever begets more violence."
 swnd_hero_name_batch: "Martio Batch"
 batch_backstory: "§Y[This.GetName]§! is a rather secretive man, staying clear of Imperial court politics and focusing solely on his military duties."
 batch_catchphrase: "..."
 swnd_hero_name_versio: "Iden Versio"
 versio_backstory: "§Y[This.GetName]§! is the commander of an elite Imperial unit. She's a firm believer in the ideals of the Empire not only from her upbringing but from her own experiences serving it."
 versio_catchphrase: "Today, the Rebellion dies."
 swnd_hero_name_soontir_fel: "Soontir Fel"
 fel_backstory: "§Y[This.GetName]§! is the son of a simple farming family on §YCorellia§!. After joining the §YEmpire§! and enrolling at the Imperial Academy, he's proven himself time and time again as an ace pilot."
 fel_catchphrase: "I now stand ready to offer you my life, my skills and my knowledge."

 ### Mandalorian Heroes (Non Empire)
 swnd_hero_name_ketsu: "Ketsu Onyo"
 ketsu_catchphrase: "I got the best weapons, best ship, and I'm feared across the galaxy."
 ketsu_backstory: "§Y[This.GetName]§! is a Mandalorian bounty hunter with ties to §YBlack Sun§!."
 swnd_hero_name_skirata: "Kal Skirata"
 skirata_backstory: "§Y[This.GetName]§! was one of many Mandalorians that answered §YJango Fett§!'s called to train the clones on §YKamino§!."
 skirata_catchphrase: "Ke nu'jurkadir sha Mando'ade…"
 swnd_hero_name_din_djarin: "Din Djarin"
 din_djarin_backstory: "Raised as a foundling and known to many as just simply 'The Mandalorian', §Y[This.GetName]§! is a skilled bounty hunter. Little else is known of him."
 din_djarin_catchphrase: "This is the way."

 ### Alderaanian Heroes/Chandrillan
 swnd_hero_name_bail: "Bail Organa"
 bail_organa_backstory: "§Y[This.GetName]§! serves as §YAlderaan's§! senator and is a vocal critic of the §HGalactic Empire§!. He keeps close ties with Chandrillian senator §YMon Mothma§! and Corellian senator §YGarm Bel-Iblis§!."
 bail_organa_catchphrase: "The simplest gesture of kindness can fill a galaxy with hope."
 swnd_hero_name_winter: "Winter Celchu"
 winter_catchphrase: "I never forget anything."
 winter_backstory: "§Y[This.GetName]§! is an Alderaanian."
 swnd_hero_name_omas: "Cal Omas"
 omas_backstory: "§Y[This.GetName]§! is an Alderaanian statesman. He's known for being a good-natured man with a sense of humor, despite having a temper."
 omas_catchphrase: "In these times, a smile from a Jedi is a hopeful sign."

 ### Sullustan Heroes
 swnd_hero_name_nunb: "Nien Nunb"
 nien_nunb_backstory: "§Y[This.GetName]§! is a Sullustan smuggler working on behalf of the SoroSuub Corporation."
 nien_nunb_catchphrase: "You're the type of person who reminds me why we fight against the Empire."

 ### Geonosian Heroes
 swnd_hero_name_gizor_dellso: "Gizor Dellso"
 gizor_dellso_backstory: "§Y[This.GetName]§! is a Geonosian engineer who was employed by the Trade Federation and then joined the Confederacy of Independent Systems."
 gizor_dellso_catchphrase: "<<Geonosian chittering>>"
 
 ### Eriadu Authority Heroes
 swnd_hero_name_strang: "Victor Strang"
 strang_catchphrase: "For the Empire!"
 strang_backstory: "§Y[This.GetName]§! is an Imperial admiral known for his aggressive tendencies."
 swnd_hero_name_adelhard: "Ubrik Adelhard"
 adelhard_catchphrase: "You will answer to me."
 adelhard_backstory: "§Y[This.GetName]§! rose from the ranks of the Stormtrooper Corps to governor of the §BAnoat sector§!."
 swnd_hero_name_delvardus: "Sander Delvardus"
 delvardus_backstory: "§Y[This.GetName]§! is a well connected member of the Empire. He has a reputation of being pompus and a womanizer, despite being married into the Tarkin family."
 delvardus_catchphrase: "I'm not sharing my glory with you!"

 ### Generic Imperial Heroes
 swnd_hero_name_treuten: "Treuten Teradoc"
 treuten_backstory: "§Y[This.GetName]§! is the older brother of §YKosh Terradoc§!. He is a rather rotund man with a penchant for commanding from the rear."
 treuten_catchphrase: "What Empire? We are the Empire."
 swnd_hero_name_kosh: "Kosh Terradoc"
 kosh_backstory: "§Y[This.GetName]§! is the younger brother §YTreuten Terradoc§!. He is often in fierce competition with his brother, constantly trying to out do his accomplishments."
 kosh_catchphrase: "I was thinking that I'd take a hundred percent."
 swnd_hero_name_zsinj: "Zsinj"
 zsinj_backstory: "Despite his appearance, §Y[This.GetName]§! is far from an incompetent pushover. He employs misdirection to its fullest and very few people truly know the inner machinations of his mind."
 zsinj_catchphrase: "Well, we can't have this.."
 swnd_hero_name_kaine: "Ardus Kaine"
 kaine_backstory: "Grand Moff §Y[This.GetName]§! is known for his ambition and his hunger for power. He is a strict adherent to the New Order."
 kaine_catchphrase: "The Empire lives on!"
 swnd_hero_name_lemelisk: "Bevel Lemelisk"
 lemelisk_backstory: "There are few brilliant minds within the Empire that can compare to §Y[This.GetName]§!. His engineering and architectural acumen are well known among high ranking Imperials."
 lemelisk_catchphrase: "At least make sure you do it right this time."
 swnd_hero_name_obo_rin: "Obo Rin"
 obo_rin_catchphrase: "..."
 obo_rin_backstory: "§Y[This.GetName]§! is a sentientologist working on behalf of the Empire. His comprehensive works on alien physiology and culture are compliant with COMPNOR standards."
 
 ### Ciutric Hegemony Heroes 
 swnd_hero_name_pestage: "Sate Pestage"
 swnd_hero_name_krennel: "Delak Krennel"
 krennel_backstory: "§Y[This.GetName]§! serves as an Imperial admiral. Notoriously Humanocentric and xenophobic, his peers view him as needlessly brutal."
 krennel_catchphrase: "I've always viewed generosity as a weakness, to be exploited. Ruthlessly exploited."
 swnd_hero_name_darron: "Vict Darron"
 darron_backstory: "§Y[This.GetName]§! is an Imperial admiral serving the Ciutric Hegemony. He is known for being far less brutal than §YDelak Krennel§! and prefers to avoid killing innocents."
 darron_catchphrase: "..."

 ### Generic Human Heroes
 swnd_hero_name_domina: "Domina Tagge"
 domina_backstory: "Lady §Y[This.GetName]§! is the head of the §YTagge Corporation§! and relative of the §HSupreme Commander of the Imperial Military Grand General §YCassio Tagge§!§!."
 domina_catchphrase: "What can the Tagge Corporation do for you today?."
 swnd_hero_name_karrde: "Talon Karrde"
 karrde_backstory: "Smuggler and information broker §Y[This.GetName]§! is a member of the §HCar'das syndicate§!. Despite his criminal connections, he prefers to abstain from violence as much as possible."
 karrde_catchphrase: "Being a smuggler doesn't necessarily require one to be a barbarian."
 swnd_hero_name_dash: "Dash Rendar"
 dash_catchphrase: "Tell you what. When Han Solo joins the revolution - that's when I'll join."
 dash_backstory: "§Y[This.GetName]§! is a hot-shot pilot, smuggler, and mercenary hailing from §YCorellia§!."
 swnd_hero_name_rhys: "Rhys Dallows"
 rhys_catchphrase: "Rhys Dallows, at your service."
 rhys_backstory: "§Y[This.GetName]§! is a veteran of the Naboo Royal Space Fighter Corps. He was a member of Echo Flight and Bravo Squadron, participating in Naboo's defense during the Trade Federation's invasion of Naboo."
 swnd_hero_name_vana: "Vana Sage"
 vana_catchphrase: "Vana Sage, at your service."
 vana_backstory: "§Y[This.GetName]§! is a pilot in service of the Lok Revenants. She participated in Naboo's defense before the Clone Wars, serving alongside §YRhys Dallows§!."

 swnd_hero_name_jodo: "Jodo Kast"
 jodo_backstory: "§Y[This.GetName]§! was a part of Alliance SpecOps before deserting and becoming a bounty hunter. He's routinely seen wearing Mandalorian armor despite not being Mandalorian in the slightest. This choice surely won't lead to trouble for him in the future."
 jodo_catchphrase: "Watching prey squirm gives me a feeling of absolute power."
 swnd_hero_name_arbor: "Jenna Zan Arbor"
 arbor_catchphrase: "You are a subject of a scientific experimentation. You will not be hurt, only studied."
 arbor_backstory: "§Y[This.GetName]§! is the founder of Arbor Industries which provided much needed antidotes for a myriad of different diseases. However, she is also known for her role in producing bio-weapons for the Confederacy and experimentations into the force."
 swnd_hero_name_terrik: "Booster Terrik"
 terrik_catchphrase: "I'm going to stay right here."
 terrik_backstory: "§Y[This.GetName]§! is a Corellian smuggler known for his bravado and his ability to turn any errant venture into a profitable one."
 swnd_hero_name_silas: "Silas Tagge"
 silas_backstory: "§Y[This.GetName]§! is the elder brother of §YDomina Tagge§!. He serves as Head of Weapons Development for the §YTagge Corporation§! and oversees the development of new weaponry. He is utterly obsessed with his work, nearing madness."
 silas_catchphrase: " I'm a scientist."

 ### Chiss Heroes
 swnd_hero_name_ba_kif: "Ba'kif"
 ba_kif_catchphrase: "For the Ascendancy!"
 ba_kif_backstory: "§Y[This.GetName]§! is the §HSupreme General§! of the Chiss Expansionary Defense Fleet and a member of the Defense Hierarchy Council."
 swnd_hero_name_thurfian: "Thurfian"
 thurfian_catchphrase: "For the Ascendancy!"
 thurfian_backstory: "§Y[This.GetName]§!, also known as Mitth'urf'ianico, served in various levels of the §YMitth family§! ranging from §HAristocra§! to §HPatriarch§!. He's known to have a disdain for §YMitth'raw'nuruodo§!."
 swnd_hero_name_thrass: "Thrass"
 thrass_catchphrase: "For the Ascendancy!"
 thrass_backstory: "§Y[This.GetName]§!, also known as Mitth'ras'safis, is a member of the §YMitth family§! and is the brother of §YMitth'raw'nuruodo§!."
 swnd_hero_name_ja_fosk: "Ja'fosk"
 ja_fosk_catchphrase: "For the Ascendancy!"
 ja_fosk_backstory: "Ja'fosk is a §HSupreme Admiral§! within the Defense Hiearchy Council."

 ### Hutt Heroes
 swnd_hero_name_marlo: "Marlo"
 marlo_backstory: "§Y[This.GetName]§! was born into the Qunaalac kajidic on §YNal Hutta§!. He eventually became lorda of the Qunaalac clan and had a seat on the Grand Hutt Council during the Clone Wars. He is also one of the oldest members Grand Hutt Council."
 marlo_catchphrase: "<<Huttese laughter>>"
 swnd_hero_name_arok: "Arok"
 arok_backstory: "§Y[This.GetName]§! is a member of the §YBesadii kajidic§! during the Clone Wars. He is rather fond of smoking from his hookah."
 arok_catchphrase: "<<Huttese laughter>>"
 swnd_hero_name_gorga: "Gorga Desilijic Aarrpo"
 gorga_backstory: "§Y[This.GetName]§! is the nephew of §YJabba Desilijic Tiure§! and acted as the accountant for the Grand Hutt Council during the Clone Wars."
 gorga_catchphrase: "<<Ganda chuba kuna, koochoo pulta!>>"
 swnd_hero_name_gardulla: "Gardulla Besadii"
 gardulla_backstory: "§Y[This.GetName]§! is a member of the §YBesadii kajidic§!. She was the owner of both Shimi and Anakin Skywalker until she lost a bet against the Toydarian junk dealer Watto at the Boonta Eve Classic."
 gardulla_catchphrase: "<<Huttese laughter>>"
 swnd_hero_name_kaltho: "Kaltho"
 kaltho_backstory: "§Y[This.GetName]§! is a trade mogul, owing much of his wealth to the ownership of several spaceports and loading docks on §YNar Shaddaa§!. He's also known to dabble in the spice trade and other illicit activities."
 kaltho_catchphrase: "<<Huttese laughter>>"
 swnd_hero_name_grakkus: "Grakkus"
 grakkus_backstory: "Grakkus Jahibakti Tingi, simply known as §Y[This.GetName]§! is unusual among Hutts. Not only is he far more physically active than his peers, he's also an avid collector of Jedi artifacts and proudly wears a necklace of lightsabers around his neck."
 grakkus_catchphrase: "I am a civilized Hutt, attempting to live a civilized life in an uncivilized place."

