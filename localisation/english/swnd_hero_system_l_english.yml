 ### Zann Consortium Heroes
 swnd_hero_name_urai_fenn: "Urai Fen"
 urai_fen_catchphrase: "wip"
 urai_fen_backstory: "§Y[This.GetName]§! is Tyber Zann's bodyguard and second-in-command of the §YZann Consortium§!."
 swnd_hero_name_venlanna_sipal: "Venlanna Sipal"
 sipal_catchphrase: "wip"
 sipal_backstory: "§Y[This.GetName]§! serves as an underboss for the §YZann Consortium§!. She is ambitious and prefers to use a guise of professionalism to hide her mercilessness."
 swnd_hero_name_silri: "Silri"
 silri_catchphrase: "I BRING DARKNESS!"
 silri_backstory: "§Y[This.GetName]§! is a witch of Dathomir, one of the very few survivors of her kind. While very violent and prone to fits of rage, she remains an important part of Zann's criminal ambitions."
 
 ### Corporate Sector ###
 jor_nieler_backstory: "§Y[This.GetName]§! served as a squad leader for a group of Espos stationed on the planet Kirima following the Battle of Endor. Unbeknownst to him, this squad was infiltrated by an Imperial spy, Cort Flavian."
 jor_nieler_catchphrase: "Hey you! Disarm yourself!"
 swnd_hero_name_jor_nieler: "Jor Nieler"
 uulrhashan_backstory: "§Y[This.GetName]§! is a Tiss'shar smuggler, mercenary and gunfighter who works as the bodyguard for §YCorporate Sector Authority§! §HExO§! §YMirkovig Hirken§!."
 uulrhashan_catchphrase: "Come, trick shooter. Let's see if you have any tricks left."
 swnd_hero_name_uulrhashan: "Uul-Rha-Shan"
 ettimar_backstory: "§Y[This.GetName]§! is the §YChief§! of the §YEtti V reservation§!. He is an ardent assimilationist who considers himself fully human and embraced the brutal dog-eat-dog culture of the §YCorporate Sector Authority§!."
 ettimar_catchphrase: "I'll keep them in line for you, §Ykemosabe§!!"
 swnd_hero_name_ettimar: "Ettimar Pitta"
 swnd_hero_name_vhal_candati: "Vhal Candati"
 vhal_candati_backstory: "§Y[This.GetName]§! was born on §YTerminus§! and was a civil servant in the §HConfederacy of Independent Systems§! administration there until the end of the Clone Wars. \nAt war's end, he oversaw the transfer of most of the Seperatist Droid Army to the §YCorporate Sector Authority§!."
 vhal_candati_catchphrase: "..."
 swnd_hero_name_fiolla: "Fiolla of Lorrd"
 fiolla_backstory: "§Y[This.GetName]§!, more formally §YHart-and-Parn Gorra-Fiolla of Lorrd§!, is a talented auditor and one-time lover of §HHan Solo§!. \nIn addition to her career in the §BCorporate Sector§!, Fiolla runs a successful landspeeder business."
 fiolla_catchphrase: "You're looking at §YFiolla of Lorrd§!, heroine of the spaceways."
 swnd_hero_name_angela_krin: "Angela Krin"
 angela_krin_backstory: "Captain §Y[This.GetName]§! personifies the §YCorporate Sector Authority§!: cool, bold, and efficient. She played a major role in confounding the schemes of §YMika Anjiliac Chiera§!."
 angela_krin_catchphrase: "..."
 swnd_hero_name_ilm_vaz: "Ilm Vaz-Weplinn"
 ilm_vaz_catchphrase: "The Authority's citizens will learn to obey."
 ilm_vaz_backstory: "§HExecutive§! §Y[This.GetName]§!, a Tarnab, is the only non-human §HViceprex§!. \nHis ruthless fiduciary efficiency allowed him to rise through the ranks despite the ardent humanocentrist of the §YCSA§!."
 swnd_hero_name_dakka_fasser: "Dakka Fasser"
 dakka_fasser_backstory: "§HLieutenant§! §Y[This.GetName]§! works for the Security Police on §YEtti IV§!. \nShe was present at the Stark Compound to arrest §YJahan Cross§! for the murder of §YDah'lis Stark§!."
 dakka_fasser_catchphrase: "..."
 PRESCRIPTED_ruler_name_CorporateSectorAuthority: "Mirkovig Hirken"
 mirkovig_hirken_backstory: "§Y[This.GetName]§! grew up in an old, prestigious family on §YAlsakan§!, and after an upper-crust upbringing, he utilized his family connections to earn a high-paying job in the §HCorporate Sector Authority§!."
 swnd_hero_name_sliro: "Sliro Barsha"
 sliro_backstory: "§Y[This.GetName]§! is a §HDirector§! within the Imperial Security Bureau and also poses as the crime lord of the Zerek Besh syndicate. Funded by dark Imperial money, he pursues the Rebellion through its underworld connections."
 sliro_catchphrase: "There's nowhere in the galaxy you can hide from the ISB."
 
 ### Pantoran Heroes ###
 swnd_hero_name_riyo: "Riyo Chuchi"
 riyo_backstory: "§Y[This.GetName]§! is a prominent Pantoran senator with a career that led her to be colleagues with §YPadme Amidala§! and §YMon Mothma§! during the Clone Wars. Much more outspoken than she was early in her career, §Y[This.GetName]§! is openly critical of the growing military might of the Empire."
 riyo_catchphrase: "I choose to live for my people. What do you choose?"

 ### Hapan Heroes ###
 swnd_hero_name_ni_korish: "Ni'Korish"
 ni_korish_backstory: "§Y[This.GetName]§! is the former Queen Mother of the §YHapes Consortium§! and mother to §YTa'a Chume§!. She despises the Jedi Order."
 ni_korish_catchphrase: "REPLACE_ME"
 swnd_hero_name_chelik: "Chelik"
 chelik_backstory: "§Y[This.GetName]§! is a princess of the Hapan Royal House§! with dreams of becoming Queen Mother one day."
 chelik_catchphrase: "REPLACE_ME"
 swnd_hero_name_alyssia: "Alyssia"
 alyssia_backstory: "§Y[This.GetName]§! is the niece of §YTa'a Chume§! and a princess of the Hapan Royal House. She known for her ruthlessness and her own ambitions for becoming Queen Mother."
 alyssia_catchphrase: "REPLACE_ME"
 swnd_hero_name_kalen: "Kalen"
 kalen_backstory: "§Y[This.GetName]§! is the first son of §YTa'a Chume§! and prince in the Hapan Royal House and the eldest brother of §YIsolder§!."
 kalen_catchphrase: "..."
 swnd_hero_name_isolder: "Isolder"
 isolder_backstory: "§Y[This.GetName]§! is the second son of §YTa'a Chume§! and a prince in the Hapan Royal House."
 isolder_catchphrase: "REPLACE_ME"
 swnd_hero_name_secciah: "Secciah"
 secciah_catchphrase: "REPLACE_ME"
 secciah_backstory: "§Y[This.GetName]§! the second-eldest of the several daughters of the Queen Mother §YNi'Korish§!, and thus the younger sister of §YTa'a Chume§! and the aunt of the princes §YKalen§! and §YIsolder§!."
 #swnd_hero_name_teneniel_djo: "Teneniel Djo"
 #teneniel_djo_backstory: "§Y[This.GetName]§! was born on §YDathomir§! and "
 #teneniel_djo_catchphrase: "REPLACE_ME"

 ### Trandoshan Heroes ###
 swnd_hero_name_bossk: "Bossk"
 bossk_backstory: "§Y[This.GetName]§! is the son of famed Trandoshan bounty hunter and head of the Bounty Hunter's Guild §YCraddosk§!. Ruthless from a young age, he perfected his hunting skills during the Clone Wars."
 bossk_catchphrase: "<<Reptilian hissing>>"
 swnd_hero_name_pekt: "Pekt"
 pekt_backstory: "§Y[This.GetName]§! is a slaver with a hatred of Wookiees and close ties to the Galactic Empire. However, his hatred of Wookiees is surpassed by his fascination in their biology. Prior to the Galactic Civil War, he partook in the Trade Federation's invasion of Alaris Prime, aiding them in their attempt to control the moon."
