 ## Unique Character Recruitment ##
 ## 18 November 2024 ##
 swnd_unique_character_event.100.name: "Princess"
 swnd_unique_character_event.100.desc: "It has become abundantly clear that principled dissent can only go so far. The oppression of the Empire and its unrelenting crulelty has reached the breaking point for §YLeia§!. Like §YMon Mothma§! before her, she chooses to leave the Imperial Senate to help Alderaan and the Rebel Alliance."
 swnd_unique_character_event.100.a: "We are honored by your presence, your highness."
 swnd_unique_character_event.100.a.response: "\"§YThank you, its an honor to serve alongside such respectable and courageous leaders such as my father, Mon Mothma, and others who risk everything in the pursuit of freedom§!.\""
 swnd_unique_character_event.100.b: "This won't be an easy fight, you know that right?"
 swnd_unique_character_event.100.b.response: "\"§YBelieve me, I know. I've stood face to face with the Emperor, Lord Vader, and Grand Moff Tarkin more than once. Whatever comes our way, I know we can confront it together§Y!.\""
 swnd_unique_character_event.100.c: "What about your senatorial duties?"
 swnd_unique_character_event.100.c.response: "\"§YI've been witness to the lengths that the Empire will go to maintain its control. The unabshed evil spreads across the galaxy and putting billions upon billions of lives in danger. It is my job is to preserve freedom and democracy, first and foremost. If the Emperor thinks I am a traitor and a member of the Rebel Alliance, I shouldn't let him down should I§!?\""
 swnd_unique_character_event.100.hire: "Welcome to the Rebellion."
 swnd_unique_character_event.100.hire.tooltip: "§Y$PRESCRIPTED_leader_leia_organa$§! joins our empire as a §HLeader§!."

 swnd_unique_character_event.110.name: "Head Clanker"
 swnd_unique_character_event.110.desc: "The tactical droid turns its attention to the new arrivals, noticing the Confederate symbols on their uniforms. It motions for the B1s to disperse as approaches the team. It still operates as programmed, waiting for orders from Separatist leadership that will never come."
 swnd_unique_character_event.110.a: "State your identification code."
 swnd_unique_character_event.110.a.response: "\"§YI am General Kalani. I do not use an identification code§!.\""
 swnd_unique_character_event.110.b: "Why are you still active?"
 swnd_unique_character_event.110.b.response: "\"§YI gave my forces the order to disregard the shutdown commands. It was clearly a Republic trick. We will continue to hold our position here until new orders arrive from Count Dooku or General Grievous. Rumors about their death at the hands of Jedi are unfounded and are not the slightest bit logical§!.\""
 swnd_unique_character_event.110.c: "Are you willing to resume your duties under our leadership?"
 swnd_unique_character_event.110.c.response: "\"§YI will expect to continue operating as I have for the last few years§!.\"" #WIP
 swnd_unique_character_event.110.hire: "The Separatists needs you."
 swnd_unique_character_event.110.hire.tooltip: "§Y$PRESCRIPTED_leader_kalani$§! joins our empire as a §HLeader§!."

 swnd_unique_character_event.120.name: "The Holdout"
 swnd_unique_character_event.120.desc: "Our scientist stumbles upon the source of the signal. Much to their surprise, its a lone Geonosian, far from their hive. The insectoid stands up right and moves from the console in front of it. Its chirring and clicks seem less threatening and more pleased by their appearance, noticing the Separatist insignia on the uniform. The bug clicks out a name - §YGizor Dellso§!."
 swnd_unique_character_event.120.a: "So you're the one with the Separatist command codes?"
 swnd_unique_character_event.120.a.response: "The Geonosian nods and formally welcomes the team to his foundry. §Y<<This is all I have left. The Empire's interest on Mustafar has forced me away from my original foundry. Its no doubt destroyed by now>>§!."
 swnd_unique_character_event.120.b: "What are your plans for this foundry?"
 swnd_unique_character_event.120.b.response: "The Geonosian clicks and chirps frantically, pointing to the schematics coming up on the screen. §Y<<I'm hoping to rebuild and restart the droid army. The death of my Arch Duke and the rest of the Separatist leaders will be avenged>>§!."
 swnd_unique_character_event.120.c: "Will you lend your skills to our cause?"
 swnd_unique_character_event.120.c.response: "§Y<<If you will have me.>>§!" #WIP
 swnd_unique_character_event.120.hire: "The Separatists needs you."
 swnd_unique_character_event.120.hire.tooltip: "§Y$swnd_hero_name_gizor_dellso$§! joins our empire as a §HLeader§!."

 swnd_unique_character_event.130.name: "The Resurrector"
 swnd_unique_character_event.130.desc: "The Mandalorian grimaces underneath his helmet as he take it off. \"§YIf you're looking for a guy to do your dirty work, I'm not him.§!\" There is a slight bit of unease in his voice. Not enough to seem fearful but very suspicious."
 swnd_unique_character_event.130.a: "Who are you?"
 swnd_unique_character_event.130.a.response: "\"§YI'm a clone of a man who's was trying to make his way in the universe. I'm also a man who's lost many, many things. I used to go by Alpha-02, but these days its just Spar§!.\"" #WIP
 swnd_unique_character_event.130.b: "We heard you were one of the Protectors?"
 swnd_unique_character_event.130.b.response: "\"§YI was, once. The Emperor sent me and my men on a mission to capture Senator Amidala. It was a Republic trap, lost nearly all of my men except for two of them - one of which leads the Protectors now. The true Protectors, not the hut'uunla or'dinii that allied with the Jedi§!.\"" #WIP
 swnd_unique_character_event.130.c: "What will it take for you to join us?"
 swnd_unique_character_event.130.c.response:  "\"§YDepends on what you want from me. I'm not willing to sacrifice more men for someone else's gain. I did enough of that during the Clone Wars§!.\"" #WIP
 swnd_unique_character_event.130.hire: "We require your services."
 swnd_unique_character_event.130.hire.tooltip: "§Y$PRESCRIPTED_leader_name_spar$§! joins our empire as a §HLeader§!."

 swnd_unique_character_event.200.name: "Hermit"
 swnd_unique_character_event.200.desc: "Our coded message has reached the intended target."
 swnd_unique_character_event.200.a: "General, its an honor."
 swnd_unique_character_event.200.a.response: "I'm amazed someone tracked me down. I can only assume Bail might be behind this meeting." 
 swnd_unique_character_event.200.b: "Are you willing to lead once more?"
 swnd_unique_character_event.200.b.response: "Perhaps."
 swnd_unique_character_event.200.c: "Do you think there are other survivors?"
 swnd_unique_character_event.200.c.response: "Order 66 might have wiped out several of the Order's members, but it hasn't wiped out everyone. The Emperor knows this and even with the Inquisitors chasing down several leads, they won't wipe out the Jedi. Masters, knights, and padawans have escaped and are in hiding; force-sensitive children are being born across the galaxy; and even now some adults are realizing they have a connection to the force." 
 swnd_unique_character_event.200.hire: "Welcome to the Rebellion."
 swnd_unique_character_event.200.hire.tooltip: "§Y$PRESCRIPTED_leader_obi_wan_kenobi$§! joins our empire as a §HLeader§!."

