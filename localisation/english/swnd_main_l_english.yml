 bacta: "Bacta"
 bacta_desc: "£bacta£ Bacta is a product of rare plantlife used in advanced medical or cloning procedures throughout the galaxy. We can gain more by:\n§Y1.§! Building £district£ §HAgriculture Districts§! on planets with £bacta£ $bacta$ deposits.\n§Y2.§! Buying more on the §HMarket§!.§!"
 tibanna_gas: "Tibanna Gas"
 tibanna_gas_desc: "£tibanna_gas£ §HTibanna Gas§! is used in the production of £ammunition£ §HAmmunition§!. We can gain more by:\n§Y1.§! Building £building£ §HTibanna Platforms§! or £district£ §HGas Mining Districts§! on £planet£ §HCloud Cities§! built in the atmosphere of gas giants.\n§Y2.§! Using §HConstruction Ships§! to build §HMining Stations§! around gas giants.\n§Y3.§! Buying more on the §HMarket§!.§!"
 sr_hypermatter: "Hypermatter"
 sr_hypermatter_desc: "§HHypermatter§! (£sr_hypermatter£) is used in the production of §HHyperfuel§! (£hyperfuel£). We can gain more by:\n§Y1.§! Building £building£ §HHypermatter Extractors§! on the surface of certain colonized planets or £district£ §HHeavy Refinery Districts§! on the surface of Ecumenopolis worlds.\n§Y2.§! Using §HConstruction Ships§! to build §HMining Stations§! around planets or asteroids.\n§Y3.§! Buying more on the §HMarket§!.§!"
 hyperfuel: "Hyperfuel"
 hyperfuel_desc: "£hyperfuel£ §HHyperfuel§! is an advanced resource used in the production of hyperdrives and reactors for §HStarships§!. We can gain more by:\n§Y1.§! Building £building£ §HSynthetic Hyperfuel Refineries§! on colonized planets with £electronics£ §HElectronics§! or £ammunition£ §HAmmunition§! jobs.\n§Y2.§! Building £district£ §HGenerator Districts§! on planets with £hyperfuel£ $hyperfuel$ deposits after researching £engineering£ $tech_fuel_industry$.\n§Y3.§! Using §HConstruction Ships§! to build §HMining Stations§! around planets or asteroids.\n§Y4.§! Buying more on the §HMarket§!.§!"
 electronics: "Electronic Components"
 electronics_desc: "£electronics£ §HElectronic Components§! are advanced resources used in the production of §HStarships§!. We can gain more by:\n§Y1.§! Building £district£ §HStrategic Systems Complexes§!, £district£ §HElectronics Sectors§!, or £building£ §HElectronic Components Factories§! on the surface of colonized planets.\n§Y2.§! Buying more on the §HMarket§!.§!"
 sr_plasma_cells: "Plasma Cells"
 sr_plasma_cells_desc: "§HPlasma Cells§! (£sr_plasma_cells£) are advanced resources used in the production of §HIon Weapons§!. We can gain more by:\n§Y1.§! Building £building£ §HPlasma Cell Foundries§! on the surface of colonized planets.\n§Y2.§! Buying more on the §HMarket§!.§!"
 ammunition: "Ammunition"
 ammunition_desc: "£ammunition£ §HAmmunition§! is a resource used in the production of §HStarships§! and §HArmies§!. We can gain more by:\n§Y1.§! Building £district£ §HStrategic Systems Complexes§!, £district£ §HMunitions Sectors§!, or £building£ §HAmmunition Production Lines§! on the surface of colonized planets.\n§Y2.§! Buying more on the §HMarket§!"
 sr_starfighter_parts: "Starfighter Parts"
 sr_starfighter_parts_desc: "§HStarfighter Parts§! (£sr_starfighter_parts£) are advanced resources used in the production of §HFighters§! and §HBombers§!. We can gain more by:\n§Y1.§! Building £building£ §HStarfighter Foundries§! on the surface of colonized planets.\n§Y2.§! Buying more on the §HMarket§!.§!"
