#######################
# Loading Tips        #
# from main_l_english #
#######################
 LOADING_TIP_0: "\"Wonderful girl. Either I'm going to kill her, or I'm beginning to like her.\" - §YHan Solo§!"
 LOADING_TIP_1: "\"Anger, fear, aggression. The dark side are they. Once you start down the dark path, forever will it dominate your destiny.\" - §YYoda§!"
 LOADING_TIP_2: "\"To nurse and protect.\" - §YIG-11§!"
 LOADING_TIP_3: "\"I have a bad feeling about this...\" - §Ypretty much everyone§!"
 LOADING_TIP_4: "\"I have spoken\" - §YKuiil§!"
 LOADING_TIP_5: "\"Aren't you a little short for a stormtrooper?\" - §YLeia Organa§!"
 LOADING_TIP_6: "\"That's not how the Force works!\" - §YHan Solo§!"
 LOADING_TIP_7: "\"I don't like sand. It's coarse and rough and irritating, and it gets everywhere.\" - §YAnakin Skywalker§!"
 LOADING_TIP_8: "\"I find your lack of faith disturbing.\" - §YDarth Vader§!"
 LOADING_TIP_9: "\"Justice is merely the construct of the current powerbase.\" - §YMaul§!"
 LOADING_TIP_10: "\"Why, you stuck-up, half-witted, scruffy-looking nerf herder!\" - §YLeia Organa§!"
 LOADING_TIP_11: "\"I'll never turn to the dark side. You've failed, your highness. I am a Jedi, like my father before me.\" - §YLuke Skywalker§!"
 LOADING_TIP_12: "\"Just for once, let me look on you with my own eyes.\" - §YAnakin Skywalker§!"
 LOADING_TIP_13: "\"The war is over! Lord Sidious promised us peace! We only want-\" - §YNute Gunray§!"
 LOADING_TIP_14: "\"Its a trap!\" - §YGial Ackbar§!"
 LOADING_TIP_15: "\"I'm just a simple man trying to make my way in the universe.\" - §YJango Fett§!"
 LOADING_TIP_16: "\"I do not mean to be the Emperor's servant forever.\" - §YJerec§!"
 LOADING_TIP_17: "\"So this is how liberty dies. With thunderous applause.\" - §YPadmé Amidala§!"
 LOADING_TIP_18: "\"They are not droids to simply be shut down. These are soldiers who defended us, defended our worlds.\" - §YSenator Riyo Chuchi§!"
 LOADING_TIP_19: "\"You are the Chosen One. You have brought balance to this world. Stay on this path, and you will do it again for the galaxy. But beware your heart.\" - §YThe Father§!"
 LOADING_TIP_20: "\"An object cannot make you good or evil. The temptation of power, forbidden knowledge, even the desire to do good can lead some down that path. But only you can change yourself.\" - §YBendu§!"
 LOADING_TIP_21: "\"If you define yourself by your power to take life, your desire to dominate, to possess, then you have nothing.\" - §YObi-Wan Kenobi§!"
 LOADING_TIP_22: "\"To defeat an enemy, you must know them. Not simply their battle tactics, but their history, philosophy, art.\" - §YMitth'raw'nuruodo§!"
 LOADING_TIP_23: "\"Blast them!\" - §YStormtrooper§!"
 LOADING_TIP_24: "\"If you will not be turned, you will be destroyed!\" - §YEmperor Palpatine§!"
 LOADING_TIP_25: "\"I will join this rebellion, too, if I'm welcome.\" - §YRahm Kota§!"
 LOADING_TIP_26: "\"Hello there!\" - §YObi-Wan Kenobi§!"
 LOADING_TIP_27: "\"Peace is a lie. There is only Passion. Through Passion I gain Strength.\nThrough Strength I gain Power. Through Power I gain Victory.\nThrough Victory my chains are Broken. The Force shall free me.\"\n§RCode of the Sith§!"
 LOADING_TIP_28: "\"There is no emotion, there is peace.\nThere is no ignorance, there is knowledge.\nThere is no passion, there is serenity.\nThere is no chaos, there is harmony.\nThere is no death, there is the Force.\" - §BJedi Code§!"
 LOADING_TIP_29: "\"This is the Way.\" - §YDin Djarin§!"
 
 #0.52 Bad Batch
 LOADING_TIP_30: "\"Laying the foundation of our new empire is of the utmost importance.\" - §YVice Admiral Rampart§!"
 LOADING_TIP_31: "\"Conscripted recruits will never reach the same level of military proficiency. Our clones have been trained since their creation.\" - §YLama Su§!"
 LOADING_TIP_32: "\"The Empire will control the entire galaxy. And I am going to be a part of it.\" - §YCT-9904 Crosshair§!"
 LOADING_TIP_33: "\"Being dead in the Empire's eyes has its advantages.\" - §YCT-7567 Rex§!"
 LOADING_TIP_34: "\"Fighting… it takes a toll. My hope is that you won't ever have to live a life like mine.\" - §YCham Syndulla§!"
 LOADING_TIP_35: "\"Rebellion is an idea bigger than any of us, it has to be to inspire.\nIt is alive. Only as strong as its weakest link.\nWhat matters is that it survives us, that is grows beyond us.\" - §YLeia Organa§!"

 #0.7.3 Obi Wan
 LOADING_TIP_36: "\"Teeka, if you`re gonna steal my parts and sell them back to me. Could you at least clean them first as a courtesy?\" - §YObi Wan§!"

 #0.9 A New Hope
 LOADING_TIP_37: "\"History is on the move. Those who cannot keep up will be left behind, to watch from a distance. And those who stand in our way will not watch at all.\" - §YMitth'raw'nuruodo§!"
 LOADING_TIP_38: "\"We have hope. Hope that things will get better. And they will.\" - §YHera Syndulla§!"
 LOADING_TIP_39: "\"Overwhelming odds, tough target, scant chance of survival - business as usual for Rogue Squadron.\" - §YCorran Horn§!"
 LOADING_TIP_40: "\"A soldier's primary concern is not the establishment of government. Rather, it is a warrior's duty to build up the strongest force possible. It is his duty to crush his foes.\" - §YZsinj§!"
 LOADING_TIP_41: "\"Never get between a Mandalorian and a weapons package.\" - §YSabine Wren§!"
 LOADING_TIP_42: "\"If you only look after your own hide, then you're not a man.\" - §YFenn Shysa§!"
 LOADING_TIP_43: "\"I didn't want to rule. I had no intention of becoming a political leader - but you have given me no choice. I cannot leave the Empire in the hands of fools like you.\" - §YNatasi Daala§!"
 LOADING_TIP_44: "\"We're here to deliver a message. Let's deliver it.\" - §YIrizi'ar'alani§!"
 LOADING_TIP_45: "\"Rebellions are built on hope.\" - §YCassian Andor§!"
 LOADING_TIP_46: "\"Clan Wren is clearly a threat to the Empire, and must be made an example of.\" - §YGar Saxon§!"
 LOADING_TIP_47: "\"I'm not restricted by the authority of your so-called Bounty Hunter's Guild. I answer to a higher law.\" - §YBoba Fett§!"
 LOADING_TIP_48: "\"I'm no Jedi; I'm just a guy with a lightsaber and a few questions.\" - §YKyle Katarn§!"
 LOADING_TIP_49: "\"I had hoped for another solution, but these fools have chosen war.\" - §YWilhuff Tarkin§!"
 LOADING_TIP_50: "\"Empire can be different. Provided we shoot all the lunatics who enjoy the idea.\" - §YGilad Pellaeon§!"

 #0.9.X Andor
 LOADING_TIP_51: "\"The rebellion isn't here anymore. It's flown away. It's everywhere now. There's a whole galaxy out there waiting to disgust you.\" - §YLuthen Rael§!"
 LOADING_TIP_52: "\"The death of truth is the ultimate victory of evil. When truth leaves us, when we let it slip away, when it is ripped from our hands, we become vulnerable to the appetite of whatever monster screams the loudest.\" - §YMon Mothma§! "
 LOADING_TIP_53: "\"The Imperial need for control is so desperate because it is so unnatural. Tyranny requires constant effort. It breaks, it leaks. Authority is brittle. Oppression is the mask of fear. Remember that.\" - §YKaris Nemik§!"

 #1.1 Princess, Farmboy, Scoundrel 
 LOADING_TIP_54: "\"If you think you know better than me, all I can teach you to do is die.\" - §YSoontir Fel§!"
 LOADING_TIP_55: "\"Remember this. Freedom is a pure idea. It occurs spontaneously and without instruction.\" - §YKaris Nemik§!"
 LOADING_TIP_56: "\"One single thing will break the siege. Remember this. Try.\" - §YKaris Nemik§!"
 LOADING_TIP_57: "\"The longer we wait to identify a disorder, the harder it is to treat the disease.\" - §YLio Partagaz§!" 
 LOADING_TIP_58: "\"I bet they wish they'd asked a few more questions before accepting command of a slave army now.\" - §YSpar§!"
 LOADING_TIP_59: "\"I calculate that this will be my only opportunity to end the Clone Wars as I planned. With a victory for the Separatist Alliance.\" - §YKalani§!"