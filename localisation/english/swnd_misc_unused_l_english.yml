 pattite_pattuna.10.name: "Confusion on Patitite Pattuna"
 pattite_pattuna.10.desc: "We found a tiny race on the surface of this planet. We cant understand what they are saying. It looks like they want to tell us something. We should send a protocol droid for communication."
 pattite_pattuna.10.a: "Just take one of them and leave."
 pattite_pattuna.10.b: "Send a protocol-droid."
 pattite_pattuna.20.desc: "Our protocol-droid has arrived and we can now try to communicate with them. They seem to be impressed by our shiny droid who talks to them. We are sure that they never saw something like a droid before."
 pattite_pattuna.30.desc: "Our protocol droid finally established communication with the Patitite Pattuna. But they insult us and want us to leave them. They are no match for us, so we could sell them on black market maybe."
 pattite_pattuna.30.a: "Try to sell them on the black market."
 pattite_pattuna.30.b: "Just leave them."
 pattite_pattuna.31.desc: "Our protocol-droid failed to established communication, but we think that they want us to leave them. They are no match for us and we could easily catch them and sell them to others as pets, so we get something out of this disaster."
 pattite_pattuna.32.desc: "As our droid tries to establish communication, he falls on the leader of the Patitite Pattuna. We thought they would attack us, but it seems like they now celebrate our droid as some kind of god or hero. Anyhow what are we supposed to do? Maybe we can take some of them with us or just take one of them and learn more about them."
 pattite_pattuna.32.b: "Learn their culture and take one of them as pet."
 pattite_pattuna.40.desc: "We were able to get a good amount of them and left the planet. We find some buyers on the black market and make a good amount of credits. We can call it a success!"
 pattite_pattuna.41.desc: "As we try to capture them they injured our scientist. Every attempt to help him failed and his wounds were infected by the weapons of the Patitite Pattuna. We've maybe underestimated their power and can not risk any more lives. At least we were able to repair the ship. Now let's get out of this mess."
 pattite_pattuna.42.desc: "It's better to leave them. At least we learned something about their culture and society as we talked to them."
 pattite_pattuna.50.desc: "As we thought, they couldn't escape us and we caught a good amount of them. We were able to sell them on the black market to make some profit out of this situation."
 pattite_pattuna.51.desc: "One of their weapons hit one of the energy cores inside our science ship. We lost the whole crew and our scientist as well. In addition to that we have to pay their families. This is a total disaster!"
 pattite_pattuna.60.desc: "Thanks to our droid we got the most out of this situation. We learn about their culture and get a huge profit our of it as well. This mission was a major success!"
 pattite_pattuna.61.desc: "Thanks to our droid we were able to get a lot of knowledge from the Patitite Pattuna and in addition we can call our scientist a true roamer (add_trait = leader_trait_roamer). This is a great success for everyone!"
 governor_event.10.name: "Governor mining-district upgrade request"
 governor_event.10.desc: "One of our governors is requesting funding for an upgrade to his planet's mining districts. With his connections, the governor can put that money to good use, but it might be wiser to go through regular channels to accomplish this construction, rather than operating through possibly-corrupt backchannels. How should we handle the governor's request for funds?"
 governor_event.10.a: "Approve"
 governor_event.10.b: "Deny"
 governor_event.20.desc: "The governor was as good as his word: his industry contacts cut him excellent deals and delivered on time and at-budget. An excellent investment."
 governor_event.21.desc: "Our governor was as good as his word, but his contractors were not. Several construction workers died in a job site accident, and safety audits and inspections are causing delays and funding overruns."
 governor_event.22.desc: "After a month with no progress reports, we contacted the governor's office to request an update. The governor's office told us that they never received our funds allocation. Somebody out there is corrupt. Launch an audit, and avoid that governor's contacts until we've ironed this out."
 governor_event.23.desc: "Our governor told us that he was able to upgrade the districts without our help. This man is a genius! We got this district without paying anything for it."
 governor_event.24.desc: "The workers in our districts are now rioting about the upgrade of their district. Not a big deal, just some unhappy workers, nothing to be to worried about."
 governor_event.25.desc: "Our local population lost faith in us because of our unwise decision. This is a disaster!"
 governor_event.30.name: "Governor energy-district upgrade request"
 governor_event.30.desc: "Our governor in sector ADD_SECTOR requests some credits for an upgrade to our mining districts. With his connections, we could save some money, but maybe it is not wise to trust him. What is our decision?"
 governor_event.41.desc: "Our governor told us that we had some issues while upgrading our energy districts. One of our generators exploded during the process. We had to send a crew for repairs instead of working on the new district. This cost us precious time and some extra credits."
 governor_event.43.a: "He did it, who would have guessed?"