 l_english:
 ###########################################################################################################
 # Specimens Localization                                                                                  #
 #                                                                                                         #
 # Specimens use two description keys, depending on where/when they are displayed.                         #
 # Either SPECIMEN_DESC_SHORT or SPECIMEN_DESC_COMPLETE by called in the code depending on the situation.  #
 # - SPECIMEN_DESC_SHORT uses only the X_desc_short key                                                    #
 # - SPECIMEN_DESC_COMPLETE concatenates both X_desc_short and X_desc_details                              #
 ###########################################################################################################

 ## New Dawn Specimens by Bosmer ##
 twilek_kalikori: "Twilek Kalikori"
 twilek_kalikori_desc_short: "An heirloom belonging to a Twi'lek family"
 twilek_kalikori_desc_details: "Passed down from parent to child throughout generations, a kalikori is a totem adorned in art. Each parent of a Twi'lek lineage makes additions to the artwork to include themselves in the legacy of their family."
 mon_cal_credits: "Calamari Flan"
 mon_cal_credits_desc_short: "A unique currency used by the inhabitants of Dac"
 mon_cal_credits_desc_details: "The Calamari Flan is a disc-shaped white and blue coinage that can maintain its shape despite any pressure placed on it. Its value is comparable to the Imperial credit."
 pit_droid_head: "Damaged Pit Droid Head"
 pit_droid_head_desc_short: "Some poor, unfortunate pit droid appears to have lost their head"
 pit_droid_head_desc_details: "The DUM-series pit droids are mass produced for labor but notoriously incompetent. Despite this, they were useful for construction, easily recycled, and very space efficent."
 weapon_gamorrean_axes: "Gamorrean Axes"
 weapon_gamorrean_axes_desc_short: "Large, powerful axes used by Gamorreans"
 weapon_gamorrean_axes_desc_details: "Axes are powerful melee weapons that can cleave and hack away at an attacker. Axes such as these are favored by the Gamorreans."
 memorial_tablet: "Memorial Tablet"
 memorial_tablet_desc_short: "An ancient stone tablet"
 memorial_tablet_desc_details: "This ancient stone tablet is dedicated to a specific individual and details their life and legacy."
 dathomirian_blade: "Dathomirian Blade"
 dathomirian_blade_desc_short: "An ancient blade wielded by a Dathomirian"
 dathomirian_blade_desc_details: "A common sight among the various clans. It is imbued with dark side magick."
 mon_cal_skull: "Mon Calamari Skull"
 mon_cal_skull_desc_short: "The skull of a dead Mon Calamari"
 mon_cal_skull_desc_details: "A skull of a dead Mon Calamari is a garish trophy to display. Who its original owner is will remain a mystery."
 racing_trophy: "Racing Trophy"
 racing_trophy_desc_short: "A polished trophy"
 racing_trophy_desc_details: "A trophy awarded to first place in a highly competitve race. Hopefully no one is missing it."
 gungan_shield: "Gungan Shield"
 gungan_shield_desc_short: "A primitive shield used by Gungans"
 gungan_shield_desc_details: "Militagungs use shields that incorporated hydrostatic bubble technology. They were strong enough to withstand most blaster fire and physical attacks."
 rakatan_energy_pylon: "Rakatan Energy Pylon"
 rakatan_energy_pylon_desc_short: "An ancient piece of Rakatan technology"
 rakatan_energy_pylon_desc_details: "This deactivated Rakatan energy pylon is a remnant of Rakatan force-powered technology. It is a mere fraction of what the Infinite Empire was capable of."
 rakatan_terminal: "Rakatan Terminal"
 rakatan_terminal_desc_short: "$rakatan_energy_pylon_desc_short$"
 rakatan_terminal_desc_details: "While fragmentary, this terminal was a small part of a larger piece of Rakatan technology. What it belonged to is lost to time."
 rakatan_herald_bust: "Rakatan Predor Bust"
 rakatan_herald_bust_desc_short: "A spectre of a much darker past"
 rakatan_herald_bust_desc_details: "This bust of a Predor is a grim reminder of the Rakatan Infinite Empire. Predor was the title of the Rakatan overlords during the time of the Infinite Empire."
 nova_crystals: "Nova Crystals"
 nova_crystals_desc_short: "Luminous green crystals"
 nova_crystals_desc_details: "Nova crystals are a valuable and highly sought after gemstone, admired for their rarity, beauty, and industrial applications throughout the galaxy."
 ore_crystals: "Ore Crystals"
 ore_crystals_desc_short: "Luminous purple stones"
 ore_crystals_desc_details: "These purple ore clusters are routinely smelted down and processed into durasteel. They can be mixed with other ores such as carbonite, beskar, and phobium."
 carbon_crystals: "Carbon Crystals"
 carbon_crystals_desc_short: "Rocks containing carbon crystals"
 carbon_crystals_desc_details: "Carbon crystals are harvested and aid in the production of building-grade duraplast after being brought to a processing center. It is a readily abundant material."
 crystalized_carbonite: "Crystalized Carbonite"
 crystalized_carbonite_desc_short: "Crystals formed from gaseous carbon"
 crystalized_carbonite_desc_details: "Once these crystals are processed, the carbonite within can be used for flash-freezing goods or individuals for preservation. Individuals encased in carbonite run the risk of hibernation sickness."
 protocol_droid_parts: "Protocol Droid Parts"
 protocol_droid_parts_desc_short: "Just some parts"
 protocol_droid_parts_desc_details: "Bits and pieces of a protocol droid. Most of it is still useable."
 lost_king_of_duro: "Arm of Vardovin IV"
 lost_king_of_duro_desc_short: "Long live the king"
 lost_king_of_duro_desc_details: "Archregent Vardovin IV is known as the \"Lost King of Duro.\" His mummified arm is one of the few remaining intact pieces recovered from a derelict freighter."
 massive_ribcage: "Massive Ribcage"
 massive_ribcage_desc_short: "Remains of a once mighty beast"
 massive_ribcage_desc_details: "These remains once belonged to a creature of immense size. While the rest of its remains have crumbled to dust, this set of ribs is a testament to its truly gigantic size."
 skull_pile: "Humanoid Skulls"
 skull_pile_desc_short: "A grim trophy"
 skull_pile_desc_details: "A stack of humanoid skulls, bleached by the sun and weathered with age. Who ever they belonged to must miss them."
 aj6_headgear: "AJ^6 Cyborg Construct"
 aj6_headgear_desc_short: "Cybernetic headgear for higher productivity"
 aj6_headgear_desc_details: "The AJ^6 Cyborg Construct is made by BioTech Industries and is often used to enhance the wearer's productivity. However, there is a high chance of it changing one's personality and causing beahvorial issues."
 energy_cell: "Energy Cell"
 energy_cell_desc_short: "Comes in all sizes!"
 energy_cell_desc_details: "Everything needs a source of power and one of the most abundant forms of it is the energy cell."
 amberine_lump: "Amberine"
 amberine_lump_desc_short: "A highly useful material from Toshara"
 amberine_lump_desc_details: "Amberine is used in the production of several crafts ranging from jewelery to being made into strands for use in woven goods."
 seroryte_crystal: "Seroryte"
 seroryte_crystal_desc_short: "A shimmering green ore"
 seroryte_crystal_desc_details: "Seroryte is found primarily on the Outer Rim world of Akiva. It is frequently used as gemstone."
 coral_fossil: "Fossilized Coral"
 coral_fossil_desc_short: "Relic of an ancient sea"
 coral_fossil_desc_details: "Fossilized remains of an ancient coral structure that flourished on the ocean floor."
 cortosis_ingot: "Cortosis Ingot"
 cortosis_ingot_desc_short: "A rare find"
 cortosis_ingot_desc_details: "A rare but fragile metal that can absorb energy and withstand even a lightsaber strike."

 ## Repurposed SWFR Relics ##
 dream_rock: "$r_dream_rock$"
 dream_rock_desc_short: "A mystical Voss artifact from the time of the Old Republic"
 dream_rock_desc_details: "$r_dream_rock_desc$"
 roonstone: "$r_roon_stone$"
 roonstone_desc_short: "A very valuable crystal"
 roonstone_desc_details: "$r_roon_stone_desc$"
 crystal_ball: "$r_crystal_ball$"
 crystal_ball_desc_short: "A mysterious crystal sphere"
 crystal_ball_desc_details: "$r_crystal_ball_desc$"
 power_gem: "$r_power_gem$"
 power_gem_desc_short: "A beautiful yet powerful gemstone"
 power_gem_desc_details: "$r_power_gem_desc$"
 victory_plaque: "$r_victory_plaque$"
 victory_plaque_desc_short: "An ancient relic"
 victory_plaque_desc_details: "$r_victory_plaque_desc$"
 jedi_books: "$r_jedi_books$"
 jedi_books_desc_short: "A series of tomes related to the Jedi Order"
 jedi_books_desc_details: "$r_jedi_books_desc$"
 ryloth_ark: "$r_twilek_ark$"
 ryloth_ark_desc_short: "It belongs in a museum!"
 ryloth_ark_desc_details: "$r_twilek_ark_desc$"

 ### Separatist Specimens ##
 separatist_datapad: "Separatist Datapad"
 separatist_datapad_desc_short: "A datapad belonging to a member of Separatist leadership during the Clone Wars"
 separatist_datapad_desc_details: "This datapad once belonged to a member of Separatist leadership during the Clone Wars. While its contents aren't particularly exciting or revealing, it does provide some insight to some of the final CIS operations."
 vehicle_stap: "Surplus STAP"
 vehicle_stap_desc_short: "A surplus Separatist vehicle"
 vehicle_stap_desc_details: "The Single Trooper Aerial Platform is a repuslor craft mass produced by the Baktoid Armor Workshop. It was seen throughout the battlefields of the Clone Wars and was most notability used during the Invasion of Naboo."
 weapon_b2_wrist: "B2-series Battle Droid Wrist Gauntlet"
 weapon_b2_wrist_desc_short: "Watch those wrist rockets!"
 weapon_b2_wrist_desc_details: "One of the most formidable aspects of the B2-series Super Battle Droid was their built in wrist-mounted blaster cannons and rocket launchers."
 weapon_defoliator: "Defoliator Prototype"
 weapon_defoliator_desc_short: "A prototype defoliator weapon"
 weapon_defoliator_desc_details: "An attempt at making a Jedi-proof weapon that only destroyed organic matter. These were most famously deploed by Lok Durd against Lurmen colony on Maridun."
 viceroys_collar: "Viceroy's Collar"
 viceroys_collar_desc_short: "A decorative collar"
 viceroys_collar_desc_details: "A Viceroy collar is a decorative piecve of jewelry worn by the Viceroy of the Trade Federation. This one has seen better days but shows it was very expensive."
 undeployed_b1: "Undeployed B1 Battle Droid"
 undeployed_b1_desc_short: "An undeployed battle droid"
 undeployed_b1_desc_details: "An undeployed B1-series battle droid awaiting activation. This one appears to have been stripped of critical components."
 grevious_gutsack: "Gutsack" # Make a Relic
 grevious_gutsack_desc_short: "A synthskin pouch containing vital organs."
 grevious_gutsack_desc_details: "This synthskin gutsack contains remains of the dreaded General Grevious. Perhaps it could be used in the future."
 dooku_bust: "Bust of Count Dooku"
 dooku_bust_desc_short: "A symbol of Separatist ambition"
 dooku_bust_desc_details: "Made from bronzium, this bust of Count Dooku captures his imposing visage. Unlike others, this one has not been used for target practice."
 separatist_datapad_2: "Techno-Union Datapad"
 separatist_datapad_2_desc_short: "A datapad used by Techno-Union leadership"
 separatist_datapad_2_desc_details: "This datapad contains classified information related to the final operations of the Techno Union prior to the declaration of the New Order."
 weapon_e5_blaster: "E-5 Blaster Rifle"
 weapon_e5_blaster_desc_short: "Cheap and effective"
 weapon_e5_blaster_desc_details: "Mass produced by Baktoid Armor Workshop, the E-5 blaster rifle was standard issue for the B-1 Series Battle Droids. It was a common of a sight on the battlefield as much as a clone trooper with a DC-15."

 ### Imperial Specimens##
 imperial_rank_plaque: "Imperial Rank Plaque"
 imperial_rank_plaque_desc_short: "A misplaced Imperial rank plaque"
 imperial_rank_plaque_desc_details: "An Imperial officer misplaced their rank plaque. Some one is bound to be repremandid for this."
 stormtrooper_helmet: "Stormtrooper Helmet"
 stormtrooper_helmet_desc_short: "Standard issue, one size fits all"
 stormtrooper_helmet_desc_details: "This is just one of the eighteen pieces of armor that makes up a stormtrooper's imposing visage. Its ability to protect the wearer is routinely questioned."
 scout_trooper_helmet: "Scout Trooper Helmet"
 scout_trooper_helmet_desc_short: "Specialized helmet for specialized stormtroopers"
 scout_trooper_helmet_desc_details: "Although nearly identical to the old Phase II ARF helmet used by clone scout troopers, the Imperial version allowed for greater customization depending on assignment."
 imperial_beskar_ingots: "Imperial Beskar"
 imperial_beskar_ingots_desc_short: "Mandalorian iron with an Imperial brand"
 imperial_beskar_ingots_desc_details: "Beskar is only found within Mandalorian space and is a key component of their cultural identity. The beskar used to make these were smuggled into Imperial space, smelted into ingot form, and given an Imperial branding."
 weapon_inquisitorial_lightsaber: "Inquisitorial Lightsaber"
 weapon_inquisitorial_lightsaber_desc_short: "Nobody expected this"
 weapon_inquisitorial_lightsaber_desc_details: "All at that remains of a fallen member of the Inquisitorius. Select members of the Inquisition use this style of lightsaber."
 weapon_stormtrooper_rifle: "E-11 Blaster Rifle"
 weapon_stormtrooper_rifle_desc_short: "Standard issue for bucketheads"
 weapon_stormtrooper_rifle_desc_details: "A powerful, light, and compact weapon utilized by the Stormtrooper Corps and other Imperial military units."

 ### Republic Specimens##
 332nd_clone_helmet: "332nd Division Helmet"
 332nd_clone_helmet_desc_short: "A stolen helmet from a deceased clone trooper"
 332nd_clone_helmet_desc_details: "The 332nd Division was a part of the 501st Legion during the final days of the Clone Wars. It was commanded by CT-7567 and advised by Ahsoka Tano, both presumed dead in the wake of Order 66."
 weapon_z6_rotary_cannon: "Z-6 Rotary Blaster Cannon"
 weapon_z6_rotary_cannon_desc_short: "A powerful weapon common among Republic forces"
 weapon_z6_rotary_cannon_desc_details: "The Z-6 rotary blaster cannon was a common sight throughout the Clone Wars among republic forces. Often used by heavy weapon specialists, the Z-6 was notorious for its weight and its long reload time."
 weapon_dc_17_pistols: "DC-17 Pistols"
 weapon_dc_17_pistols_desc_short: "A BlasTech classic"
 weapon_dc_17_pistols_desc_details: "The DC-17 was the standard issue sidearm for several clone troopers during the Clone Wars. These blasters are known for their firepower and reliablility."
 weapon_dc_15_rifle: "DC-15 Blaster Rifle"
 weapon_dc_15_rifle_desc_short: "Standard issue for all clone troopers"
 weapon_dc_15_rifle_desc_details: "Every clone trooper since their creation has learned how to use operate and maintain a DC-15 rifle."
 weapon_dc_15_carbine: "DC-15 Blaster Carbine"
 weapon_dc_15_carbine_desc_short: "$weapon_dc_15_rifle_desc_short$"
 weapon_dc_15_carbine_desc_details: "$weapon_dc_15_rifle_desc_details$"
 weapon_dc_17m: "DC-17m Interchangeable Weapon System"
 weapon_dc_17m_desc_short: "A full house"
 weapon_dc_17m_desc_details: "The DC-17m was a standard issue weapon for all clone commandos. Its modular nature allowed it to be adapted for sniping and anti-armor use."
 phase_1_captain_helmet: "Phase I Clone Capatain Helmet"
 phase_1_captain_helmet_desc_short: "Surplus clone trooper gear"
 phase_1_captain_helmet_desc_details: "Like the Phase II armor, Phase I armor used color to designate rank and affiliation. A reddish stripe indicates the wearer as being a captain. Exceptions are made for certain units and specialized roles such as Advanced Recon and Clone Commandos."
 501st_clone_helmet: "501st Legion Helmet"
 501st_clone_helmet_desc_short: "$332nd_clone_helmet_desc_short$"
 501st_clone_helmet_desc_details: "The 501st Legion was commanded by Anakin Skywalker during the Clone Wars and saw combat throughout the war. Despite its decorated history, the 501st is the same legion that assaulted the Jedi Temple as a part of Operation Knightfall."

 ### Rebellion Specimens##
#  super_weapon_schematics: "Stolen Super Weapon Schematics" # Make a relic
#  super_weapon_schematics_desc_short: "Acquired by Rebel operatives, this provides the blueprints for a super weapon"
#  super_weapon_schematics_desc_details: "At the cost of several lives, Alliance High Command now has posession of schematics and detailed diagrams of an Imperial super weapon capable of destryoing entire worlds. However, despite the firepower of such a weapon, there is a weak spot along the equator - a small thermal exhaust port."
 alderaanian_banner: "Alderaanian Banner"
 alderaanian_banner_desc_short: "Tapestry draped over a bronzium crest"
 alderaanian_banner_desc_details: "A decorative piece from a noble Alderaanian family."
 alderaanian_nobility_statue: "Alderaanian Sculpture"
 alderaanian_nobility_statue_desc_short: "A beautiful sculpture"
 alderaanian_nobility_statue_desc_details: "This stone sculpture is a fine example of Alderaanian craftsmanship. Well suited for private gardens or public spaces."
 awing_pilot_helmet: "A-Wing Flight Helmet"
 awing_pilot_helmet_desc_short: "A well-worn helmet"
 awing_pilot_helmet_desc_details: "This flight helmet shows sign of wear and is adorned in symbols and colors related to the pilot's squadron."
 xwing_pilot_helmet: "X-Wing Flight Helmet"
 xwing_pilot_helmet_desc_short: "$awing_pilot_helmet_desc_short$"
 xwing_pilot_helmet_desc_details: "$awing_pilot_helmet_desc_details$"

 ### Jedi Specimens##
 training_remote: "Marksman-H training remote"
 training_remote_desc_short: "A salvaged training remote"
 training_remote_desc_details: "The Marksman-H training remote was commonly used by the Jedi Order to train padawans on how to deflect baster bolts with their lightsaber. This one was salvaged by scrappers. Its original owner is possibly long dead."
 chu_gon_dar_cube: "Chu-Gon Dar Cube"
 chu_gon_dar_cube_desc_short: "A mysterious cube with strange powers"
 chu_gon_dar_cube_desc_details: "Chu-Gon Dar Cubes were made by a Jedi named Chu-Gon Dar, a master of the physical force who lived on Mustafar. He embued the cubes with the power of transmogrification."
 lightsaber_specimen: "Looted Lightsaber"
 lightsaber_specimen_desc_short: "An elegant weapon for a more civilized age"
 lightsaber_specimen_desc_details: "This lightsaber was looted from the body of a fallen Jedi during after Order 66. Its owner is lost to time."
 lightsaber_saberstaff: "Looted Saberstaff"
 lightsaber_saberstaff_desc_short: "A double bladed lightsaber"
 lightsaber_saberstaff_desc_details: "Double-bladed lightsabers are of Sith origin but are used throughout the Jedi Order. Special training was required to use this. Its owner is lost to time."
 corellian_jedi_credit: "Green Jedi Credit"
 corellian_jedi_credit_desc_short: "Unique currency from the Corellian Jedi Enclave"
 corellian_jedi_credit_desc_details: "Jedi credits were decorative tokens used by the Green Jedi during the Old Republic. Its held significance as it was awarded to Knights who were elevated to the rank of Master."
 vor_na_tu: "Vor'Na'Tu"
 vor_na_tu_desc_short: "A mystical crystal"
 vor_na_tu_desc_details: "The Vor'Na'Tu is a mystical crystal that was guarded by the Jedi Order until their fall. Its purpose is not fully known, but it does seem to have some sort of reaction green nova crystals."
 healing_crystals: "Healing Crystals of Fire"
 healing_crystals_desc_short: "Powerful healing stones"
 healing_crystals_desc_details: "The Healing Crystals of Fire were one of the Jedi Order's most greatest treasures before the Great Jedi Purge. Rumored to have been found on Aurea, they were guarded by the Circle of Jedi Healers and were used to help treat grevious wounds. They reportedly were able to bring individuals back from the brink of death. It is said that an apprentice of Master Qui-Gon Jinn once tried stealing the crystals, only to have his plans fail."
 lightsaber_rifle: "Lightsaber Rifle"
 lightsaber_rifle_desc_short: "A highly unconventional weapon"
 lightsaber_rifle_desc_details: "Lightsaber rifles are exceedingly rare, even during the height of the Jedi Order. Due to the immense power of the blasts, most users can only fire the rifle five times at most before lightsaber melts."
 lightsaber_components: "Lightsaber Components"
 lightsaber_components_desc_short: "A handful of useful parts for lightsaber construction"
 lightsaber_components_desc_details: "These components range from the main hilt to blade emitters. All of these parts come together with a kyber crystal to create a lightsaber."
 jedi_lightsaber_hoard: "Collection of Lightsabers"
 jedi_lightsaber_hoard_desc_short: "Several fine additions to a collection"
 jedi_lightsaber_hoard_desc_details: "These lightsabers belonged to several different Jedi. How they ended up in a singular stash is unknown."
 sacred_arcaheological_find: "Je'dai Tablet"
 sacred_arcaheological_find_desc_short: "An ancient stone tablet from the Je'daii Order"
 sacred_arcaheological_find_desc_details: "This tablet details the philosophy of Balance and its relation to Ashla and Bogan - the light and dark sides."

 ### Criminal
 slicing_tools: "Slicing Tools"
 slicing_tools_desc_short: "A slicer's set of tools"
 slicing_tools_desc_details: "A sclicing kit is used by slicers to hijack technology or break into secure locations. This one has seen better days."
 bounty_puck: "Bounty Puck"
 bounty_puck_desc_short: "A simple way to spot a quarry"
 bounty_puck_desc_details: "Bounty pucks identify targets by displaying a holographic image of the quarry as well as relevant details such as conditions for capture or disintegration and the amount of credits offered."
 tracking_fob: "Deactivated Tracking Fob"
 tracking_fob_desc_short: "A short range beacon for bounty hunters"
 tracking_fob_desc_details: "Tracking fobs allow bounty hunters to find their targets based on biometric data and their chain codes."
 coaxium_case: "Stolen Coaxium"
 coaxium_case_desc_short: ""
 coaxium_case_desc_details: "Refined Coaxium must be handled with caution. It is just as volatile when refined as it is raw."
 stolen_chain_codes: "Stolen Chain Codes"
 stolen_chain_codes_desc_short: "Identity theft at its finest"
 stolen_chain_codes_desc_details: "Chain codes hold biometric data of an individual. The Empire uses them to force the public to register information before gaining access to public shuttle networks and exchange currency."
 weapon_thermal_detonator: "Class-A Thermal Detonator"
 weapon_thermal_detonator_desc_short: "Simply deadly"
 weapon_thermal_detonator_desc_details: "The Class-A thermal detonator is made by Merr-Sonn Munitions, Inc. and is a common sight throughout the underworld. Nothing can speed up up talks like activating one."

 ### Mando
 weapon_whistling_birds: "Whistling Birds"
 weapon_whistling_birds_desc_short: "A rare weapon"
 weapon_whistling_birds_desc_details: "Guided munitions stored inside a Mandalorian's vambraces. Known for their whistling noise as they fly towards their target."

 ### Unknown Regions
 zakuulan_plaque: "Zakuulan Plaque"
 zakuulan_plaque_desc_short: "A tasteful memorial"
 zakuulan_plaque_desc_details: "This plaque is commemorating an important member of the Zakuulan aristocracy and their achievements."
 zakuulan_banner: "Zakuulan Banner"
 zakuulan_banner_desc_short: "Heraldry on display"
 zakuulan_banner_desc_details: "A banner from the age of the Eternal Empire. Its a symbol of a failed gambit for galactic power."
 zakuulan_nobility_statue: "Zakuulan Nobility Statue"
 zakuulan_nobility_statue_desc_short: "A noble monument"
 zakuulan_nobility_statue_desc_details: "An aging statue of a Zakuulan noble. Time has not been kind to this sculpture."
 chiss_ascendancy_banner: "Chiss Ascendancy Banner"
 chiss_ascendancy_banner_desc_short: "A flag of isolationists"
 chiss_ascendancy_banner_desc_details: "The Chiss Ascendancy chooses to remain secretive and the perils of the Unknown Region aid them in this."
 vagaari_datapad: "Vagaari Datapad"
 vagaari_datapad_desc_short: "Classified documents and plans"
 vagaari_datapad_desc_details: "A datapad containing sensitive information about future operations in Chiss, Killik, Ssi-Ruuvi, and potentially Imperial space."
 weapon_zakuulan_shield_pikes: "Zakuulan Weapon Display"
 weapon_zakuulan_shield_pikes_desc_short: "A heraldric sort of display"
 weapon_zakuulan_shield_pikes_desc_details: "A pair of lightsaber pikes and an ancient shield used by the long-dead Zakuulan Knights."
 incomplete_skytrooper: "Skytrooper Chasis"
 incomplete_skytrooper_desc_short: "Some assembly required"
 incomplete_skytrooper_desc_details: "Skytoopers were battle droids manufactured by the Eternal Empire. This one is in too damaged of a state to repair."
 iokath_battery: "Iokath Battery"
 iokath_battery_desc_short: "A mysterious construction"
 iokath_battery_desc_details: "Although their name is lost time, the original inhabitants of Iokath pushed their technology to the limit. This battery is one such construct."
 xaxax_fountain: "Xaxax Fountain"
 xaxax_fountain_desc_short: "A fragment of brilliance"
 xaxax_fountain_desc_details: "The Xaxax are an extinct species that once lived in the Unknown Regions. What little they left behind is scattered across the vastness of Unknown space."
 zakuul_swamp_spider: "Iknayid Eggs"
 zakuul_swamp_spider_desc_short: "A clutch of arthropod horrors"
 zakuul_swamp_spider_desc_details: "Zakuul's Endless Swamps are home to several predator species. Iknayid are some of the most formidible creatures to dwell in the planet's swampy regions. They are capable of building large webs that can easily entangle the most unsuspecting prey."
 iokath_technolith: "Iokath Technolith"
 iokath_technolith_desc_short: "An ominous machine"
 iokath_technolith_desc_details: "Technoliths were made by Iokath's inhabitants and are some of the few remaining machine structures left behind after their species' civil war. Their purpose is unknown but is believed to be tied to communications and archiving."
 ssi_ruuk_entechment_table: "Entechment Rig"
 ssi_ruuk_entechment_table_desc_short: "A horrific device of immense pain"
 ssi_ruuk_entechment_table_desc_details: "The Ssi-Ruuk rely on entechment for their technology which involved draining the life force out of a victim until they die. This table has had its fair share of unwilling victims before being recovered."
 chiss_house_monument: "House Monument"
 chiss_house_monument_desc_short: "An expertly crafted statue"
 chiss_house_monument_desc_details: "A monument dedicated to one of the Ruling Families. The intricate stonework shows expert craftsmanship and reverence for the family."
 peridean_orb: "Mysterious Orb"
 peridean_orb_desc_short: "WIP"
 peridean_orb_desc_details: "We are not quite sure where this came from or who made it. What we do know is that there is a adark energy surrounding it. Something from maybe even beyond our galaxy."

 ### Sith
 cortosis_helmet: "Cortosis Helmet"
 cortosis_helmet_desc_short: "A haunting visage"
 cortosis_helmet_desc_details: "A stranger's helmet dating from as far back as the end of the High Republic. It appears to have been repaired at least once."
 ravager_device: "Ravager"
 ravager_device_desc_short: "A dead emperor's toy"
 ravager_device_desc_details: "An ancient Sith device that can break a person's mind, driving them to madness and death."
 massassi_ink_rifle: "Massaasi Ink Rifle"
 massassi_ink_rifle_desc_short: "Ancient but deadly"
 massassi_ink_rifle_desc_details: "A carved barrel mounted onto a scimitar-like weapon. It fired a liquid that would cause a localized paralysis. Could cause blindness if liquid got into the eyes."
 massassi_knuckler: "Massassi Knuckler"
 massassi_knuckler_desc_short: "Not a sword of honor"
 massassi_knuckler_desc_details: "An ancient Massassi close combat weapon. Very few are found still fully intact."
 dread_fate_plaque: "Dread Fate Plaque"
 dread_fate_plaque_desc_short: "Haunting visages"
 dread_fate_plaque_desc_details: "A horrific plaque of four faces contored in indescribable agony." 
 
 ### Yuuzhan Vong
 vong_grutchin: "Grutchin"
 vong_grutchin_desc_short: "A massive insect"
 vong_grutchin_desc_details: "Measuring at least half a meter long, this strange insect was captured eating the hull of a derelict ships . It appears to secrete some sort of acid. Thankfully we can contain it."
 vong_razor_bug: "Razor Bug"
 vong_razor_bug_desc_short: "Handle with care"
 vong_razor_bug_desc_details: "A hyper aggressive beetle found aboard a starship. Even though its dead, its wings and mandibles are still sharp."
 vong_thud_bug: "Thud Bug"
 vong_thud_bug_desc_short: "$vong_razor_bug_desc_short$"
 vong_thud_bug_desc_details: "$vong_razor_bug_desc_details$"
 vong_cognition_hood: "Cognition-hood"
 vong_cognition_hood_desc_short: "A bizarre hood"
 vong_cognition_hood_desc_details: "A strange device discovered in the remnants of an odd vessel found on an asteroid. Looks vaguely similar to a flight helmet. Perhaps its used to pilot a ship."
 vong_fighting_claw: "Fighting Claw"
 vong_fighting_claw_desc_short: "A fearsome weapon"
 vong_fighting_claw_desc_details: "This claw appears to extend from the knuckles but does not appear to be a naturally occurring appendage. The claw seems to be highly resistant to any sort of damage."
 vong_yorik_kul: "Dead Surge-coral"
 vong_yorik_kul_desc_short: "Small mysterious fragments"
 vong_yorik_kul_desc_details: "Dried remains of some strange unknown type of coral found within the body of another being. The body underwent a grotesque transformation with similar coral protusions forming on the bones."
 vong_vonduun_skerr_kyrric: "Vonduun Crab Armor"
 vong_vonduun_skerr_kyrric_desc_short: "An imposing set of armor"
 vong_vonduun_skerr_kyrric_desc_details: "This meticulously crafted set of armor is made out of the shell of the Vonduun crab. The armor appears to be highly resistant to most forms of damage. When discovered, the armor was fused to the wearer's body."
 vong_amphistaff: "Amphistaff"
 vong_amphistaff_desc_short: "A coiled living weapon"
 vong_amphistaff_desc_details: "Despite its serpentine apperance, this creature is not a normal snake. In fact, beyond its outward apperance and ability to spit venom, it appears to be something different altogether. Its durable and nearly indestructable."
 vong_plaeryin_bol: "Plaeryin Bol"
 vong_plaeryin_bol_desc_short: "A true false eye"
 vong_plaeryin_bol_desc_details: "A strange organism that shoot highly deadly poison. It can apparently shoot poison about ten meters."
 vong_magma_pebble: "Magma Pebble"
 vong_magma_pebble_desc_short: "Highy corrosive"
 vong_magma_pebble_desc_details: "Magma pebbles contain a small amount of magma that can be agitated by anything and thrown to deliver a large amount of molten rock."



 ###################################################
 ## Adapted from LOTOR with adjustments by Bosmer ##
 ###################################################

 admirals_medallion: "Dac Admirality Medallion" #formerly admirals medallion
 admirals_medallion_desc_short: "A medallion awarded to honor one of the most renowned Rebel admirals"
 admirals_medallion_desc_details: "This prestigious medallion commemorates a Core World admiral whose strategic brilliance led to numerous victories. It is a reminder of the stalwart nature of the Mon Calamari and their unyielding resolve."

 hanna_pendant: "Hanna Pendant" #formerly peace medallion
 hanna_pendant_desc_short: "A symbol of freedom for Chandrilans"
 hanna_pendant_desc_details: "The Hanna Pendant is a piece of Chandrilan jewelry that is made of three ropes made of metal rings that are connected to the shoulder with a clasp."

 zeffonian_astrium: "Zeffonian Astrium"
 zeffonian_astrium_desc_short: "A rare artifact from the Zeffonian civilization, used to enhance astronomical observations"
 zeffonian_astrium_desc_details: "This Astrium artifact, crafted by the long-lost Zeffonians, served as a powerful sensor amplifier. It enabled their exploration vessels to detect distant celestial phenomena with unmatched clarity."

 rishi_artifact: "Rishi Cultural Artifact"
 rishi_artifact_desc_short: "A symbolic artifact from the Rishi civilization, treasured for its calming presence"
 rishi_artifact_desc_details: "Unearthed from the ancient Rishi, this artifact is intricately designed to promote harmony and order. It remains a testament to the Rishi's devotion to stability and societal balance."

 nightsister_necklace: "Nightsister's Enchanted Necklace"
 nightsister_necklace_desc_short: "An enchanted necklace believed to hold dark mystical powers"
 nightsister_necklace_desc_details: "This mysterious necklace, said to be worn by a Nightsister elder, is rumored to enhance wisdom and leadership skills. It exudes a subtle power that resonates with those seeking knowledge."

 kitel_phard_vase: "Kitel Phardian Vase"
 kitel_phard_vase_desc_short: "A delicately crafted vase from the artisans of Kitel Phard"
 kitel_phard_vase_desc_details: "This vase, discovered on [fromfrom.GetName], exemplifies the elegance of Kitel Phardian design. Its intricate patterns are believed to channel energies that benefit both commerce and productivity."

 kalesh_mask: "Kalesh Warrior's Mask"
 kalesh_mask_desc_short: "A fierce mask once worn by a Kalesh warrior, instilling courage and strength"
 kalesh_mask_desc_details: "This ancient mask, crafted by the Kalesh, symbolizes martial prowess and tenacity. It was believed to empower its wearer with heightened resolve in battle."

 hendanyn_death_mask: "Hendanyn Death Mask"
 hendanyn_death_mask_desc_short: "An ominous mask used in Hendanyn funerary rites, symbolizing finality and power"
 hendanyn_death_mask_desc_details: "The Hendanyn fashioned this mask for their most revered warriors, intended to guide their spirits to the afterlife. Its imposing design invokes a haunting sense of determination and endurance."

 historic_electronic_1: "Early Computing Device"
 historic_electronic_1_desc_short: "An ancient electronic device from a bygone era"
 historic_electronic_1_desc_details: "This primitive computing device provides insight into early technological advancements in engineering. Its design reveals the foundational steps toward complex processing. This possibly comes from before the foundation of the Republic."

 historic_electronic_2: "Primitive Sensor Array"
 historic_electronic_2_desc_short: "A historic device used for early sensor processing and analysis"
 historic_electronic_2_desc_details: "This relic offers a glimpse into the early principles of physics as understood by a lost civilization. It was once used to enhance environmental scanning capabilities. It is possible this comes from before the foundation of the Republic."

 republic_datapad: "Republic Datapad"
 republic_datapad_desc_short: "A datapad containing valuable sociological data from a Republic society"
 republic_datapad_desc_details: "This datapad houses records on societal structure and practices, preserved to guide future Republic outreach missions. Its content highlights the culture and values of the Republic and their importance."

 historic_processing_unit: "Advanced Processing Unit"
 historic_processing_unit_desc_short: "A sophisticated unit from early computational systems, used to enhance productivity"
 historic_processing_unit_desc_details: "This processing unit shows a high level of refinement, indicative of advanced technology designed for enhanced production. It marks a key step in the automation of labor and resource management."

 weapon_sonic_blaster: "Geonosian Sonic Blaster"
 weapon_sonic_blaster_desc_short: "A weapon that utilizes high-frequency sonic waves to incapacitate targets"
 weapon_sonic_blaster_desc_details: "This blaster was engineered to deliver concussive sonic waves, capable of destabilizing even armored foes. The technology exemplifies a unique approach to non-lethal and disruptive weaponry."

 weapon_ceremonial_blade: "Ceremonial Wookiee Blade"
 weapon_ceremonial_blade_desc_short: "An ornately crafted Wookiee blade used in traditional ceremonies"
 weapon_ceremonial_blade_desc_details: "This exquisite blade, passed down through generations, was used in Wookiee rites. Its craftsmanship symbolizes unity and honor, instilling respect and pride in those who wielded it."

 rakatan_crystal: "Rakatan Resilience Crystal"
 rakatan_crystal_desc_short: "A rare Rakatan crystal, reputed to strengthen resolve in times of war"
 rakatan_crystal_desc_details: "This crystal was once valued by the Rakata for its rumored ability to bolster mental fortitude and resist the strains of conflict. Its energy resonates with a profound, calming strength."

 dried_drengir_seed: "Dried Drengir Seed"
 dried_drengir_seed_desc_short: "A dormant seed from the mysterious and deadly Drengir"
 dried_drengir_seed_desc_details: "While dried and inactive, this Drengir seed exudes an unsettling aura. Though dangerous if rehydrated, its unique botanical properties can enrich soil or minerals, benefiting worlds that harvest either food or mineral resources."

 death_sticks: "Death Sticks"
 death_sticks_desc_short: "A mild stimulant used recreationally by many rulers to ease stress"
 death_sticks_desc_details: "Contrary to their grim name, these sticks have a mild relaxing effect on most biological populations. Although their overuse can lead to complications, when taken sparingly, they provide a brief, noticeable uplift in morale for those managing planetary governance."

 sansanna_spice: "Sansanna Spice"
 sansanna_spice_desc_short: "A rare spice highly sought after for its distinct aroma and versatile effects"
 sansanna_spice_desc_details: "Sansanna Spice's allure is nearly universal, whether it's used to enhance trade value or as a lucrative commodity for syndicates. Known for its potent, earthy fragrance, this spice offers a remarkable value in criminal networks while doubling as a popular trade good."

 killik_eggs: "Preserved Killik Eggs"
 killik_eggs_desc_short: "A clutch of Killik eggs, preserved for study on their unique biology"
 killik_eggs_desc_details: "These eggs, encased in a stasis field, offer insights into the reproductive life cycle of the Killiks. Their unique biological structure has fascinated xenobiologists for centuries."

 terentatek_claw: "Terentatek Claw"
 terentatek_claw_desc_short: "The claw of a Terentatek, a fierce and deadly creature"
 terentatek_claw_desc_details: "This claw, taken from a Terentatek known for its strength and resistance to Force abilities, represents both primal power and danger. It holds cultural significance to some warrior societies and is believed to imbue a measure of its ferocity upon its bearer."

 krayt_dragon_pearl: "Krayt Dragon Pearl"
 krayt_dragon_pearl_desc_short: "A luminous pearl formed in the belly of a Krayt dragon"
 krayt_dragon_pearl_desc_details: "This rare gem, created over decades inside the gullet of a Krayt dragon, shimmers with a unique iridescence. Valued across the galaxy for its trade value, it also has surprising energy applications for gestalt entities."

 rancor_skull: "Rancor Skull"
 rancor_skull_desc_short: "The skull of a formidable Rancor beast, symbolizing raw strength"
 rancor_skull_desc_details: "Recovered from a Rancor, this colossal skull represents primal power and the dangers of untamed planets. It serves as a powerful reminder of the natural threats in the galaxy, inspiring rangers to safeguard frontier worlds."

 mudhorn_skull: "Mudhorn Skull"
 mudhorn_skull_desc_short: "A trophy takne from a ferocious Mudhorn"
 mudhorn_skull_desc_details: "This skull, taken from a mighty Mudhorn, symbolizes resilience and triumph over adversity. Often displayed as a badge of honor among hunters, it serves as a reminder of the primal challenges faced by those who dare to tread untamed lands."

 thranta_skull: "Thranta Skull"
 thranta_skull_desc_short: "The skeletal remains of the majestic Alderaanian thranta"
 thranta_skull_desc_details: "The Alderaanian thranta, a graceful creature once used for transportation, was revered for its beauty and flight. This preserved skull captures the awe of these soaring beasts, symbolizing Alderaan's harmony with nature before its tragic destruction."

 broken_geonosian_eggs: "Broken Geonosian Eggs"
 broken_geonosian_eggs_desc_short: "A clutch of cracked eggs"
 broken_geonosian_eggs_desc_details: "All that remains of a Geonosian nest. Nothing but crushed eggs."

 crystal_yellow: "Luminous Kyber Crystal"
 crystal_yellow_desc_short: "A radiant Kyber Crystal shimmering with warm energy"
 crystal_yellow_desc_details: "This luminous Kyber Crystal emits a bright, golden glow, symbolizing clarity and balance. Revered for its ability to enhance precision and focus, it has been treasured by many for its calming and radiant presence."

 crystal_green: "Verdant Kyber Crystal"
 crystal_green_desc_short: "A lush Kyber Crystal connected to the essence of life"
 crystal_green_desc_details: "Verdant Kyber Crystals are imbued with the vitality of the living Force, resonating with those attuned to nature. Their life-affirming energy made them sacred to ancient civilizations seeking growth and renewal."

 crystal_cyan: "Azure Kyber Crystal"
 crystal_cyan_desc_short: "A serene Kyber Crystal that exudes calm and resolve"
 crystal_cyan_desc_details: "The Azure Kyber Crystal is prized for its tranquil energy, often found in the ruins of advanced societies. Its serene resonance suggests a connection to both meditative practices and innovative technology."

 crystal_purple: "Regal Kyber Crystal"
 crystal_purple_desc_short: "A majestic Kyber Crystal with a mysterious allure"
 crystal_purple_desc_details: "This Regal Kyber Crystal symbolizes power and wisdom. Its rare, shimmering hue has long been sought after by spiritual leaders and scholars, representing a harmonious blend of strength and intellect."

 crystal_red: "Crimson Kyber Crystal"
 crystal_red_desc_short: "A fiery Kyber Crystal seething with raw intensity"
 crystal_red_desc_details: "The Crimson Kyber Crystal is known for its volatile energy and intense aura. Its fierce glow has been a hallmark of ancient weapons and artifacts, embodying both destruction and beauty."

 crystal_blue: "Cerulean Kyber Crystal"
 crystal_blue_desc_short: "A steadfast Kyber Crystal imbued with protective energy"
 crystal_blue_desc_details: "Cerulean Kyber Crystals are symbols of peace and determination. Their unwavering energy made them central to tools of defense and symbols of protection, resonating with calm resolve."

### Mandalorian Specimens
 mandalorian_helmet_1: "Mandalorian Helmet"
 mandalorian_helmet_1_desc_short: "A sturdy Mandalorian helmet crafted for a worker's everyday resilience"
 mandalorian_helmet_1_desc_details: "This common helmet, worn by Mandalorian workers, embodies their craftsmanship and unwavering dedication. Its design represents the hard-working Mandalorian spirit, subtly enhancing worker productivity across your worlds."

 mandalorian_helmet_2: "Mandalorian Forgemaster Helmet"
 mandalorian_helmet_2_desc_short: "A rare helmet worn by Mandalorian forgers, crafted for specialists"
 mandalorian_helmet_2_desc_details: "This rare artifact, a helmet crafted for Mandalorian specialists, symbolizes the pride of the forgers who forge and innovate. It encourages skill and efficiency among specialist roles, enhancing production and inspiring Mandalorian excellence."

 mandalorian_helmet_3: "Mandalorian Commander Helmet"
 mandalorian_helmet_3_desc_short: "A helmet that once belonged to a Mandalorian commander, carrying a legacy of resilience"
 mandalorian_helmet_3_desc_details: "This rare, iconic helmet symbolizes leadership and fortitude, as worn by Mandalorian commanders. It strengthens military resolve and unit health, inspiring forces to hold the line with Mandalorian courage."

 mandalorian_forge_tools: "Mandalorian Forge Tools"
 mandalorian_forge_tools_desc_short: "Ancient tools used to shape Beskar armor in Mandalorian forges"
 mandalorian_forge_tools_desc_details: "These tools were integral to crafting Beskar armor, an art known only to Mandalorian smiths. Non-Mandalorian users see modest alloy production gains, while Mandalorians receive an even greater boost in alloy output, honoring their ancestral trade."

 mandalorian_mythosaur_skull: "Mythosaur Skull"
 mandalorian_mythosaur_skull_desc_short: "The skull of a legendary Mythosaur, an ancient creature revered by Mandalorians"
 mandalorian_mythosaur_skull_desc_details: "This skull, symbolizing unity and ancient Mandalorian legacy, inspires solidarity among Mandalorian and non-Mandalorian cultures alike. As a potent symbol of honor, it boosts collective unity within the empire."

 mandalorian_equipment: "Mandalorian Armor and Weaponry Display"
 mandalorian_equipment_desc_short: "An impressive display of Mandalorian armor and weaponry"
 mandalorian_equipment_desc_details: "These pieces are a testament to the Mandalorian warrior legacy, generating trade value as curious visitors marvel at their craftsmanship. Gestalt empires derive energy production benefits instead, from studying these relics for their insights into design."

 mandalorian_final_blade_dunesa: "Final Blade of Dunesa"
 mandalorian_final_blade_dunesa_desc_short: "The last weapon wielded by the legendary Mandalorian warrior Dunesa"
 mandalorian_final_blade_dunesa_desc_details: "This historic blade was famously carried into the warrior's final battle, embodying the courage and skill that defined Dunesa's legacy. Those who draw inspiration from it gain increased experience, fueled by the determination it symbolizes."

 mandalorian_broken_basilisk_war_droid: "Broken Basilisk War Droid"
 mandalorian_broken_basilisk_war_droid_desc_short: "A relic of an ancient Mandalorian Basilisk war droid"
 mandalorian_broken_basilisk_war_droid_desc_details: "Though inactive, this war droid's remains are a formidable sight, evoking Mandalorian martial prowess. It subtly enhances strike craft weapon capabilities, inspiring engineers to learn from its once-deadly design."

 mandalorian_crystal_tablet: "Mandalorian Crystal Tablet"
 mandalorian_crystal_tablet_desc_short: "A crystal tablet detailing the history of Mandalorian culture and society"
 mandalorian_crystal_tablet_desc_details: "This rare crystal tablet, etched with intricate records of Mandalorian society, offers profound insights into their storied history and social structure. Scholars who study it gain valuable knowledge, increasing society research output."

 mandalorian_stone_tablet: "Mandalorian Stone Tablet of Virtues"
 mandalorian_stone_tablet_desc_short: "An ancient stone tablet bearing inscriptions of fundamental Mandalorian virtues"
 mandalorian_stone_tablet_desc_details: "Carved with timeless principles of honor, loyalty, and strength, this stone tablet draws individuals closer to Mandalorian cultural values, strengthening adherence to governing ethics among the population."

### Jedi Specimens
 jedi_broken_force_saber: "Broken Force Saber"
 jedi_broken_force_saber_desc_short: "The shattered remains of a Jedi's noble weapon"
 jedi_broken_force_saber_desc_details: "This broken Force Saber, once wielded by a devoted Jedi Knight, emanates a soft blue glow from its fractured kyber crystal. Even in its damaged state, it radiates an aura of calm and hope, reflecting the Jedi's unwavering connection to the light side of the Force. Revered as a relic of resilience and peace, it serves as a beacon of inspiration and a solemn reminder of the sacrifices made in the pursuit of balance and harmony."

 weapon_protosaber: "Protosaber"
 weapon_protosaber_desc_short: "An ancient energy blade prototype predating the lightsaber"
 weapon_protosaber_desc_details: "This early version of a lightsaber, with its external power pack and primitive design, represents a significant milestone in the evolution of energy weaponry. It remains a symbol of pioneering combat technology."

### Sith Specimens
 sith_broken_force_saber: "Broken Force Saber"
 sith_broken_force_saber_desc_short: "The shattered remains of a Sith's dark weapon"
 sith_broken_force_saber_desc_details: "This broken Force Saber, once wielded by a powerful Sith Lord, bears scars of its violent history. The fractured kyber crystal within it radiates faint, chaotic energy, a testament to its connection to the dark side. Though rendered inoperative, its remnants serve as a grim reminder of the destructive power and ambition of its master. Such artifacts are studied with caution, as they can evoke unsettling echoes of the Sith's unyielding will."

 sith_ancient_sword_1: "Ancient Sith Sword"
 sith_ancient_sword_1_desc_short: "An archaic Sith blade, relic of a long-lost era"
 sith_ancient_sword_1_desc_details: "This ancient Sith sword, forged in the days before lightsabers, is steeped in dark energy. Its blade is inscribed with runes detailing blood-soaked victories, and it seems to command order around it, as if the warrior who once wielded it still inspires fear and respect."

 sith_chalice: "Sith Ritual Chalice"
 sith_chalice_desc_short: "An ornate chalice once used in Sith ceremonies"
 sith_chalice_desc_details: "This dark-metal chalice is embellished with ancient Sith symbols and was used in rituals to channel forbidden energies. Sith acolytes believed drinking from this vessel would enhance their power, and even now, it exudes a strange allure that seems to bring a sense of satisfaction to onlookers."

 sith_mosaic: "Grand Sith Mosaic"
 sith_mosaic_desc_short: "A mosaic depicting the triumphs of the Sith Empire"
 sith_mosaic_desc_details: "This vast mosaic, meticulously crafted from countless pieces, depicts scenes of Sith conquests. Formerly adorning a Sith Lord's hall, it exudes Dark Side energy. To behold it is to glimpse the Sith legacy, a history defined by unyielding strength and cruelty, inspiring awe in all who view it."

 sith_obelisk: "Sith Obelisk of Doctrine"
 sith_obelisk_desc_short: "A towering Sith obelisk inscribed with dark teachings"
 sith_obelisk_desc_details: "The inscriptions on this ominous obelisk detail Sith philosophy, subtly instilling loyalty and ambition. Once a monument to Sith supremacy, its teachings call to those with a thirst for power, nudging their ethical alignment toward the Sith path, especially among those already drawn to its ideals."

 sith_warrior_mask: "Sith Warrior's Mask"
 sith_warrior_mask_desc_short: "A mask worn by a fierce Sith warrior of ages past"
 sith_warrior_mask_desc_details: "This metal mask, with its sharp contours and red lenses, was once worn by a Sith warrior to instill fear in enemies. The mask amplifies the wearer's voice and commands respect, symbolizing Sith power even now. Those who encounter it feel an impulse to revere its history, and it seems to encourage trade and industry as if in tribute."

 sith_ancient_armor: "Ancient Sith Armor"
 sith_ancient_armor_desc_short: "A suit of Sith warrior armor from the Great Hyperspace War"
 sith_ancient_armor_desc_details: "This ancient set of Sith armor, forged during the Great Hyperspace War, speaks to the martial traditions and battle prowess of the Sith Empire. Meticulously crafted and imbued with the dark side, it provides insights into Sith warfare and their use of Force-infused technology, making it a valuable artifact for societal research."

 sith_ancient_sword_2: "Ancient Forcesword"
 sith_ancient_sword_2_desc_short: "An ancient Sith Forcesword, renowned for its role in quelling unrest"
 sith_ancient_sword_2_desc_details: "This rare Forcesword, tempered with ancient techniques, was used by Sith overseers to impose order. Its mere presence is said to radiate an aura of authority, subtly reinforcing stability on any world that holds it."

 sith_relic_pathfinder: "Sith Pathfinder Relic"
 sith_relic_pathfinder_desc_short: "A relic encoded with hyperspace paths and ancient Sith navigation wisdom"
 sith_relic_pathfinder_desc_details: "This Sith artifact, laden with intricate inscriptions, served as a guide for Sith explorers. By meditating on its engravings, pilots can unlock faster routes through the stars, enabling fleets to traverse interstellar space with newfound efficiency."

 sith_sword_ludo_kresh: "Sword of Ludo Kressh"
 sith_sword_ludo_kresh_desc_short: "The legendary sword of the Sith Lord Ludo Kressh, imbued with dark wisdom"
 sith_sword_ludo_kresh_desc_details: "This infamous blade belonged to the Sith Lord Ludo Kressh and bears ancient inscriptions of immense knowledge. Though wielded for battle, its inscriptions reveal insights that advance all fields of research, bridging physics, society, and engineering with Sith cunning."

 sith_tulak_hords_lightsaber: "Tulak Hord's Lightsaber"
 sith_tulak_hords_lightsaber_desc_short: "The lightsaber of the renowned Sith Lord Tulak Hord, feared across the galaxy"
 sith_tulak_hords_lightsaber_desc_details: "Tulak Hord wielded this weapon to carve his legacy in the annals of Sith history. The lightsaber, charged with his might, enhances the fire rate of any fleet within friendly territory, as if Hord's own brutal tactics still influence the wielder's hand."

 sith_kyber_crystal: "Darkside Kyber Crystal"
 sith_kyber_crystal_desc_short: "A rare Kyber crystal, infused with dark side energies"
 sith_kyber_crystal_desc_details: "This rare Kyber crystal pulses with dark side energy, its inherent power amplifying unity across Sith-leaning populations. Revered by Sith Lords, it is said that the crystal holds the key to unlocking deeper connections to the Force, further solidifying the will of its wielders."

 sith_monolith: "Sith Monolith"
 sith_monolith_desc_short: "A towering monolith, etched with ancient Sith symbols and rituals"
 sith_monolith_desc_details: "This towering monolith, covered in ancient Sith markings, is a testament to the Sith's architectural mastery. Its presence on a planet fosters stability, as if the very structure draws from the dark side to solidify control and maintain order across its surroundings."

 sith_darth_nyriss_altar: "Darth Nyriss' Altar"
 sith_darth_nyriss_altar_desc_short: "A ceremonial altar once used by Darth Nyriss during her ill-fated rebellion."
 sith_darth_nyriss_altar_desc_details: "This altar, adorned with a distinct purple chalice resting on its obsidian surface, was central to the dark rituals of Darth Nyriss. Following her failed uprising against the Sith Emperor, the altar was seized as both a trophy and a warning to would-be challengers. Its aura is steeped in defiance and power, subtly influencing those who approach it, and sparking introspection into the nature of authority and rebellion."

### Hutt Specimens
 klatooine_crystal_statue: "Klatooine Crystal Statue"
 klatooine_crystal_statue_desc_short: "A brilliant crystal statue crafted by Klatooinian artisans"
 klatooine_crystal_statue_desc_details: "This rare statue, hewn from a single massive crystal, exemplifies the artistic and spiritual devotion of the Klatooinians. Said to inspire harmony and stability, it radiates an aura that calms those in its presence."

 weequay_whiskey: "Weequay Whiskey"
 weequay_whiskey_desc_short: "A rare vintage of Weequay-made whiskey"
 weequay_whiskey_desc_details: "Distilled from unique desert grains and infused with a touch of Weequay alchemical tradition, this whiskey is revered for its rich flavor and its uncanny ability to invigorate the mind and body. A sought-after indulgence among galactic elites."

 hutt_portrait_bronze: "Bronze Hutt Portrait"
 hutt_portrait_bronze_desc_short: "A modest bronze statue depicting a Hutt figure"
 hutt_portrait_bronze_desc_details: "This bronze portrait pays homage to a Hutt leader of old. Though simple in design, it is revered as a symbol of power and influence, offering unity to those who behold it."

 hutt_portrait_gold: "Golden Hutt Portrait"
 hutt_portrait_gold_desc_short: "A lavish golden statue of a prominent Hutt leader"
 hutt_portrait_gold_desc_details: "Cast in pure gold, this statue exudes opulence and commands respect. Its craftsmanship reflects the Hutts' penchant for extravagance, inspiring awe and unity across the galaxy."

 hutt_frozen_carbonite: "Hutt Frozen in Carbonite"
 hutt_frozen_carbonite_desc_short: "A Hutt encased in carbonite, perfectly preserved"
 hutt_frozen_carbonite_desc_details: "The imposing form of this carbonite-encased Hutt is a chilling reminder of the galaxy's darker practices. Preserved for millennia, it continues to emit a presence that stabilizes its surroundings while evoking both fear and curiosity."

 hutt_wupiupi_coins: "Hutt Wupiupi Coins"
 hutt_wupiupi_coins_desc_short: "A collection of ancient Hutt coins"
 hutt_wupiupi_coins_desc_details: "These gleaming coins, embossed with ancient Hutt symbology, once served as the backbone of Hutt trade. Their value transcends monetary worth, offering insights into the economic might of the Hutt Cartel."

 hutt_banner: "Hutt Banner"
 hutt_banner_desc_short: "A banner bearing the insignia of a Hutt kajidic"
 hutt_banner_desc_details: "This faded banner symbolizes the dominance of a bygone Hutt clan. Displayed prominently, it inspires swift construction and determination, reflecting the relentless ambition of Hutt-controlled worlds."

 hutt_mumy: "Hutt Dynasty Mummy"
 hutt_mumy_desc_short: "A remarkably preserved Hutt mummy, still exuding an air of ancient authority"
 hutt_mumy_desc_details: "Wrapped in traditional burial linens and adorned with emblems of the ancient Hutt dynasties, this mummy's preservation astonishes researchers. For Hutt societies, it holds unique cultural significance, but for others, it serves as an eerie yet fascinating relic of a powerful lineage."

 gamorean_axe: "Gamorrean Battle Axe"
 gamorean_axe_desc_short: "A crude but deadly weapon wielded by a Gamorrean warrior"
 gamorean_axe_desc_details: "This heavy, blood-stained axe tells tales of countless battles fought in the name of Hutt overlords. Its weight and design reflect the raw strength of Gamorreans and their loyalty to those who command them."

 hutt_skiff: "Hutt Skiff"
 hutt_skiff_desc_short: "A personal transport used by Hutts to oversee their domains"
 hutt_skiff_desc_details: "This hovering platform, equipped with luxurious seating and defense turrets, was a status symbol for Hutts traveling their territories. Its presence serves as a reminder of the unyielding dominance of Hutt kajidics."

 hutt_treaty_vantor: "Treaty of Vantor"
 hutt_treaty_vantor_desc_short: "A pivotal agreement that reshaped Hutt relations with the galaxy"
 hutt_treaty_vantor_desc_details: "This ancient treaty, signed in elaborate Huttese script, symbolizes a key turning point in intergalactic diplomacy. Its influence continues to shape political ideologies, drawing species to align with Hutt ideals."

 hutt_evocii_totem: "Evocii Totem of Resistance"
 hutt_evocii_totem_desc_short: "A relic of Evocii defiance against Hutt domination"
 hutt_evocii_totem_desc_details: "Crafted with intricate detail, this totem represents the lost hope of the Evocii species, enslaved by the Hutts. Revered by historians, it offers invaluable insights into the culture and resistance efforts of the Evocii people."

 hutt_hookah_pipe: "Hutt Hookah Pipe"
 hutt_hookah_pipe_desc_short: "An ornate hookah once used by a powerful Hutt leader"
 hutt_hookah_pipe_desc_details: "Fashioned from exotic metals and adorned with precious stones, this hookah reflects the Hutts' indulgent lifestyle. Legends claim its use inspired grand strategies and negotiations in the haze of aromatic fumes."

 quesh_venom_vile: "Quesh Venom Vial"
 quesh_venom_vile_desc_short: "A vial containing potent venom extracted from Quesh's unique ecosystem"
 quesh_venom_vile_desc_details: "The venom within this vial is a key component in creating advanced combat stims and adrenals. Hailing from Quesh, a world known for its toxic environment, this substance has seen use in espionage and warfare, sharpening minds and dulling fear."

