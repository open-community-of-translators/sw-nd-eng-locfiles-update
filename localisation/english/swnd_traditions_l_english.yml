 tradition_espos: "Security Police"
 tradition_espos_desc: "Our assets will be protected by a wall of riot guns, Merr-Sonn stun batons and transparisteel riot shields."
 tr_espos_adopt: "Security Police Traditions"
 tr_espos_finish: "Security Police Traditions Finished"
 tr_espos_finish_desc: "$MOD_TRADE_VALUE_MULT$: §G+10%§!\nAscension Perks Unlocked: §G+1§!\nWe will be able to construct §YBattle Droids§! with blueprints purchased from §BBaktoid Combat Automata§!."

 tr_espos_colonial_viceroys: "Colonial Viceroys"
 #tr_domination_colonial_viceroys_desc: "§Y$MOD_LEADER_GOVERNOR_SKILL_LEVELS$§! increased by §Y2§!."
 tr_espos_colonial_viceroys_delayed: "Our control over the colonies is dependent upon us finding capable and loyal individuals that can be trusted to enforce the will of the government."
 tr_espos_colonial_viceroys_machine: "Autonomous AI"
 tr_espos_colonial_viceroys_machine_delayed: "AI released from most behavioral inhibitors may be more prone to erratic performance and random crashes, but they are the only type that can process the huge number of variables inherent to galactic colonization."
 tr_espos_colonial_viceroys_hive: "Meeting of the Minds"
 tr_espos_colonial_viceroys_hive_delayed: "We must have more autonomous drones to enforce harmony as our hives grow in number."

 tr_espos_grand_council: "Privy Council"
 #tr_domination_grand_council_desc: "§Y$MOD_LEADER_RULER_SKILL_LEVELS$§! increased by §Y2§!."
 tr_espos_grand_council_delayed:2 "The best and the brightest compete for a chance to whisper advice into the auditory receiver of our illustrious ruler, to better guide the ship of state."
 tr_espos_multi_thread: "Multithreaded Core Functions"
 tr_espos_multi_thread_delayed: "Once all core functions have been multithreaded, no CPU core shall be left to wallow in idleness."
 tr_espos_synaptic_network: "Synaptic Network"
 tr_espos_synaptic_network_delayed: "The Mind can only act as fast as it receives input and information from the drones under its control. With a faster and more efficient synaptic network, delays in response time will be a thing of the past."

 tr_espos_imperious_architecture: "Imperious Architecture"
 tr_espos_imperious_architecture_desc:2 "£building£ §YCapital Buildings§! and £building£ §YHousing Buildings§! provide §G+1§! £housing£ §Y$MOD_PLANET_HOUSING_ADD$§! each."
 tr_espos_imperious_architecture_delayed: "All government buildings in our great empire shall be monuments to the state, looming over the populace to inspire obedience, loyalty, and awe."
 tr_espos_synaptic_extensions: "Synaptic Extensions"
 tr_espos_synaptic_extensions_desc: "£building£ §Y$building_hive_node$§! now also increase £housing£ §Y$MOD_PLANET_HOUSING_ADD$§! by §Y2§!."
 tr_espos_synaptic_extensions_delayed: "The great reach of the Mind must be extended farther still. Additional synaptic extensions will enable efficient control of yet more drones."
 tr_espos_modular_depot: "Modular Depots"
 tr_espos_modular_depot_desc:2 "§Y$EMPIRE_SIZE$§! from §YDistricts§! is reduced by §G25%§!."
 tr_espos_modular_depot_delayed:2 "To maximize the number of drones that can be fielded, our buildings that make up our districts must become more efficient. A modular design would provide far more flexibility."

 tr_espos_workplace_motivators: "Workplace Motivators"
 tr_espos_workplace_motivators_desc:3 "§YUnlocks Edict:§! $edict_extended_shifts$"
 tr_espos_workplace_motivators_delayed: "There are many ways to motivate those who perform menial labor to work harder. Some based on incentives and some... not."
 tr_espos_drone_network: "Drone Network"
 tr_espos_drone_network_desc:3 "§YUnlocks Edict:§! $edict_drone_overdrive$"
 tr_espos_drone_network_delayed: "We have improved the ways in which our consciousness communicates with its drones, greatly increasing their efficiency."

 tr_espos_trust_officers: "Public Trust Officers"
 tr_espos_trust_officers_desc:3 "§YUnlocks Edict:§! $edict_enhanced_surveillance$\n£job_enforcer£ §Y$job_enforcer_plural$§! also produce §Y1§! £unity£ Unity"
 tr_espos_trust_officers_delayed: "The important work done by law enforcement officials can only truly be successful if they have the cooperation of the public. Creating a corps of Public Trust Officers that work directly with the population will help ensure that this cooperation is freely given."
 tr_espos_judgment_corps: "Judgment Corps"
 tr_espos_judgment_corps_desc:3 "§YUnlocks Edict:§! $edict_enhanced_surveillance$\n£job_enforcer£ §Y$job_enforcer_plural$§! also produce §Y1§! £unity£ Unity"
 tr_espos_judgment_corps_delayed: "Sprawling cities and isolated mining stations both have unique challenges associated with crime prevention. To expedite law enforcement we have made the judicial process more efficient by combining the roles of judge, jury and enforcer."
 tr_espos_deviancy_protocols: "Deviancy Protocols"
 tr_espos_deviancy_protocols_desc:2 "§Y$MOD_PLANET_CRIME_NO_HAPPINESS_ADD$§! is reduced by §G10§! on all our planets."
 tr_espos_deviancy_protocols_delayed: "Deviancy and corruption must be guarded against at all levels. With efficient counter-protocols in place, drones suspected of deviant activities can be swiftly terminated before they can spread the corruption further."
 tr_espos_divergence_supression: "Divergence Suppression"
 tr_espos_divergence_supression_desc: "$tr_domination_deviancy_protocols_desc$"
 tr_espos_divergence_supression_delayed: "Occasionally our unity is disrupted by a rogue drone. This threat has increased as we spread out across the stars. Purging and recycling these units gives them a chance to contribute to the hive with their deaths, in a way they could not with their lives."

