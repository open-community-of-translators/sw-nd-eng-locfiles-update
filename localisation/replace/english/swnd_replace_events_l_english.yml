l_english:
 strange_worlds.155.desc_homicidal: "We have encountered a notably disgusting species of fauna native to §Y[Root.GetName]§!.\n\nThey have evolved a defense mechanism that happens to also serve as their primary method of food acquisition. Lacking the digestive enzymes needed to break down solid food on their own, they emit a powerful and repulsive gas that induces projectile vomiting when inhaled by other organisms with a functioning gut. These ejected substances are then consumed as their main source of nutrients.\n\nThe culling of these foul creatures will provide a useful windfall of §YTibanna Gas§! and §YFood§!."
 strange_worlds.160.desc: "Ridding §Y[Root.GetName]§! of its revolting pests has proven difficult. Younger members of the colony continue to play with the animals despite official warnings.\n\nAs a result of this, our [Root.Owner.GetSpeciesOrganName] proteins have become their preferred source of food. Our colony has become a much easier target than the rest of the planetary fauna who know to avoid their foul gases. These creatures have adapted further to our presence, and have been witnessed employing ambush tactics against any lone [Owner.GetColonist] wandering around after a meal.\n\nUnbelievably, there are some benefits to this situation. Our scientists have discovered the emetic fumes emitted by the creatures contain valuable gaseous material similar to §YTibanna Gas§! particles which could be harvested by domesticating the beasts and keeping them in quarantined facilities.\n\nThe majority of the colony, however, have proposed that we simply eradicate them."
 strange_worlds.165.desc: "The creatures on §Y[Root.GetName]§! are no longer causing mass regurgitations.\n\nWith the development of a synthetic nutrient paste catered to their xenobiology, we have regulated their dietary cycles and put an end to their opportunistic ambushes on our [Owner.GetColonistPlural].\n\nWe have relocated them to a carefully designed wildlife reserve where the public can enjoy the animals in a safe environment. Specialist handlers have been trained to extract their §YTibanna Gas §!without further harm."
 strange_worlds.170.desc: "Since adopting an official shoot on sight policy, it has now been several months since the offending species on §Y[Root.GetName]§! was last sighted near the colony.\n\nWhile some [Owner.GetColonistPlural] miss the presence of the furry creatures, everyone is happier overall now that they can travel freely without fear of forcibly regurgitating.\n\nOur scientists have harvested the bodies of the animals, extracting some amount of gaesous material not too dissimilar to §YTibanna Gas§! directly from their internal organs."
 pm_gaseous_fauna_ct: "All £pop£ Pop produce £tibanna_gas£§Y$tibanna_gas$§!"