 ## Buildings                 ##
 ## from swnd_main_l_english  ##
 ###############################
 building_colony_shelter: "Frontier Outpost"
 building_colony_shelter_desc: "A surveillance complex with limited staff, usually located close to the frontier."
 building_system_capital: "System Capital"
 building_hab_major_capital: "Habitat Central Complex"
 building_precinct_house_desc: "Dedicated to the preservation of law and order, the building provides a base for the planet's Enforcers."
 building_hall_judgment: "Precinct Barracks"
 building_hall_judgment_desc: "A bigger complex housing the enforcers of law and order."
 building_clone_vats_desc: "Clone Vats allow for a remarkable increase to population growth speed."
 building_mineral_purification_plant: "Processing Plant"
 building_mineral_purification_hub: "Processing Hub"
 building_food_processing_facility: "Distribution Facility"
 building_food_processing_facility_desc: "An efficient facility where large amounts of food can be processed and distributed to the population."
 building_food_processing_center: "Distribution Center"
 building_food_processing_center_desc: "A streamlined complex where considerable amounts of food can be processed and distributed to the population."
 building_foundry_1: "Alloy Foundries"
 building_foundry_1_desc: "The metallurgists working in these foundries produce high-quality alloys."
 building_foundry_2: "Alloy Forges"
 building_foundry_2_desc: "Production on a massive scale, these forges can manufacture alloys in great quantities."
 building_foundry_3: "Alloy Fabricators"
 building_foundry_3_desc: "Advanced manufacturing centers where the alloy production process is aided by semi-sentient machines."
 building_factory_1: "Civilian Workshops"
 building_factory_1_desc: "Clusters of small workshops where skilled laborers craft a range of everyday consumer goods."
 building_factory_2: "Civilian Factories"
 building_factory_2_desc: "Larger factory zones with coordinated production lines focused on mass production of civilian necessities."
 building_factory_3: "Civilian Fabricators"
 building_factory_3_desc: "Highly specialized facilities that produce consumer goods using the latest fabrication techniques."
 building_research_lab_1: "Research Lab"
 building_research_lab_1_desc: "Centers of scientific discovery, these laboratories provide equipment and staff to burgeoning researchers from myriad fields of study."
 building_research_lab_2: "Research Facility"
 building_research_lab_2_desc: "Containing both laboratories and testing grounds, this facility provides scholars from various fields with advanced research capabilities."
 building_research_lab_3: "Research Center"
 building_research_lab_3_desc: "Containing laboratories, testing grounds, and rapid prototyping facilities, this center provides cutting-edge research and development capabilities."
 building_institute_desc: "Coordinating research across dozens of organizations, the Research Institute is home to both galaxy-class intellectuals and cunning administrators."
 building_supercomputer_desc: "Cooled by towering banks of cryo-freezers and fed an endless supply of data, the supercomputer is designed to take on the galaxy's toughest problems."
 building_commercial_zone: "Trade Market"
 building_commercial_zone_desc: "A specially zoned district where merchants and bankers ply their trade."
 building_commercial_megaplex: "Trade Center"
 building_commercial_megaplex_desc: "A bustling hive of commerce home to countless bankers, financiers, insurers, brokers, dealers, traders, and speculators."
 building_galactic_stock_exchange: "Stock Exchange"
 building_galactic_stock_exchange_desc: "The galaxy's premier exchange where quintillions of credits worth of stocks, bonds, commodities, and derivatives are actively traded every day."
 building_luxury_residence: "Residences"
 building_luxury_residence_desc: "Bedecked with wroshyr wood countertops and dreamsilk drapes, these residences are the abodes of the galactic elite."
 building_paradise_dome: "Habitable Dome"
 building_paradise_dome_desc: "Customized to the resident's atmospheric preferences, habitable domes and skyhooks provide unmatched living to those lucky enough to afford them."
 building_communal_housing_desc: "Blocks of featureless ferrocrete and durasteel apartments provide efficient, but not particularly luxurious, housing."
 building_communal_housing_large_desc: "Built to meet each resident's unique needs, these housing complexes provide a balance of personal comfort and communal spirit."
 building_drone_storage_desc: "Rows of folding charging racks allow large numbers of droids to be maintained and housed in an exceptionally space efficient manner."
 building_drone_megastorage_desc: "Towering charging lattices allow a vast number of droids to be maintained practically indefinitely in an extremely space efficient manner."
 building_hive_warren_desc: "Whether carved from the ground with claw or tool, these simple warrens provide inhabitants with simple, but safe, shelter."
 building_expanded_warren_desc: "Designed to maximize space and minimize expended effort, these labyrinthine warrens can house huge broods through all stages of their lifecycle."
 building_holo_theatres_desc: "From idyllic Corellian holodramas to baroque Mon Calamari ballets, holotheaters cater to a wide clientele - all in full spectrum, high fidelity holo."
 building_hyper_entertainment_forum_desc: "Providing both holographic and live entertainment options, the forum services a massive clientele and is capable of accommodating nearly any patron."
 building_clinic_desc: "Stocked with mostly kolto products, the clinic is capable of tending to the immediate medical needs of the local populace."
 building_hospital_desc: "With stores of bacta, kolto, and other stimulants, the hospital facility serves the medical needs of a large swathe of a planet's population."
 building_maintenance_depot_desc: "Stocked with charging racks, service drones, and programming adjusters, maintenance depots have everything needed to maintain a droid population."
 building_spawning_pool_desc: "Bubbling with a complex concoction of proteins, exotic enzymes, and primordial fluids, these pits contain the genetic makeup of countless generations."
 building_slave_huts_desc: "A squalid assortment of corrugated plasteel and mud-brick buildings, they provide an approximation of housing for the local slave population."
 building_overseer_homes: "Overseer Homes"
 building_overseer_homes_desc: "Richly adorned and well-maintained, these homes offer their owners a much-needed respite from the tiring work of overseeing the slave population."
 building_autochthon_monument: "Heritage Centers"
 building_autochthon_monument_desc: "Encased behind transparisteel or approximated through holographic rendering, historical artifacts provide a window into a culture's past."
 building_heritage_site: "Museum Facilities"
 building_heritage_site_desc: "Part laboratory, part repository, the museum facilitates both the preservation and study of a culture's past and possible future."
 building_hypercomms_forum: "Cultural Forums"
 building_hypercomms_forum_desc: "With treasures both antique and modern, local and alien, the facility provides a forum for the analysis and sharing of different cultural practices."
 building_autocurating_vault: "Holo Museums"
 building_autocurating_vault_desc: "Painstakingly rendered in full spectrum holo, displays at these museums instill visitors with a deep appreciation of the creator's culture."
 building_holotemple_desc: "Overseen by the clergy and enhanced through the wonders of holographic technology, the temple provides a spiritual tether to the divine."
 building_sacred_nexus_desc: "The latest developments in holographic technology allow worshipers to directly experience the divine influence of sacred ground."
 building_hive_node: "Hive Node"
 building_hive_node_desc: "A byproduct of the evolution of the hive's cerebral organs, the node allows the hive to probe those questions that go beyond immediate survival."
 building_hive_cluster_desc: "Wreathed in pulsing neural tissue, these specialized organic structures allow the hive to delve into existential questions."
 building_hive_confluence_desc: "A specialized creature in its own right, the hive confluence is an organ purpose-bred to grapple with the galaxy's most difficult existential issues."
 building_uplink_node_desc: "Used to connect to other communication facilities, the node helps to smooth the local flow of data and information."
 building_network_junction_desc: "Capable of short-distance broadcasts, this facility serves as a key node in the local region's data network."
 building_system_conflux_desc: "Configured to both send and receive information across long distances, this facility forms a key part of the region's physical data infrastructure."
 building_alpha_hub_desc: "Bristling with antennae, receivers, and holonet transmitters, this facility is capable of collecting, collating, and analyzing a vast amount of data."
 building_organic_sanctuary_desc: "Overseen by a master subroutine and staffed by repurposed droids, the sanctuary provides the necessary conditions for organic beings to survive."
 building_organic_paradise_desc: "Overseen by a specialized program and staffed by attentive droids, the facility provides all the luxuries their organic 'guests' could ever want."
 building_corporate_monument: "Corporate Monument"
 building_corporate_monument_desc: "Courtesy of a multi-million credit donation, this monument glorifies the contributions of the donor to the local region."
 building_corporate_site: "Corporate Site"
 building_corporate_site_desc: "A site dedicated to glorifying the unique corporate culture that permeates every business transaction conducted on the planet."
 building_corporate_forum: "Corporate Forum"
 building_corporate_forum_desc: "The product of decades of market research and careful advertising, this site has been embraced by the local planet as a key part of its identity."
 building_corporate_vault: "Corporate Vault"
 building_corporate_vault_desc: "A repository of corporate intelligence and market data, the vault has all the information a corporation needs to influence galactic affairs."
 building_military_academy_desc: "With courses in infantry tactics and void warfare, the military academy instills competence and discipline in the soldiers of tomorrow."
 building_stronghold: "Garrison"
 building_stronghold_desc: "A collection of barracks and underground bunkers capable of projecting military force into the surrounding area."
 building_fortress_desc: "A complex of fortified strongpoints, duracrete-hardened silos, and underground living quarters capable of housing a legion of soldiers."
 building_planetary_shield_generator: "Basic Shield Generator"
 building_planetary_shield_generator_desc: "A ground-based shield generator capable of projecting a planetwide deflector shield."
 building_private_mining_consortium_desc: "£building£ §BNon-Criminal Outpost§!\n\nGranted a mining concession in return for a share of their output, private mining consortiums form the backbone of many backwater economies."
 building_food_conglomerate_desc: "£building£ §BNon-Criminal Outpost§!\n\nSupplied by a seemingly endless stream of agricultural freighters and livestock transports, food conglomerates convert calories to credits."
 building_virtual_entertainment_studios_desc: "£building£ §BNon-Criminal Outpost§!\n\nHolo studios combine cutting-edge technology with the ancient craft of acting to produce quality entertainment."
 building_private_shipyards_desc: "£building£ §BNon-Criminal Outpost§!\n\nAccountable only to their shareholders, private shipyards trade the predictability of government contracts for operational independence."
 building_military_contractors_desc: "£building£ §BNon-Criminal Outpost§!\n\nThe galaxy's second oldest profession, mercenaries are hired for everything from assassinations to planetary invasions."
 building_public_relations_office_desc: "£building£ §BNon-Criminal Outpost§!\n\nCredits may talk, but corporations still need someone to do the actual talking."
 building_private_research_initiative: "Private Research Initiative"
 building_private_research_initiative_desc: "£building£ §BNon-Criminal Outpost§!\n\nWhile the Old Republic placed various strictures on certain fields of research, those prohibitions have been swept away with the rise of the Empire."
 building_amusement_megaplex_desc: "£building£ §BNon-Criminal Outpost§!\n\nShowing the latest holovids to massive crowds, megaplexes are a lucrative business for those corporations able to secure a broadcasting license."
 building_commercial_forum_desc: "£building£ §BNon-Criminal Outpost§!\n\nBy facilitating trade agreements and advocating for business-friendly policies, the Commercial Forum increases a planet's attractiveness to investors."
 building_wildcat_miners_desc: "£building£ §BCriminal Outpost§!\n\nBy evading taxation and ignoring environmental standards, even the least productive mines can be made profitable."
 building_bio_reprocessing_facilities: "Bio Reprocessing Facilities"
 building_bio_reprocessing_facilities_desc: "£building£ §BCriminal Outpost§!\n\nProteins, lipids, and other complex biological materials are valuable commodities. So valuable that some turn to unpleasant means to acquire them."
 building_underground_chemists: "Underground Chemists"
 building_underground_chemists_desc: "£building£ §BCriminal Outpost§!\n\nWhile many Old Republic laws were repealed, the prohibition of most narcotics persists. Though risky, narcotics production can be lucrative."
 building_wrecking_yards_desc: "£building£ §BCriminal Outpost§!\n\nLike vultures picking over carrion, wrecking yard crews scavenge the ruined hulks of derelict ships for scrap metal, components, or other detritus."
 building_pirate_haven_desc: "£building£ §BCriminal Outpost§!\n\nWith enough firepower and well-placed donations, even the most sanctimonious officials can be convinced to turn a blind eye to pirate operations."
 building_underground_clubs_desc: "£building£ §BCriminal Outpost§!\n\nOpen to a select clientele, these clubs are dens of vice that cater to a variety of prohibited (or heavily taxed) desires."
 building_syndicate_outreach_office: "Syndicate Outreach Office"
 building_syndicate_outreach_office_desc: "£building£ §BCriminal Outpost§!\n\nBy improving the syndicate's public image, an outreach office can turn locals into lookouts and government officials into accomplices."
 building_illicit_research_labs_desc: "£building£ §BCriminal Outpost§!\n\nBy circumventing the limitations imposed by 'ethics' and 'laws', underground laboratories can push the boundaries of scientific discovery."
 building_smuggling_rings_desc: "£building£ §BCriminal Outpost§!\n\nEngaged in both the transportation of illicit goods and the circumvention of tariffs on licit goods, smugglers grease the gears of galactic commerce."
 building_temple_of_prosperity_desc: "£building£ §BGospel Outpost§!\n\nExalting material success, this temple glorifies the achievements of commerce, productivity, and wealth."
 building_executive_retreat_desc: "£building£ §BGeneric Outpost§!\n\nOffering discretion and comfort, retreats allow executives to relax while simultaneously developing useful corporate contacts."
 building_xeno_tourism_agency_desc: "£building£ §BGeneric Outpost§!\n\nHanding everything from passenger ship bookings to safari reservations, tourism agencies simplify travel for the galaxy's sightseers."
 building_primitive_power_plant_desc: "A primitive and somewhat unreliable power plant that relies on the burning of hydrocarbons."
 building_waste_reprocessing_center_desc: "Believed to be of Gree-origin, the facility converts waste products into energy and minerals through means perplexing to modern researchers."

