 ## UI Changes (3.14.15) - 4 November 2024 ##
 ## Subject to change in the future        ##
 ############################################
 FE_HABITABLE_WORLDS_TOOLTIP: "§HHabitability System§!\nThis system was designed to achieve a higher performance and provide a opportunity to deactivate planets of lesser galactic significance without outright removing them. \n§HTier 1 Planets§! are the most important ones and will always be active (e.g. Coruscant).\n§HTier 2 Planets§! are less prominent but still important worlds.\n§HTier 3 Planets§! have more minor roles in the Galactic Civil War Era.\n§HTier 4 Planets§! are mostly unremarkable worlds.\n\nThe Slider works as follows: (Planet number based on large map)\n§H1x and below = Tier 1 Planets Only§! (About 225 worlds)\n§H2x = Tier 1 & 2 Planets§! (About 425 worlds)\n§H3x = Tier 1, 2 & 3 Planets§! (About 600 Worlds)\n§H4x and above = All Planets§! (About 825 worlds)\n§HValues between full tiers§! will randomly §Hadd 25%, 50%, or 75%§! of planets from the next tier.\n\n§CRecommended Setting: Between 1x-2x§!"

 FE_RANDOMIZE_ADVANCED_EMPIRES_TOOLTIP:1 "If enabled, a random number of AI Empires will have advanced starts, within the range specified by the slider.\n\n§RUnused in SWND!"
 FE_RANDOMIZE_FALLEN_EMPIRES_TOOLTIP:1 "If enabled, a random number of Fallen Empires will be generated, within the range specified by the slider.\n\n§RUnused in SWND!"
 FE_RANDOMIZE_MARAUDER_EMPIRES_TOOLTIP:1 "If enabled, a random number of Marauder Empires will be generated, within the range specified by the slider.\n\n§RUnused in SWND!"

 FE_CLUSTERED_STARTS_TOOLTIP:1 "§HEmpire Placement§!\nThis controls whether empires should spawn in clusters or randomly placed across the galaxy.\n\n§RUnused in SWND!"

 FE_ADVANCED_NEAR_PLAYER_TOOLTIP:2 "§HAdvanced Neighbors§!\nThis controls whether empires with ['concept_advanced_empires', Advanced AI Starts] are permitted to spawn near a player. Having this §YOff§! may result in fewer than the specified number of advanced starts being generated.\n\n§RUnused in SWND!"

 FE_GUARANTEED_COLONIES_TOOLTIP:1 "§H$FE_GUARANTEED_COLONIES$§!\nThis controls how many habitable planets of the same planet class as your homeworld are guaranteed to spawn close to your starting system.\n\n§RWarning:§! Turning this off may mean you will find no habitable worlds near your homeworld at all.\n\n§RUnused in SWND!"

 FE_TECH_SPEED_DIFFICULTY_SCALE_TOOLTIP: "§H$FE_TECH_SPEED_DIFFICULTY_SCALE$§!\nThis controls how much the selected Difficulty affects the research cost of ['concept_technologies']. This has a greater effect on more advanced technologies.\n\nIncreasing this makes the game harder, especially at higher Difficulties.\n\n§CRecommended Setting: Off§!"

 FE_PRIMITIVE_WORLDS_TOOLTIP:2 "§H$FE_PRIMITIVE_WORLDS$§!\nThis controls the prevalence of ['concept_preftl_civilizations'] and ['concept_presapient_species'] in the galaxy.\n\nThe higher it is, the more likely these will be created on galaxy generation.\n\n§RUnused in SWND!"

 #CARAVANEERS_LABEL_TOOLTIP:1 "This controls whether the Caravaneers are enabled.\n\nCaravaneers are space-based traders whose fleets traverse the galaxy to promote great deals!$requires_megacorp$\n\n§RUnused in SWND!"

 #XENO_COMPATIBILITY_LABEL_TOOLTIP: "Unused in New Dawn."

 NUM_GATEWAYS_TOOLTIP:3 "§HAbandoned Gateways§!\nMultiplies the standard number of abandoned ['concept_gateways'] that will be generated in the galaxy.\n\n§RUnused in SWND!"

 NUM_WORMHOLES_TOOLTIP:2 "§HWormhole Pairs§!\nMultiplies the standard number of ['concept_wormhole_pairs'] that will be generated in the galaxy.\n\n§RUnused in SWND!"

 NUM_HYPERLANES_TOOLTIP:1 "§HHyperlane Density§!\nMultiplies the standard number of ['concept_hyperlanes'] that will be generated in the galaxy.\n\n§RUnused in SWND!" 

 CRISIS_TYPE_LABEL_TOOLTIP:2 "§HCrisis Type§!\nDetermines which ['concept_endgame_crisis'] can occur, so long as they are not turned off in the §ICrisis Strength§! setting.\n\nOn the §IAll§! setting, they will fire sequentially in random order, with no more than one happening at a given time.\n\n§RUnused in SWND!"

 #  XENO_COMPATIBILITY_LABEL_TOOLTIP:1 "Controls whether the ['concept_xeno_compatibility'] Ascension Perk is an available option.$requires_megacorp$\n\n§RUnused in SWND!"

 FE_EMPIRES_TOOLTIP:1 "§HNumber of AI Empires§!\nThis controls how many AI Empires will populate the galaxy.\n\n§RUnused in SWND!"

 FE_ADVANCED_EMPIRES_TOOLTIP:2 "§HNumber of Advanced AI Starts§!\nThis controls how many of the regular AI Empires will start with an initial advantage in resources, technology and population. They do not gain any additional bonuses besides a stronger starting position. This setting does not affect ['concept_fallen_empires'].\n\n§RUnused in SWND!"

 FE_GALAXY_SHAPE_TOOLTIP:1 "§HGalaxy Shape§!\nThis controls the shape of the galaxy map.\n\nSome shapes are only available on certain §YGalaxy Sizes§!.\n\n§RUnused in SWND!"

 FE_GALAXY_SIZE_TOOLTIP:1 "§HGalaxy Size§!\nThis controls the number of star systems that appear in the galaxy as well as the map type for your game (§BCanon§! or §GSandbox§!).\n\n§RWarning:§! If increased, this setting has significant late game performance implications."

 FE_FALLEN_EMPIRES_TOOLTIP:1 "§HNumber of Fallen Empires§!\nThis controls the maximum number of ['concept_fallen_empires'] that are allowed to spawn in the galaxy.\n\n§RUnused in SWND!"

 FE_MARAUDER_EMPIRES_TOOLTIP:1 "§HNumber of Marauder Empires§!\nThis controls the maximum number of ['concept_marauder_empires', Marauder Empires] that are allowed to spawn in the galaxy.\n\n§RUnused in SWND!"

 LGATE_LABEL: "$SWND_TRADE_RELAYS$"
 LGATE_LABEL_TOOLTIP: "$SWND_TRADE_RELAYS_TOOLTIP$"
 #XENO_COMPATIBILITY_LABEL_MULTIPLAYER: "$SWND_TRADE_RELAYS_TOOLTIP$"
 
