 war_goal_wg_renegade_containment_desc: "War is waged to preemptively and completely end a threat to the $GALACTIC_COMMUNITY$."
 wg_force_ideology_accept_3: "§Y[From.GetName]§! is forced to leave their $SWP_ALLIANCE$"
