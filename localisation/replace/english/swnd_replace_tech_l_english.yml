l_english:

 #Physics
 tech_basic_science_lab_1: "Research Labs"
 tech_basic_science_lab_2: "Research Facilities"
 tech_basic_science_lab_3: "Research Centers"
 tech_power_plant_4_desc: "Simultaneously drained and charged, quantum superposition of energy coils will increase yield and efficiency."
 tech_hyper_drive_2: "Improved Hyperlane Plotting"
 tech_hyper_drive_2_desc: "We have identified points in space where a ship expends less energy to 'breach' their way into a hyperlane. Understanding this breakthrough will lead to a new generation of hyperdrives."
 tech_hyper_drive_3: "Hyperdrive Manipulation"
 tech_hyper_drive_3_desc: "By accessing the subspace slipstreams that are present within hyperspace, we can dramatically improved performance, and develop a new generation of hyperdrive."
 tech_automated_exploration: "Automated Exploration"
 tech_automated_exploration_desc: "By granting scouts a miniscule share of any discovered world's output, we can incentivize exploration without having to arduously assign and organize missions ourselves."
 tech_shields_1: "Shields I"
 tech_shields_1_desc: "Deflector shields typically consists of alternating layers of ray shields, which excel at absorbing energy-based impacts, and particle shields, which ward against physical projectiles such as missiles. With war looming, our scientists have developed several means of improving these vital components."
 tech_shields_2: "Shields II"
 tech_shields_2_desc: "An upgraded shield generator that produces a stronger energy field. Only sustained enemy fire can penetrate this barrier."
 tech_shields_3: "Shields III"
 tech_shields_4: "Shields IV"
 tech_shields_4_desc: "These new shield generators represent the next generation of energy screens, improving upon older deflector technology. They offer significantly better protection."
 tech_shields_5: "Shields V"
 tech_shields_5_desc: "These reinforced and hardened shields are incredibly powerful, capable of protecting starships from even the most powerful weapons for extended periods during combat."
 tech_shield_rechargers_1: "Shield Generators I"
 tech_shield_rechargers_1_desc: "A new series of shield generators for starfighters, gunships, and capital ships are under consideration by our military planners. These new generators incorporate many of the hard-learned lessons of the Clone Wars, such as redundant motivator matrices, more durable secondary power cores, and larger heat dissipaters."
 tech_sensors_2: "Cronau Radiation Detection"
 tech_sensors_2_desc: "By outfitting our ships and installations with cronau radiation sensors, we can detect hyperspace ruptures light-years away from our positions."
 tech_sensors_3: "Hyperdrive Prediction Models"
 tech_sensors_3_desc: "By analyzing data from past light-speed jumps, we can predict the likely destination of ships entering hyperspace."
 tech_sensors_4: "Hyperspace Trajectory Maps"
 tech_sensors_4_desc: "By analyzing a departing ship's trajectory and measuring cronau radiation displacement, we can accurately predict the destination of ships entering hyperspace."
 tech_fission_power: "Fusion Power"
 tech_fission_power_desc: "Nuclear fusion can provide great amounts of power for ships, without the risks or inefficiencies associated with nuclear fission."
 tech_fusion_power: "Cold Fusion Power"
 tech_fusion_power_desc: "Long thought to be a marginal technology of use to only primitive space-faring civilizations, recent advances in the design of cold fusion reactors have reignited interest in this bygone technology, and experts predict that these easily scalable and highly responsive reactors could be well-suited to powering warships."
 tech_cold_fusion_power: "Hypermatter Injection"
 tech_cold_fusion_power_desc: "Long limited to only the essential couriers and experimental scout ships, hypermatter injection technology is the next obvious step in starship power generation."
 tech_antimatter_power: "Hypermatter Annihilators"
 tech_antimatter_power_desc: "When matter and antimatter collide, huge amounts of energy are released as they annihilate one another. By exploiting this process, our efficiency at generating ship power will be orders of magnitude greater."
 tech_zero_point_power: "Tachyonic Mastery"
 tech_zero_point_power_desc: "By extracting tachyon energy, we can construct reactors that are capable of providing an almost limitless supply of ship power."
 tech_reactor_boosters_1: "Modulated Power Cores"
 tech_reactor_boosters_1_desc: "More advanced modulation within our power cores will allow engine technicians to fine-tune their control over reactor output, allowing for the redirection of excess energy to other ship systems."
 tech_reactor_boosters_2: "High Capacity Power Cores"
 tech_reactor_boosters_2_desc: "If we integrate super capacitors into our starship reactors, we can provide a flexible and responsive reserve of power to ship systems."
 tech_reactor_boosters_3: "Hyper Shielded Power Cores"
 tech_reactor_boosters_3_desc: "The perfection of hypermatter-based power generation allows for highly advanced power cores that can greatly enhance a ship's reactors."
 tech_cryostasis_1: "Droid Controlled Colony Ships"
 tech_cryostasis_1_desc: "By giving control of the colony ship to specialized droids, both crew and colonists can be left to attend to more important matters."
 tech_cryostasis_2: "Droid Assisted Development"
 tech_cryostasis_2_desc: "Droids are capable of automating much of the drudgery associated with colonization, such as landing zone preparation, scouting, water purification, and infrastructure excavation."
#  tech_physics_1: "Physics Theorems I"
#  tech_physics_1_desc: "Exploring the interaction of fundamental forces through subatomic particles."
#  tech_physics_2: "Physics Theorems II"
#  tech_physics_2_desc: "The seemingly erratic behavior of tiny things can dramatically alter the way we think about bigger things."
#  tech_physics_3: "Physics Theorems III"
#  tech_physics_3_desc: "The study of concepts such as quantum superposition, superfluidity, and sub-hyperspace tears will advance our understanding of physics beyond our wildest dreams."
 tech_combat_computers_1: "Combat Computers"
 tech_combat_computers_1_desc: "The proliferation of cast-off surplus combat droid programs in the wake of the Clone Wars can be turned to our advantage. By slaving these computers to our gunnery systems and energy distributors, we can greatly improve engagement efficiency."
 tech_combat_computers_2: "Combat Algorithms"
 tech_combat_computers_2_desc: "Further advances in predictive algorithms allow our captains to make better decisions in combat situations."
 tech_combat_computers_3: "Combat Simulations"
 tech_combat_computers_3_desc: "By running possible firing patterns through hundreds of variations of different scenarios, our targeting arrays can optimize their firing solutions."
 tech_administrative_ai: "Droid Research Assistants"
 tech_administrative_ai_desc: "Though they may lack the creativity of organic researchers, droids are well suited for research tasks that require patience, vigilance, exacting attention to detail, or mechanical precision."
 tech_sapient_ai: "Droid AI Improvement"
 tech_sapient_ai_desc: "Advances in neural networking and synthetic metacognition will result in even more intelligent droids."
 tech_positronic_implants: "Holographic Administration"
 tech_positronic_implants_desc: "Expanding our research management abilities by creating a network of real-time holofeeds enabling us to keep a closer eye on our scientists."
 tech_self_aware_logic: "Evolving Droid Logic"
 tech_self_aware_logic_desc: "Sufficiently advanced droids are better able to optimize themselves if they are made aware of their purpose."
 tech_planetary_shield_generator: "Planetary Shield Generators"
 tech_planetary_shield_generator_desc: "Leaked plans of massive planetside shield generators the CIS intended to construct during the Outer Rim Sieges have inspired our scientists. They now believe that they can improve upon these early designs by spacing out a generator's projectors in a helical pattern, which should make their shields even more durable."
 tech_power_hub_1_desc: "Improving our battery storage facilities will allow us to store surplus power when it is plentiful, and release it when it is not. This smoothing of a planet's power supply should make energy costs more predictable, thereby improving the efficiency of the wider economy."
 tech_global_research_initiative: "Planetary Research Initiatives"
 tech_global_research_initiative_desc: "Government-sponsored research initiatives will better allow explorers, researchers, and academics from the far-flung corners of our civilization to collaborate, share knowledge, and contribute to the advancement of the sciences."
 tech_curator_lab: "Scientific Field Study"
 tech_curator_lab_desc: "By miniaturizing sensors, spectrometers, and other scientific equipment, we can pack our explorers' ships with even more advanced surveying technologies, enabling us to survey uncharted systems with greater speed."
 tech_archeology_lab: "Scientific Field Investigation"
 tech_archeology_lab_desc: "By collaborating with disgruntled archaeologists recently fired from the Czerka Corporation, we can gain access to state-of-the-art sensors, historical databases, and holographic reconstruction tools. These will enable us to excavate ancient ruins faster and with great precision."
 tech_auxiliary_fire_control: "Fire Control Systems I"
 tech_auxiliary_fire_control_desc: "Integrated into the command and control systems of most warships, the fire control system compensates for the movement of enemy targets, allowing the warships weaponry to be brought to bear more accurately."
 tech_repeatable_improved_tile_energy_output_desc: "Credits rule everything around me."
 tech_repeatable_improved_shield_output: "Shield Bolstering"

 #Society
 tech_industrial_farming_desc: "Though small, family-owned farms may be idyllic, they are hardly efficient. By combining unproductive parcels together and applying modern agricultural techniques, we can greatly improve yields."
 tech_colonization_1_desc: "Much like the Old Republic's Astrogation Survey Teams before them, our explorers and pathfinders will be organized into a dedicated institution. By professionalizing and standardizing the process of discovering, scouting, and settling new worlds, we can avoid unnecessary waste, and improve the habitability of our early colonies."
 tech_colonization_2_desc: "By adjusting atmospheric filtering on a per-site basis we can filter out undesirable elements, improving colonial living conditions."
 tech_colonization_5_desc: "Advanced study of different planetary ecosystems will allow us to more easily colonize worlds previously thought too hostile for settlement."
 tech_planetary_government_desc: "Establishing a government that is capable of competently executing its various legislative, judicial, administrative, and legal responsibilities is not easy. Fortunately, our statesbeings believe that they have developed an optimized model of planetary governance that should be easily scalable and applicable to most colonies."
 tech_colonial_centralization_desc: "Robust frameworks for local governments, reasonably flexible and accommodative of local circumstances, but adhering to our civilization's most important norms and laws."
 tech_galactic_administration_desc: "In the power vacuum left by the collapse of the Old Republic, the administrative needs of a star empire have only grown more numerous and ever more complex. We must rise to the occasion."
 tech_cultural_heritage_desc: "Ours is a momentous history. By putting it on display (and with a little selective curating) we can educate our people on their past glory and future destiny."
 tech_heritage_site: "Museum Facilities"
 tech_heritage_site_desc: "No longer content with a passive presentation of history, our curators and conservators have settled on a grand historical narrative of our civilization, and plan to use a blending of historical fact and state-of-the-art presentation to communicate that narrative to the masses."
 tech_hypercomms_forum: "Cultural Forums"
 tech_hypercomms_forum_desc: "Our collaboration with the galaxy's foremost political scientists, advertising gurus, and veteran diplomats has borne fruit. We believe that we have hit upon a new grand theory of what it means to be us, one that casts our people (and its gallant leaders) as the hero in a grand galactic journey."
 tech_autocurating_vault: "Holo Museums"
 tech_autocurating_vault_desc: "Replicating our civilization's countless treasures in high fidelity holo and distributing them throughout our territory will give our people a better understanding of our rich culture and the sacrifices that will be required to defend it."
 tech_holographic_rituals_desc: "Religion has always progressed in step with technology. Advances in holographic rendering will allow our message to reach more converts than ever before, just as advances in the printing press, the radio, and the HoloNet bolstered our faith before."
 tech_consecration_fields_desc: "While many expected the march of technology to dull our fervor, it has done the opposite, and has supplied us with new means to shape the material in the service of the spiritual."
 tech_transcendent_faith_desc: "Our technological strength and spiritual prowess has grown in tandem. While other hokey religions may be no more than an ancient collection of superstitions, our followers are as sophisticated as they are zealous, and understand that greater knowledge reveals only how little can ever be truly known."
 tech_hive_node_desc: "Robust frameworks for the co-ordination of a hive's local activities, created on a per-case basis, to meet each colony's needs."
 tech_hive_cluster_desc: "By clustering our synaptic nodes together and linking them through a shared nervous system, the whole is made greater than the sum of its parts."
 tech_holo_entertainment: "Entertainers"
 tech_holo_entertainment_desc: "Dancers, musicians, singers, professional athletes, storytellers, and comedians. All support the morale and well-being of our citizens and soldiers."
 tech_hyper_entertainment_forum: "Entertainment Forums"
 tech_hyper_entertainment_forum_desc: "All the galaxy might be a stage, but someone still needs to build actual stages."
 tech_space_trading: "Space Trading"
 tech_space_trading_desc: "The lifeblood of the galactic economy and the foundation of every empire, interstellar trade predates even the Old Republic."
 tech_interstellar_economics_desc: "Just as the interaction of supply and demand determines the price of a cup of Jawa Juice at a local caf stand, so too do they determine the price of a kiloton of hyperfuel on interstellar commodity exchanges. But interstellar economics also poses new problems, such as the impact of FTL travel on interest rates."
 tech_galactic_markets_desc: "Stocks, bonds, derivatives, properties, and commodities. The buying and selling of these securities may be of little interest to most admirals, but our ability to finance new fleets, borrow money, and hire soldiers depends in large part on our ability to understand and participate in the galactic market."
 tech_eco_simulation_desc: "Farming techniques can be further refined through sophisticated computer simulations that model different environments and weather patterns. This allows for more predictable crop yields."
 tech_gene_crops_desc: "The process of synthetically replicating crops is not easy: complex proteins must be spun by micro assemblers, lipids fabricated molecule by molecule, and a thousand other challenges."
 tech_nano_vitality_crops_desc: "Treating our crops with a dusting of agri-nanites specifically programmed to identify and cull any signs of blight will greatly enhance the productivity of our fields."
 tech_nutrient_replication_desc: "At its core, food is simply packaging for nutrients, which are themselves nothing more than complex arrangements of molecules. Whether these molecules are hand-picked from a bowvine fruit bush in an idyllic orchard or synthesized from the rotting pulp of castoff waste in a factory makes little difference."
 tech_hydroponics_desc: "Growing crops in carefully controlled, nutrient-rich solutions will allow us to maximize yields in areas without optimal growing conditions."
#  tech_society_1: "Societal Analysis I"
#  tech_society_1_desc: "Studying the different forms of life that appear in our territory helps us better understand ourselves and the life that surrounds us."
#  tech_society_2: "Societal Analysis II"
#  tech_society_2_desc: "By devoting more effort to studying species and cultures that arise on other worlds, we can understand fundamental aspects of biology that were previously beyond our reach."
#  tech_society_3: "Societal Analysis III"
#  tech_society_3_desc: "Having the opportunity to study multitudes of alien life lets us find some common traits for all living beings. The foundational building blocks of life are there to see if we can but decipher them."
 tech_frontier_health: "Clinic Centers"
 tech_frontier_health_desc: "While each planet and biome has its own particular quirks and idiosyncrasies, the distribution of a standardized package of stimulants, vaccinations, cures, and other pharmaceuticals to our planet's clinics should do much to help colonial doctors treat most ailments."
 tech_frontier_hospital: "Hospital Centers"
 tech_frontier_hospital_desc: "Hospitals are an industrial-scale answer to an industrial-scale problem: how to tend the wounds, pains, and sicknesses in as quick, effective, and humane way as possible. The answer? Bacta, labor, and care. But mostly bacta."
 tech_vitality_boosters_desc: "A cocktail of age suppressants, spice, and immuno-boosters will help our leaders ward off old age."
 tech_adaptive_bureaucracy_desc: "The progress we make calls for a new, nimbler form of administration that is capable of responding to local concerns and circumstances while still upholding our laws, norms, and customs."
 tech_galactic_bureaucracy_desc: "Improved algorithms for processing and organizing vast amounts of HoloNet traffic and interplanetary data feeds has streamlined decision-making and information-sharing throughout our territory."
 tech_penal_colonies: "Prison Worlds"
 tech_resort_colonies_desc: "With careful study devoted to landscaping, climate control, aesthetic optimization, and vacationer psychology, the reshaping of entire worlds dedicated to leisure can be made possible."
 tech_alien_life_studies_desc: "Having the opportunity to study the multitudes of alien life lets us find some common traits for all living beings. The foundational building blocks of life."
 tech_doctrine_navy_size_1_desc: "As our fleets and armies leave our home systems for far-off battlefields, it is important to provide incentives and amenities to keep our sailors and soldiers spirits up: re-enlistment prizes, signing bonuses, and generous benefits for next-of-kin."
 tech_doctrine_navy_size_2_desc: "A fleet does not run on zeal alone. To ensure steady access to critical supplies, we should organize our logistical corps into dedicated support squadrons."
 tech_doctrine_navy_size_3_desc: "It takes a vast amount of material to keep a flotilla supplied. Somehow food, ammunition, hyperfuel, spare parts, and a thousand other items must travel from far flung depots to the front lines. Getting them there, and getting them there safely and on time, requires a sophisticated logistics system."
 tech_doctrine_navy_size_4_desc: "Fleet liaisons represent the fleet's interests before other key institutions such as local governments, dockyards, other military branches, recruiters, and suppliers. Formalizing their role and empowering them to make decisions on behalf of the fleet will allow our navy to do more with less."
 tech_interstellar_fleet_traditions: "Fleet Traditions"
 tech_interstellar_fleet_traditions_desc: "The galaxy has seen countless fleets once seemingly invincible ply its hyperlanes. Emperor Valkorion's Eternal Fleet, the crusading Cathedral Squadrons of Contispex XIX, the Katana fleet, Xim the Despot's Armada, and the rumored Black Fleet of the Galactic Empire. Ours will surpass them all."
 tech_refit_standards_desc: "The galactic arms race shows no signs of abating. We must standardize the process of retrofitting our ships to ensure that we can quickly adapt to the modern battlefield."
 tech_centralized_command_desc: "Creating a single institution charged with coordinating ground operations will simplify the chain of command and enable us to better take and hold enemy territory."
 tech_combat_training_desc: "A more extensive training program for new recruits, including realistic combat scenarios, will help to ensure that our infantry perform just like the simulations."
 tech_ground_defense_planning_desc: "There are many foes who would gladly seize our worlds for themselves. Should our fleets fail to deter them, we should prepare to meet them on the ground."
 tech_galactic_ambitions: "Galactic Ambitions"
 tech_galactic_ambitions_desc: "Our security and prosperity lie in the stars and planets beyond our borders. We will not be idle."
 tech_manifest_destiny_desc: "We must have the courage to take our destiny into our own appendages and seize what is rightfully ours."
 tech_living_state_desc: "The galaxy is in crisis: pirates abound, insurrection spreads, and markets collapse. In these trying times, the State can offer a beacon of stability and unity."
 tech_collective_self_desc: "The galaxy has had no shortage of leaders: selfless Jedi, infamous pirates, beneficent Chancellors, cunning traders, and silver-tongued diplomats. What separates a great leader from a merely good leader is their ability to recognize and unlock greatness, not in themselves, but in others."
 tech_autonomous_agents_desc: "Granting our diplomats and envoys greater freedom and resources will enhance our galactic influence among both foes and allies."
 tech_embodied_dynamism_desc: "Initiative, courage, and ambition must be qualities to emulate among our people. Through a subtle public relations campaign extolling these virtues, we can seed our youth with the ideals that will carry us to greatness."
 tech_artificial_moral_codes_desc: "It is circumstance that dictates what is moral. Was the creation of a Clone Army whose soldiers had no choice moral? Would it have been better to send mothers and fathers, sons and daughters to fight rather than clones? Define the circumstances, and ethics are like clay in your hands."
 tech_synthetic_thought_patterns_desc: "Free of the irrational whims of the flesh, droids are governed by the immutable impulses of logic and reason."
 tech_resource_processing_algorithms_desc: "While organics have a natural tendency to find the easiest way of completing a task, such ingenuity must be programmed into droids and other automatons."
 tech_paradise_dome: "Improved Habitation Centers"
 tech_paradise_dome_desc: "A thousand minor improvements in consumer durables such as more efficient thermal regulation units, self-cleaning refreshers, and live-in service droids will greatly improve the quality of our housing stock."
 tech_slave_colonies_desc: "If there's a bright center to the universe, this is the planet that it's farthest from. Through the careful use of advanced social engineering techniques and the liberal application of brutality, we can create a surprisingly productive planet powered by slave labor."
 tech_housing_agrarian_idyll_desc: "With rural living comes a different set of values: hospitality, fellowship, mutual-aid, and traditionalism. While these traits can strike some outsiders as old-fashioned, you'll be hard pressed to find a friendlier lot."
 tech_xeno_tourism_agency_desc: "This corporate subsidiary promotes a wide variety of interstellar tourist attractions, as well as offering visa assistance and employment packages to potential emigrants interested in relocating to corporate space."
 tech_executive_retreat: "Executive Retreat"
 tech_executive_retreat_desc: "While navigating the various codes and regulations governing cross-border business travel will be a headache, the ability to secure tourist visas for our corporate officers will boost company morale and enhance our economic influence."
 tech_terrestrial_sculpting_desc: "There is no simple solution to the problem of reshaping planets - only bigger shovels and fusion powered drills."
 tech_ecological_adaptation_desc: "By adapting planetary ecosystems to large-scale environmental changes we can minimize the disruptive impact of terraforming on local populations."
 tech_climate_restoration_desc: "Our studies in geoengineering have yielded several promising approaches that should allow us to alter a planets climate, including cloud seeding, aerosol distribution, ocean fertilization, and carbon sequestration."
 tech_epigenetic_triggers_desc: "Allows genetically Uplifting and socially integrating species which are close to being sapient."
 tech_cloning_desc: "By creating clones from the genetic template of a living organism, we can grow them en masse and also alter their genetic characteristics."
 tech_dense_jungle_desc: "Patterned on the herbicide Operative Crimson used by the Clone Army to flush separatists out of forested cover during the Outer Rim Sieges, selective defoliants can be tailored to kill specific flora, and are commonly used by colonists to eradicate dangerous or otherwise problematic plant life."
 tech_noxious_swamp_desc: "Sapient races have been reclaiming swampland for thousands of years. A coordinated system of modular aqueducts, pump stations, chemical remediation crawlers and automated soil compactors can reclaim land at unprecedented speeds, allowing it to be redeveloped for more productive purposes."
 tech_quicksand_basin_desc: "The development and deployment of a new generation of decon droids will allow us to slowly purify those worlds that have been rendered uninhabitable by radiation, toxins, or plagues."
 tech_toxic_kelp_desc: "Given enough processing power, networked sensors and distributed stations, even the ocean currents can be precisely modelled, managed and controlled."
 tech_deep_sinkhole_desc: "As cities grow denser and property prices ever higher, it looks incredibly foolish to not consider exploiting the unused land beneath us."
 tech_dangerous_wildlife_desc: "By inviting hunters from Trandosha, Gand, Rodia, and Kashyyyk to our colonies and granting them licenses for 'wildlife management', we can quickly eradicate or at least control even the most problematic predators."
 tech_mountain_range_desc: "Controlled demolitions using baradium charges will allow us to tunnel through and even level the tallest mountains, allowing the expansion of cities and transportation infrastructure."
 tech_volcano_desc: "Advances in material technology and deep-shaft mining techniques allow geo-engineering at previously unthinkable depths and temperatures. Magma hotspots can now be exploited, suppressed, or even removed."
 tech_neural_implants: "Slave Processing"
 tech_neural_implants_desc: "Inserted beneath the skin or chitin of a slave and typically near a vital organ, sub-dermal explosives provide a gruesome, but effective, means of deterring slave revolts and ensuring obedience."
 tech_capacity_boosters_desc: "We leave nothing to chance, no matter the cost. By consulting with rogue geneticists from Kamino and Arkania, we have isolated those genetic traits that we believe will create the best possible leaders."
 tech_gene_tailoring_desc: "Making gene-editing tools widely available should drive down costs and make it easier to selectively induce desired genetic characteristics on a wider scale."
 tech_gene_expressions_desc: "When tailored to a species genome, this form of gene therapy has intensive neurogenerative properties, significantly increasing the development of neurons, axons and synapses in its recipients, allowing our scientists to unlock the true potential of the species."
 tech_glandular_acclimation_desc: "Subjecting embryonic nervous and hormonal systems to various stressors and stimulants should give us further control over our people's genetic destiny."
 tech_genetic_resequencing: "Genetic Resequencing" #not used, keeping as a precaution
 tech_genetic_resequencing_desc: "Improvements in technologies for selecting segments of large genomes for resequencing will reveal biologically important variations in genetic material."
 tech_repeatable_improved_army_damage_desc: "A more extensive training program for new recruits overseen by retired Mandalorian Supercommandos will instill our ground forces with greater prowess and reliability."
 tech_repeatable_improved_core_system_cap_desc: "Restructuring the managerial web linking our core worlds to the frontier can help alleviate the very administrative stressors and information chokepoints that helped doom the Old Republic."
 tech_repeatable_improved_tile_food_output_desc: "Transgenic crops combine the nutritional elements of several standard crop staples such as dry gene wheat, dust corn, and quinto grain in one convenient package."
 tech_repeatable_command_limit_desc: "From cooks to military police, holonet clerks to sanitation specialists, there are many officers in the navy besides starfighter pilots and gallant captains."

 #Engineering
 tech_planetary_defenses_desc: "By organizing militia units, excavating blast-resistant bunkers, and stockpiling supplies, we can better prepare our planetary defense forces to defend against outside incursions."
 tech_space_exploration_desc: "Whether by foot or sail, sleeper ship or hyperdrive, nearly all civilizations have yearned to explore the unknown."
 tech_corvettes: "Republic Era Corvette"
 tech_corvettes_desc: "The corvette is the most basic military ship, armed and ready in the event of hostilities. During the twilight years of the Old Republic, most Corvette's were intended to protect trade routes and deter pirates, rather than engage enemy fleets in pitched battles."
 tech_starbase_1_desc: "Constructing centralized space installations from either components launched from a planet's surface or mined from extraorbital sources will allow us to stake our claim to a star system."
 tech_starbase_2_desc: "The earliest starbases were little more than makeshift outposts. Permanent starports with docking facilities and Holonet transmitters will enable us to maintain a firmer grip on star systems."
 tech_starbase_3_desc: "As space traffic increases, larger and more defensible starbases are needed to maintain control over system hyperlanes."
 tech_starbase_4_desc: "These mighty installations will provide a focal point for all military and commercial activity in a star system, allowing us to solidify our control over the region's hyperlanes."
 tech_starbase_5_desc: "Plans for an immense stationary space station capable of holding its own against several strike fleets are now being drawn up. If realized, these citadels will become monuments to greatness as much as system hubs."
 tech_assault_armies_desc: "The invasion of another world is a staggeringly complex enterprise. Soldiers must be fed, ships fueled, and armaments prepared, along with thousands of other tasks, each critical to the invasion's success. These immense logistical challenges must be overcome before we can marshal our first interplanetary armies."
 tech_space_defense_station_1_desc: "This will enable the construction of defensive deep space platforms to protect our starbases. These platforms can support a variety of offensive and defensive capabilities, including turbolaser emplacements, ion cannon batteries, missile silos, and snubfighter hangars."
 tech_defense_platform_hull_1_desc: "A reinforced duranium framework and the addition of internal blastdoors with enhanced impact absorption capabilities will ensure the structural integrity of our defense platforms even when subjected to immense firepower."
 tech_basic_industry_desc: "Industrial might is the key to our power, and specialization is the key to industry."
 tech_mechanized_mining_desc: "The basic industrial infrastructure that is required to become a spacefaring civilization."
 tech_powered_exoskeletons_desc: "Provided that you have someway of speaking or writing in binary, automated droid-controlled mining equipment can be quickly reconfigured to optimize extraction operations in a wide variety of environments."
 tech_space_mining_1_desc: "While the startup costs are higher than planetary refining, deep space refining does have several advantages. Loads that would have weighed billions of tons on a planet are weightless and easily moved, products can be directly loaded onto starships, and certain refining operations are easier to perform."
 tech_space_mining_2_desc: "Breakthroughs in spectrometry and radiometry have allowed our scouts and prospectors to more easily identify promising, mineral-rich asteroids."
 tech_space_mining_3_desc: "These powerful short-range lasers can easily cut through even the toughest asteroids, allowing us to extract more from them in the same amount of time."
 tech_space_mining_4_desc: "Swarms of semi-autonomous drones slaved to a centralized control ship are deployed to quickly and efficiently gather valuable materials from nearby asteroids."
 tech_space_mining_5_desc: "Released ahead of a mining convoy, waves of microscopic droids descend upon promising asteroids, burrowing into their interiors, and tagging any valuable resources for later extraction."
 tech_mining_1_desc: "By injecting pressurized steam into volcanic magma columns, we can artificially induce carefully controlled ruptures, which will carry valuable minerals to the surface."
 tech_mining_2_desc: "These massive, Corusca gem tipped drills are needed to access the rich mineral deposits that can often be found close to a planet's core."
 tech_mining_3_desc: "Advanced spectrometry combined with microdetonators and new mining techniques will allow us to rapidly exploit once uneconomical mineral deposits."
 tech_space_construction_desc: "Construction in space presents our engineers with new design challenges that must be solved before we can build orbital stations above other stellar bodies."
 tech_afterburners_1: "Microthrusters"
 tech_afterburners_1_desc: "These small but powerful microthrusters provide additional combat speed but consume a great deal of power."
 tech_afterburners_2: "Advanced Microthrusters"
 tech_afterburners_2_desc: "This improved version of the standard microthruster provides an even greater boost to a ship's combat speed and evasive abilities."
# tech_engineering_1: "Engineering Applications I"
# tech_engineering_1_desc: "Advanced instrumentation allows for the study and practical application of physical systems at sub-molecular scales."
# tech_engineering_2: "Engineering Applications II"
# tech_engineering_2_desc: "The production and understanding of next-generation materials such as coaxium, supercrystalline lattices, and ceramic nanoparticles are of immeasurable value to any and every space-faring civilization."
# tech_engineering_3: "Engineering Applications III"
# tech_engineering_3_desc: "The study of exotic materials such as coaxium, Isotope 5, Stygium, and Kyber crystals promises to marry our understanding of quantum mechanics with the fundamental interaction of gravity and the Force."
 tech_construction_templates_desc: "Standardized prefabricated duracrete and plasteel structures massively reduce on-site facility construction times."
 tech_ship_armor_1: "Titanium Starship Armor"
 tech_ship_armor_1_desc: "Cheap but reasonably effective, titanium plating is the material of choice for most civilian spaceship hulls, where its chief responsibility is protecting a ship from debris, micro-impacts, and corrosion. With enough layers, titanium can also be used to armor warships, though it is rarely the first choice."
 tech_ship_armor_2: "Duranium Starship Armor"
 tech_ship_armor_2_desc: "Durable, lightweight, and capable of withstanding extreme temperatures, duranium armor offers a superior, albeit more expensive, alternative to the more common durasteel armor."
 tech_ship_armor_3: "Improved Duranium Starship Armor"
 tech_ship_armor_3_desc: "The latest generation of duranium starship armor plating is further reinforced by optimized structural integrity fields and improved bulkheads."
 tech_ship_armor_4: "Quadanium Starship Armor"
 tech_ship_armor_4_desc: "Extremely durable, quadanium steel is typically reserved for military purposes, where it is used from everything from snubfighters to orbital battlestations."
 tech_ship_armor_5: "Impervium Starship Armor"
 tech_ship_armor_5_desc: "This incredibly dense and strong material can resist firepower that would turn armor made of any other metal to slag."
 tech_thrusters_1: "Improved Ion Engines"
 tech_thrusters_1_desc: "These thrusters use beams of ions to generate thrust without the need for propellant."
 tech_thrusters_2: "Advanced Vectoring"
 tech_thrusters_2_desc: "A new generation of advanced ion vector technology provides our ships with the ability to easily vary the power flowing to each engine, improving fuel efficiency and allowing our ships to reach even higher sublight speeds."
 tech_thrusters_3: "Fusial Thrust Engines"
 tech_thrusters_3_desc: "A more advanced form of propulsion, fusial thrust engines afford ships greater sublight speeds and maneuverability."
 tech_thrusters_4: "Trim Thrusters"
 tech_thrusters_4_desc: "These highly advanced thrusters provide ships with unmatched maneuverability and speed under sublight conditions."
 tech_mineral_purification_1_desc: "Treating mined materials with acidic scouring agents such as cyanic cadmium and sulfur-baradium will allow us to extract more material from the same amount of raw ore."
 tech_alloys_1_desc: "By integrating miniaturized forcefield projectors into our mills and foundries, we can pour and press molten ores with ease, enhancing safety and productivity."
 tech_alloys_2: "Automated Industry"
 tech_alloys_2_desc: "Automated foundries can be run at all hours in even the most hellish of conditions."
 tech_luxuries_2_desc: "These kiosks can replicate any pre-approved object if its pattern has been stored within their memory cores."
 tech_housing_1_desc: "By positioning mirror stations around the planet, we can carefully adjust a planet's temperature and, by extension, its weather. With the weather brought under our control, it will be easier to erect even larger structures."
 tech_housing_2: "Repulsor Engineering"
 tech_housing_2_desc: "By slipping the bonds of gravity with repulsor technology, we can erect floating palaces, soaring skyscrapers, and previously unimaginable buildings."
 tech_space_defense_station_improvement_desc: "The creation of a dedicated naval engineering corps will greatly benefit the construction of deep space defense platforms, minefields, and orbital infrastructure, decreasing building costs, and increasing durability."
 tech_robotic_workers: "Droids"
 tech_robotic_workers_desc: "These droid work units are perfect for menial labor tasks. They are hard-working and capable of following simple vocal instructions, but should not be expected to climb stairs."
 tech_droid_workers: "Advanced Droids"
 tech_droid_workers_desc: "Upgraded droid workers, these units have an expanded movement range equal to that of most organics. Their neural processors have also been greatly improved."
 tech_synthetic_leaders: "Droid Leaders"
 tech_synthetic_leaders_desc: "Highly advanced droids that are stronger, faster and more durable than the vast majority of organics. With their upgraded neural processors they are fully capable of independent operations."
 tech_micro_replicators_desc: "Microscopic tools that can assist our replication units in creating the more complex circuity needed for new droids."
 tech_self_assembling_components_desc: "Modeled on the DNA structure of midi-chlorians, these microscopic machine intellects are capable of autonomously assembling most components needed for new droids."
 tech_repeatable_weapon_type_kinetic_damage: "Improved Rail Designs"
 tech_repeatable_weapon_type_kinetic_damage_desc: "By further tightening the electron dispersal patterns of the kinetic thrower's power loop, we can impart more energy into every shot, enabling our projectiles to go faster and hit harder."
 tech_repeatable_weapon_type_kinetic_fire_rate: "Improved Belt Feeds"
 tech_repeatable_weapon_type_kinetic_fire_rate_desc: "Though they may be less elegant weapon from a less elegant time, even the most conservative of generals will agree that when it comes to kinetic projectiles, quantity has a quality all its own."
 tech_repeatable_improved_tile_mineral_output_desc: "Changes in how mineral deposits are probed, evaluated, and extracted lead to more efficient boring patterns."
 tech_repeatable_improved_military_station_damage_desc: "Cross-linking weapon systems to fire in staggered volleys improves the actual damage output of our stationary defensive platforms."
 tech_repeatable_improved_military_station_health_desc: "A reinforced framework and blast shields with enhanced impact absorption will ensure the structural integrity of the platform even under immense pressure."
 tech_repeatable_improved_armor_output_desc: "Compressing suitable materials into ultra-dense forms is a cheap and efficient way to improve their ability to absorb weapons-grade impacts."
 tech_repeatable_weapon_type_explosive_damage_desc: "With the baradium warhead reaction tightly controlled by missile-board microprocessors, warhead detonations can be tuned for maximum effect for local conditions at the time of impact."
 tech_repeatable_weapon_type_explosive_fire_rate_desc: "By miniaturizing the bulky pre-igniters that provide the initial velocity of our missiles, we can fit more missiles into a single launcher, allowing for a faster effective rate of fire."
 tech_repeatable_reduced_building_time_desc: "Increasingly powerful computational cores allow us to adapt individual construction projects to planetary and ultra-local gravitational conditions."
 tech_amoeba_strike_craft_1: "Neebray Breeding Program"
 tech_amoeba_strike_craft_1_desc: "By breeding Neebrays in captivity, we can program their Hatchlings to act as organic strike craft for our navy."
 tech_space_whale_weapon_1_desc: "Adapting the Purrgil method of siphoning energy from gaseous matter, it is possible to construct weapons draining energy from enemy ships."
 tech_robomodding_desc: "Rewritable assembly templates allow for the creation of bespoke droid worker designs."
 tech_robomodding_points_1_desc: "Improved production practices allow for greater alterations to droid workers without compromising core functionality."
 tech_robomodding_points_2_desc: "Improved production practices allow for fundamental changes to droid workers without compromising core functionality."
 tech_ascension_theory: "A General Theory of Star Wars"
 tech_ascension_theory_desc: "The history of our galaxy is a repeating cycle of technological, political and cultural leaps, most precipitated by a star-spanning war. Though history rarely repeats, it often seems to rhyme. By identifying the core, recurring premises of these stellar conflicts, we may be able to effectively short-circuit the cycle for our own benefit"