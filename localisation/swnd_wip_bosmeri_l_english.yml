 # 20 October 2025 #
 swnd_partisans.10.name: "Missing Supplies"
 swnd_partisans.10.desc: "The governor of §Y[Root.planet.GetName]§! has reported several missing shipments over the last few months. Nearly all the shipments were medical supplies or equipment meant to go to the local garrison in the capital city that were hijacked while en route.\n\n Most of the crew on the transports were killed and others left behind, shaken by the violent attack.\n\n While its very likely that these attacks are the work of group of criminals, the evidence shows that they are no mere thugs."
 swnd_partisans.10.a: "Bolster local defenses."
 swnd_partisans.10.b: "We'll recoup our losses over the next few rotations."
 swnd_partisans.10.c: "Downplay attacks on the holonet. Just some thugs after all."
 swnd_partisans.20.name: "Local Concerns"
 swnd_partisans.20.desc: "More shipments have gone missing on §Y[Root.planet.GetName]§!and the attackers appear to have begun stealing Imperial vehicles. The local governor, despite their best efforts, have failed in preventing more of these raids against Imperial shipments.\n\nThe local population is starting to become unnerved by these attacks and the thought of an insurrectionist group operating in our midst is becoming a greater concern. This situation is leading to unrest in various cities, threatening our operations on the planet.\n\n As this group has become bolder, it's become clear that stronger presence is needed to curtail these attacks. The ISB has taken interest in these raids and is willing to root out the source of this problem if needed."
 swnd_partisans.20.a: "Request ISB help on the matter."
 swnd_partisans.20.b: "Request additional military support."
 swnd_partisans.20.c: "Pay these criminals no mind."
 swnd_partisans.21.name: "Cell Uncovered"
 swnd_partisans.21.desc: "Through the tireless efforts of the ISB, we have discovered the identity of the primary attackers. This rebel cell, known as the §RPartisans§!, is led by an Onderonian named §YSaw Gerrera§!. His methods are ruthless and his persona is bordering on madness.\n\nThe ISB suggests that we tread carefully since the §RPartisans§! are more reckless than the usual seditionist riff-raf, not least because they disregard collateral damage.\n\nOur field agents will work their hardest to destabilize the group from within and create a larger rift between them and local resistance groups."
 swnd_partisans.21.a: "Time to bolster defenses and hope for the best."
 swnd_partisans.22.name: "Criminals Uncovered"
 swnd_partisans.22.desc: "Through the tireless efforts of the ISB, we have discovered the identity of the primary attackers. This rebel cell, known simply as the §RPartisans§!, claims responsibility for the repeated attacks against Imperial convoys and personnel. While we don't know the leader's name for certain, we do know they go by the alias \"§YStoneface§!.\"\n\nThe ISB suggests that we tread carefully since the §RPartisans§! are more reckless than the usual seditionist riff-raf, not least because they disregard collateral damage.\n\nOur field agents will work their hardest to destabilize the group from within and create a larger rift between them and local resistance groups."
 swnd_partisans.22.a: "$swnd_partisans.21.a$"
 swnd_partisans.23.name: "Support Request"
 swnd_partisans.23.desc: "Criminals, rebels, whatever they may be, they've managed to cause an uproar among the populace. The governor of §Y[Root.planet.GetName]§! has requested has requested a full military deployment on the planet to help quell the growing discontent.\n\nThe Empire assures us that the stronger military presence will discourage these attacks and quell dissidents."
 swnd_partisans.23.a: "They dare challenge the Empire? So be it."
 swnd_partisans.24.name: "Growing Dissension"
 swnd_partisans.24.desc: "These upstarts have managed to cause an uproar among the populace. The incompetence of the governor of §Y[Root.planet.GetName]§! has refused to call in extra support to keep the dissidents at bay.\n\nAmidst the chaos, a rebel faction called the §RPartisans§! has taken control of the local resistance and are making conducting attacks on Imperial facilities around the planet. Though casualties among the Partisans are estimated to be high, these strikes have taken a toll on our forces and some civilians caught in the attacks."
 swnd_partisans.24.a: "..."
 swnd_partisans.30.name: "Turning Tides"
 swnd_partisans.30.desc: "Despite our best efforts by our field agents to destabilize the §RPartisans§!, the group remains unbroken. If anything, our interference has emboldened them.\n\nThe terrorists, aided by local resistance, seized enough equipment to launched a series of relentless attacks against military installations and crucial infrastructure systems, as well as executed the local governor.\n\nOur contacts in the station above §Y[Root.planet.GetName]§! have gone silent."
 swnd_partisans.30.a: "This is worrisome."
 swnd_partisans.40.name: "Desperate Attack"
 swnd_partisans.40.desc: "In a bold and foolish move, the §RPartisans§!, aided by local resistance, launched a series of failed attacks against our holdings on §Y[Root.planet.GetName]§!. While we took casualties, the §RPartisan§! cell inflicted several of their own against the local resistance groups out of a perceived mistrust in their leadership. With their standing among the populace reduced to nothing, the §RPartisans§! appear to have fled, leaving the planet entirely.\n\nUltimately they have done our §YEmpire§! a great service."
 swnd_partisans.40.a: "Good riddance."
 swnd_partisans.50.name: "Imperial Might"
 swnd_partisans.50.desc: "Our overwhelming military presence on the planet proved to be a clear message to the rebel cell. The increased presence of our forces and terrifying new walkers appears to have demotivated the scum.\n\nSensors have picked up on a handful of smuggling ships leaving the planet surface. Wherever they are heading, their plans for §Y[Root.planet.GetName]§! have no doubt failed."
 swnd_partisans.50.a: "Long live the Empire."
 swnd_partisans.60.name: "Losing Control"
 swnd_partisans.60.desc: "The increased presence of our forces and terrifying new walkers appears to have only emboldened the scum.\n\nThis terrorist group known as the §RPartisans§! have launched reckless attacks against military installations across the planet and have disrupted our operations and communications. Army Intelligence indicates the local governor has been killed and the Partisans are attempting to secure control over the planet."
 swnd_partisans.60.a: "Blasted rebels!"
 swnd_partisans.70.name: "Partisan Control"
 swnd_partisans.70.desc: "The §RPartisans§! have successfully taken over §Y[Root.planet.GetName]§!. Our garrison was overrun and Imperial surviors are few and far between. The §RPartisans§! brutality means that both remaining Imperial personnel and loyal citizens will be at the mercy of §YSaw Gerrera§! and his men."
 swnd_partisans.70.a: "We will wipe them out!"
 swnd_partisans.5002.name: "Saw's Reckoning"
 swnd_partisans.5002.desc: "§YSaw Gerrera§!'s §RPartisans§! are no more. A crushing defeat at the hands of those far superior to the cell ended the rhydo-fueled dreams of a very troubled man."
 swnd_partisans.5002.a: "So be it."

