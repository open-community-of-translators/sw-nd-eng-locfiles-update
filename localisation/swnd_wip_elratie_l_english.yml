 tech_sw_hyper_relays_desc: "Hyperspace Relays are stations that anchor stable transit corridors, allowing starships to navigate safely and swiftly between connected systems. By extending the relay network beyond established hyperroutes and into less-charted regions, we can bring reliable, high-speed travel to systems once considered off the beaten path."

