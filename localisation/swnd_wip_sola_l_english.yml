 building_synthetic_hyperfuel: "Synthetic Hyperfuel Refinery"
 building_synthetic_hyperfuel_desc: "A high-tech facility where munitions engineers and systems technicians convert volatile compounds into synthetic hypermatter, refining it into Hyperfuel for advanced reactors and propulsion systems."
 building_synthetic_hyperfuel_2: "Synthetic Hyperfuel Industry"
 building_synthetic_hyperfuel_2_desc: "Planetary reserves can only support a fraction of the fleet's requirements.   Advanced refineries utilize our specialized technicians to synthesize hyperfuel in bulk."

