 tech_electronics_base: "Electronics Production Base"
 tech_electronics_base_desc: "Concentrating high-tech assembly and fabrication into zoned tech-parks improves efficiency in producing tactical sensors, signal processors, and targeting subsystems essential to modern warfare."
 tech_electronics_hq: "Electronics Production Headquarters"
 tech_electronics_hq_desc: "From the tech enclaves of Hosnian Prime to the towers of Commenor, electronics production is often driven by institutional coordination, whether through academic-industrial clusters or heavily regulated defense contracting hubs."
