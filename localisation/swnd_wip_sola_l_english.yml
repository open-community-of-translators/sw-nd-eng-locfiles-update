 ### July 11 District Stuff
 # Polis Massa
 planet_districts_polis_massa: "Asteroid Districts"
 district_polis_massa_housing: "Asteroid Habitation District"
 district_polis_massa_housing_plural: "Asteroid Habitation Districts"
 district_polis_massa_housing_desc: "Compact living quarters are carved into stable rock, providing shelter and life support in an otherwise uninhabitable environment."
 district_polis_massa_generator: "Asteroid Generator District"
 district_polis_massa_generator_plural: "Asteroid Generator Districts"
 district_polis_massa_generator_desc: "Thin or absent atmospheres permit direct solar harvesting, offering a dependable energy source on asteroids."
 district_polis_massa_mining: "Asteroid Mining District"
 district_polis_massa_mining_plural: "Asteroid Mining Districts"
 district_polis_massa_mining_desc: "Low gravity and exposed crust layers make asteroid mining an efficient source of raw minerals."
 district_polis_massa_hydroponic: "Asteroid Agriculture District"
 district_polis_massa_hydroponic_plural: "Asteroid Agriculture District"
 district_polis_massa_hydroponic_desc: "Microbes and lichens, supplemented by hydroponics, enable limited food production on asteroids."

 ### July 12
 # Deposit Stuff
 d_hyperfuel_isotopes: "Hyperfuel Isotopes"
 d_hyperfuel_isotopes_desc: "Our survey teams have confirmed this planet holds the rare precursors necessary for the refinement of hyperfuel-an essential volatile for faster-than-light travel. While dangerous to handle and unstable in raw form, with the proper containment and refinement, these compounds can be transformed into high-grade starship fuel. The crust is laced with trace veins of hyper-reactive isotopes and volatile plasma-seep pockets, making this world a valuable source of propulsion-grade hyperfuel for our fleets."
 d_hyperfuel_isotopes_2: "Abundant Hyperfuel Isotopes"
 d_hyperfuel_isotopes_2_desc: "$d_hyperfuel_isotopes_desc$"
 d_hyperfuel_coaxium: "Coaxium-Rich Isotopes"
 d_hyperfuel_coaxium_desc: "Deep beneath the surface, volatile seams of coaxium pulse with barely-contained energy. This rare and unstable hyperfuel compound requires precise containment and immediate refinement, but the reward is immense-coaxium offers unmatched performance for faster-than-light propulsion systems."

